<script>
const role = 'teacher';

// ============================================================
// SUBJECT CONFIG — only this block changes per subject file
// ============================================================
const SUBJECT_CONFIG = {
  // Firestore
  collection:      'physics_pacing',
  docId:           'year9-10',
  syllabusPrefix:  '0625',        // prefix used in igcse_syllabus doc IDs

  // Display
  subjectKey:      'physics',     // used as key in cross-subject maps
  label:           'Physics',
  code:            '0625',
  qualifier:       'Core & Extended',
  years:           'Year 9–10',
  accentColor:     'var(--accent)', // CSS var or hex

  // Exam config
  examLocalKey:    'igcse_physics_exam_dates',
  examPapers: [
    { key: 'paper1', label: 'Paper 1', cls: 'paper1' },
    { key: 'paper2', label: 'Paper 2', cls: 'paper2' },
    { key: 'paper4', label: 'Paper 4', cls: 'paper4' },
    { key: 'paper6', label: 'Paper 6 (Practical)', cls: 'paper6' },
  ],
  hasSyllabusFilter: true,

  // Cross-subject weekly view — other subjects shown alongside this one
  crossSubjects: [
    { key: 'math',    col: 'math_pacing',    doc: 'year9-10', label: 'Mathematics', color: '#c0392b' },
    { key: 'biology', col: 'biology_pacing', doc: 'year9-10', label: 'Biology',     color: '#27ae60' },
  ],
};
// ============================================================

window.SUBJECT_CONFIG = SUBJECT_CONFIG; // expose to ES module scope

// Populate all subject-specific HTML from SUBJECT_CONFIG (runs immediately)
(function initSubjectConfig() {
  const cfg = SUBJECT_CONFIG;

  // <title>
  const titleEl = document.getElementById('pageTitle');
  if (titleEl) titleEl.textContent = `Cambridge IGCSE ${cfg.label} — Pacing Guide`;

  // Topbar brand
  const brandTitle = document.getElementById('brandTitle');
  if (brandTitle) brandTitle.textContent = `Cambridge IGCSE ${cfg.label}`;
  const brandSub = document.getElementById('brandSub');
  if (brandSub) brandSub.textContent = `${cfg.code} · ${cfg.qualifier} · ${cfg.years}`;

  // Breadcrumb
  const breadcrumb = document.getElementById('breadcrumbCurrent');
  if (breadcrumb) breadcrumb.textContent = cfg.label;

  // Cross-subject chips
  const bar = document.getElementById('crossSubjBar');
  const loadingNote = document.getElementById('crossSubjLoadingNote');
  if (bar && loadingNote) {
    // Self chip (always on)
    const selfChip = document.createElement('button');
    selfChip.className = 'cross-chip on';
    selfChip.dataset.subj = cfg.subjectKey;
    selfChip.onclick = function() { toggleCrossSubj(cfg.subjectKey, this); };
    selfChip.innerHTML = `<span class="cross-chip-dot" style="background:${cfg.accentColor}"></span>${cfg.label}`;
    bar.insertBefore(selfChip, loadingNote);

    // Cross-subject chips
    cfg.crossSubjects.forEach(s => {
      const chip = document.createElement('button');
      chip.className = 'cross-chip';
      chip.dataset.subj = s.key;
      chip.onclick = function() { toggleCrossSubj(s.key, this); };
      chip.innerHTML = `<span class="cross-chip-dot" style="background:${s.color}"></span>${s.label}`;
      bar.insertBefore(chip, loadingNote);
    });
  }
})();

window.PACING_CONFIG = {
  examLocalKey:      SUBJECT_CONFIG.examLocalKey,
  examPapers:        SUBJECT_CONFIG.examPapers,
  hasSyllabusFilter: SUBJECT_CONFIG.hasSyllabusFilter,
};

// -----------------------------------------------------------
// STATE  (var so the Firebase module can write window.DATA)
// -----------------------------------------------------------
var DATA = [];
// Class-based progress
var currentClass = 'default'; // 'default' = shared / all classes
var classList    = [];        // fallback class list from Firestore structure meta
var _objPrefixes = [];        // populated from Firestore meta doc; falls back to C/E auto-detect

// Cross-subject weekly data cache — keyed by subject key
var crossSubjData   = Object.fromEntries(SUBJECT_CONFIG.crossSubjects.map(s => [s.key, null]));
var crossSubjActive = Object.fromEntries([
  [SUBJECT_CONFIG.subjectKey, true],
  ...SUBJECT_CONFIG.crossSubjects.map(s => [s.key, false]),
]);

// Cross-subject Firestore collection map
const CROSS_SUBJ_COLLECTIONS = Object.fromEntries(
  SUBJECT_CONFIG.crossSubjects.map(s => [s.key, { col: s.col, doc: s.doc, label: s.label }])
);

let filterYear     = 'all';
let filterStatus   = 'all';
let searchQ        = '';
let syllabusFilter = 'all'; // 'all' | 'core' | 'extended'

// Cambridge Exam Dates — stored in localStorage (per-browser, admin-set)
// Format: { paper1: 'YYYY-MM-DD', paper2: 'YYYY-MM-DD', paper4: 'YYYY-MM-DD' }
var examDates = JSON.parse(localStorage.getItem(window.PACING_CONFIG.examLocalKey) || 'null') || {};

const PAGE_SIZE = 5;
const chPageMap = {}; // ci -> current 0-based page index (topic pagination)

// Chapter-level pagination — page size is dynamic in gallery mode (2 rows × cols)
let chapterPage = 0;

// Gallery / List view
const _pacingPrefix = (window.PACING_CONFIG.examLocalKey || 'pacing').replace('_exam_dates', '');
let chapterViewMode = localStorage.getItem(_pacingPrefix + '_view') || 'list';
// Apply saved sidebar preference (default: open)
const _layoutEl = document.getElementById('appLayout');
if (_layoutEl && localStorage.getItem(_pacingPrefix + '_sidebar') === 'collapsed') {
  _layoutEl.classList.add('sidebar-collapsed');
}
syncTopbarPadding();

function getGalleryCols() {
  // Match the grid column count based on available panel width
  const wrap = document.getElementById('chBlocksWrap');
  const w = wrap ? wrap.clientWidth : window.innerWidth - 280;
  if (w >= 1400) return 5;
  if (w >= 1100) return 4;
  if (w >= 800)  return 3;
  if (w >= 520)  return 2;
  return 1;
}

function getChapterPageSize() {
  if (chapterViewMode === 'gallery') return getGalleryCols() * 2; // exactly 2 rows
  return 5; // list mode: 5 chapters per page
}

// -----------------------------------------------------------
// PACE ALERT HELPERS
// -----------------------------------------------------------
// Loaded from calendar_settings/current (Central Hub Academic Calendar)
var TERM_START_DATE  = null; // ISO string e.g. "2025-07-21"
var TOTAL_WEEKS      = null; // integer e.g. 36
var HOLIDAY_RANGES   = [];   // [{start:"2025-12-20", end:"2026-01-03"}, ...]

// Fetch academic year settings + holidays from Firestore (single call at startup)
async function loadCalendarSettings(db) {
  const { getDoc: _getDoc, getDocs: _getDocs, collection: _col, doc: _doc } = window.__fbFS || {};
  if (!_getDoc) return;
  try {
    const settingsSnap = await _getDoc(_doc(db, 'calendar_settings', 'current'));
    if (settingsSnap.exists()) {
      const d = settingsSnap.data();
      if (d.academicYearStart)    TERM_START_DATE = d.academicYearStart;
      if (d.totalTeachingWeeks)   TOTAL_WEEKS     = d.totalTeachingWeeks;
    }
  } catch (e) { console.warn('Could not load calendar_settings:', e); }

  try {
    const evSnap = await _getDocs(_col(db, 'calendar_events'));
    HOLIDAY_RANGES = [];
    evSnap.forEach(d => {
      const ev = d.data();
      if (ev.category === 'Public Holiday' && ev.date_start && ev.date_end) {
        HOLIDAY_RANGES.push({ start: String(ev.date_start).slice(0,10), end: String(ev.date_end).slice(0,10) });
      }
    });
  } catch (e) { console.warn('Could not load calendar_events:', e); }
}

// Count teaching days (Mon–Fri, excluding public holidays) between two dates
function countTeachingDays(from, to) {
  let count = 0;
  const cur = new Date(from);
  while (cur <= to) {
    const dow = cur.getDay();
    if (dow >= 1 && dow <= 5) {
      const iso = cur.toISOString().slice(0,10);
      const isHoliday = HOLIDAY_RANGES.some(h => iso >= h.start && iso <= h.end);
      if (!isHoliday) count++;
    }
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function getTermStartDate() {
  if (TERM_START_DATE) return new Date(TERM_START_DATE);
  // Fallback: first Monday of September of current/last year
  const now = new Date();
  const year = now.getMonth() >= 8 ? now.getFullYear() : now.getFullYear() - 1;
  const sep1 = new Date(year, 8, 1);
  const day = sep1.getDay();
  const offset = day === 1 ? 0 : day === 0 ? 1 : 8 - day;
  return new Date(year, 8, 1 + offset);
}

function getCurrentSchoolWeek() {
  const start = getTermStartDate();
  const now   = new Date();
  const diffMs = now - start;
  if (diffMs < 0) return 0; // term hasn't started
  return Math.ceil(diffMs / (7 * 24 * 60 * 60 * 1000));
}

// Returns: 'overdue' | 'behind' | 'on-track' | 'upcoming' | null
function getPaceStatus(topic) {
  if (!topic.week) return null;
  const topicWeek = parseInt(String(topic.week).replace(/\D/g, '')) || 0;
  if (!topicWeek) return null;
  const currentWeek = getCurrentSchoolWeek();
  if (topic.status === 'done') return null; // done = no alert
  if (currentWeek > topicWeek + 1) return 'overdue';
  if (currentWeek > topicWeek)     return 'behind';
  if (currentWeek === topicWeek)   return 'on-track';
  return 'upcoming';
}

const PACE_LABELS = {
  overdue:  'Overdue',
  behind:   'Behind',
  'on-track': 'This week',
  upcoming: 'Upcoming',
};

function renderPaceBadge(topic) {
  const status = getPaceStatus(topic);
  if (!status) return '';
  return `<span class="pace-badge ${status}" title="School week ${topic.week} vs current week ${getCurrentSchoolWeek()}">${PACE_LABELS[status]}</span>`;
}

function renderPaceSummary() {
  const pill = document.getElementById('paceSummaryPill');
  if (!pill) return;
  const currentWeek = getCurrentSchoolWeek();
  if (currentWeek <= 0) { pill.style.display = 'none'; return; }

  let overdue = 0, behind = 0;
  DATA.forEach(ch => ch.topics.forEach(t => {
    const s = getPaceStatus(t);
    if (s === 'overdue') overdue++;
    else if (s === 'behind') behind++;
  }));

  if (overdue === 0 && behind === 0) {
    pill.className = 'pace-summary-pill ok';
    pill.textContent = '✓ On track — Week ' + currentWeek;
  } else if (overdue > 0) {
    pill.className = 'pace-summary-pill danger';
    pill.textContent = overdue + ' overdue · ' + behind + ' behind · Wk ' + currentWeek;
  } else {
    pill.className = 'pace-summary-pill';
    pill.textContent = behind + ' behind schedule · Wk ' + currentWeek;
  }
  pill.style.display = 'flex';
}

let _cmResolve = null;
function _showCm(opts) {

      return '<div class="cm-field"><label>'+f.label+'</label><select class="cm-select" id="cm-'+f.id+'">'+opts2+'</select></div>';
    }
    return '<div class="cm-field"><label>'+f.label+'</label><input class="cm-input" id="cm-'+f.id+'" type="'+(f.type||'text')+'" placeholder="'+(f.ph||'')+'" value="'+(f.val||'')+'"></div>';
  }).join('');
  document.getElementById('cmModal').classList.add('open');
  setTimeout(function(){ var el=fieldsEl.querySelector('input,select'); if(el)el.focus(); },80);
  return new Promise(function(res) { _cmResolve = res; });
}
function _cmDone(ok) {
  document.getElementById('cmModal').classList.remove('open');
  if (!_cmResolve) return;
  var fieldsEl = document.getElementById('cmFields');
  var inputs = fieldsEl.querySelectorAll('input,select');
  if (!ok || !inputs.length) { _cmResolve(ok||null); _cmResolve=null; return; }
  var vals = {};
  inputs.forEach(function(el){ vals[el.id.replace('cm-','')] = el.value.trim(); });
  _cmResolve(vals); _cmResolve = null;
}

function _chapterYearOptions() { // kept for pacing-shared.js compatibility
  var existing = DATA.map(function(ch){return ch.year;}).filter(function(y,i,a){return y&&a.indexOf(y)===i;});
  if (existing.length) return existing.map(function(y,i){return {v:y,l:y,def:i===existing.length-1};});
  return [{v:'Year 9',l:'Year 9'},{v:'Year 10',l:'Year 10',def:true}];
}

function parseObjCodes(objStr, syllabusRefs) {
  const fromRefs = Array.isArray(syllabusRefs) ? syllabusRefs.filter(Boolean) : [];
  // Build prefix pattern dynamically from CH-managed objPrefixes; fallback to C/E
  const prefixes = _objPrefixes.length ? _objPrefixes : ['C', 'E'];
  const pfxPattern = prefixes.map(p => p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
  const re = new RegExp(`(?:${pfxPattern})\\d+\\.\\d+`, 'g');
  const matches = objStr ? (objStr.match(re) || []) : [];
  return [...new Set([...fromRefs, ...matches])];
}

function allTopics() {
  return DATA.flatMap((ch, ci) => ch.topics.map((t, ti) => ({ch: ci, ti, ...t})));
}

function _renderObjCell(obj) {
  if (!obj) return '-';
  var isHtml = obj.indexOf('<') !== -1 && obj.indexOf('>') !== -1;
  return isHtml ? obj : escHtml(obj.substring(0,120)) + (obj.length>120?'...':'');
}
function _objNeedsSeeMore(obj) {
  var isHtml = obj && obj.indexOf('<') !== -1 && obj.indexOf('>') !== -1;
  return obj && obj.length > 120 && !isHtml;
}
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function safeUrl(url) {
  return /^https?:\/\//i.test(url) ? url : '#';
}

  const y9  = DATA.filter(ch => ch.year === 'Year 9');

    <div class="ch-nav-group"><div class="ch-nav-group-label">Year 10 — Chapters 14–24</div>${buildItems(y10)}</div>`;
}

// RENDER - PACING GUIDE
// -----------------------------------------------------------
function renderPacing() {
  const container = document.getElementById('chBlocks');
  const collapsed = new Set([...document.querySelectorAll('.ch-block.collapsed')].map(el=>el.id));
  let html = '';

  // Apply chapter-level pagination
  const CPS = getChapterPageSize(); // dynamic: 2×cols in gallery, 5 in list
  // First collect filtered chapter indices
  const filteredChIndices = DATA.map((ch, ci) => ci).filter(ci => {
    const ch = DATA[ci];
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    // skip chapters with no matching topics
    const hasTopics = ch.topics.some(t => {
      if (filterStatus !== 'all' && t.status !== filterStatus) return false;
      if (!matchesSyllabusFilter(t)) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return t.topic.toLowerCase().includes(q) || t.objective.toLowerCase().includes(q);
      }
      return true;
    });
    return hasTopics;
  });
  const totalChapterPages = Math.ceil(filteredChIndices.length / CPS);
  if (chapterPage >= totalChapterPages) chapterPage = Math.max(0, totalChapterPages - 1);
  const pageChIndices = filteredChIndices.slice(chapterPage * CPS, (chapterPage + 1) * CPS);

  pageChIndices.forEach(ci => {
    const ch = DATA[ci];
    if (filterYear !== 'all' && ch.year !== filterYear) return;

    const filteredTopics = ch.topics.map((t, ti) => ({t, ti})).filter(({t}) => {
      if (filterStatus !== 'all' && t.status !== filterStatus) return false;
      if (!matchesSyllabusFilter(t)) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return t.topic.toLowerCase().includes(q) || t.objective.toLowerCase().includes(q);
      }
      return true;
    });

    if (!filteredTopics.length) return;

    const done       = ch.topics.filter(t => t.status === 'done').length;
    const inprogress = ch.topics.filter(t => t.status === 'inprogress').length;
    const revisit    = ch.topics.filter(t => t.status === 'revisit').length;
    const pending    = ch.topics.filter(t => !t.status || t.status === 'pending').length;
    const pct        = Math.round(done / ch.topics.length * 100);

      ${revisit    ? `<span class="ch-status-pill rev">${revisit} revisit</span>` : ''}

    html += `
    <div class="ch-block" id="ch-${ci}">
      <div class="ch-header" onclick="toggleChapter(${ci})">
        <span class="ch-badge">Ch ${ci+1}</span>
        <span class="ch-header-title">${ch.chapter}</span>
        <span class="ch-year-tag ${yearClass}">${ch.year}</span>
        <div class="ch-stats">
          ${statusPillsHtml}
          <div class="ch-prog-bar"><div class="ch-prog-fill" style="width:${pct}%"></div></div>
          <span class="ch-pct">${pct}%</span>
          <span class="ch-topic-count">${ch.topics.length} topics</span>
        </div>
        <button class="bulk-done-btn" onclick="event.stopPropagation();bulkMarkDone(${ci})" title="Mark all topics in this chapter as Done">✓ All Done</button>
        <span class="ch-caret">▾</span>
      </div>
      <div class="topics-wrap">
        <table class="topics-tbl">
          <thead><tr>
            <th style="width:42px"></th>
            <th>Topic</th>
          </tr></thead>
          <tbody>
            ${(()=>{
              const page = chPageMap[ci] || 0;
              const start = page * PAGE_SIZE;
              const pageTopics = filteredTopics.slice(start, start + PAGE_SIZE);
              return pageTopics.map(({t, ti}) => {
                const codes   = parseObjCodes(t.objective, t.syllabusRefs);
                const rowClass = t.status === 'done' ? 'done-row' : t.status === 'inprogress' ? 'inprogress-row' : t.status === 'revisit' ? 'revisit-row' : '';
                const hasRes   = (t.resources || []).length > 0;
                // Build inline syllabus block if index is loaded
                const hasSyllabus = codes.length && Object.keys(syllabusIndex).length > 0;
                const sylInlineHtml = hasSyllabus
                  ? codes.map(code => {
                      const { key, entry } = lookupSyllabus(SUBJECT_CONFIG.syllabusPrefix, code);
                      const topicText = entry ? escHtml(entry.topicArea || '') : '';
                      const titleText = entry ? escHtml(entry.title || '') : '';
                      const content   = entry?.content || [];
                      const descText  = entry?.description
                        ? escHtml(entry.description)
                        : content.length
                          ? escHtml(content.slice(0, 3).join('; ') + (content.length > 3 ? ' …' : ''))
                          : '';
                      return `<div class="syl-inline-line">
                        <span class="sil-code" onclick="openSyllabusDetail('${escHtml(key)}')" title="View full syllabus detail">${escHtml(code)}</span>
                        ${tierBadgeHtml(entry?.tier, true)}
                        ${topicText ? `<span class="sil-topic">${topicText}</span>` : ''}
                        <span class="sil-title">${titleText}</span>
                        ${descText ? `<div class="sil-desc">${descText}</div>` : ''}

                    }).join('')
                  : '';
                const objFallbackHtml = !hasSyllabus
                  ? `<div class="topic-obj-line">${_renderObjCell(t.objective)}${_objNeedsSeeMore(t.objective) ? ` <span class="obj-code" style="cursor:pointer" onclick="event.stopPropagation();showObj(${ci},${ti})">see full</span>` : ''}</div>`
                  : '';
                return `
                <tr class="${rowClass}" id="row-${ci}-${ti}">
                  <td>
                    <div class="tcheck ${t.status==='done'?'on':t.status==='inprogress'?'mid':t.status==='revisit'?'revisit':''}" onclick="toggleDone(${ci},${ti})"></div>
                  </td>
                  <td class="topic-cell">
                    <div class="topic-name ${t.status==='done'?'struck':''}">${escHtml(t.topic)}</div>
                    ${hasSyllabus
                      ? `<div class="syl-inline-block">${sylInlineHtml}</div>`
                      : (codes.length ? `<div class="obj-codes">${codes.map(c => `<span class="obj-code" onclick="showObj(${ci},${ti})">${c}</span>`).join('')}</div>` : '')
                    }
                    ${objFallbackHtml}
                    <div class="topic-meta-line">
                      ${(()=>{ const s=getTopicSyllabus(t); return s!=='both'?`<span class="topic-syllabus-dot ${s}">${s==='core'?'Core':'Extended'}</span>`:''; })()}
                      <span class="meta-pill meta-pill-hours" title="Planned lesson hours"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Planned: ${t.duration ?? t.hour}h</span>
                      ${renderActualHoursMeta(ci, ti, t)}
                      ${t.week ? `<span class="meta-pill meta-pill-week"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Week ${t.week}</span>` : ''}
                      ${renderPaceBadge(t)}
                      <div class="status-pill">
                        <button class="sp-btn sp-pending   ${t.status==='pending'   ?'sp-on':''}" onclick="setStatus(${ci},${ti},'pending')">Pending</button>

                        <button class="sp-btn sp-done      ${t.status==='done'      ?'sp-on':''}" onclick="setStatus(${ci},${ti},'done')">Done</button>
                        <button class="sp-btn sp-revisit   ${t.status==='revisit'   ?'sp-on':''}" onclick="setStatus(${ci},${ti},'revisit')" title="Needs re-teaching / revisit">↺ Revisit</button>
                      </div>
                      ${renderAoBadges(t)}
                      ${renderPaperBadge(t)}
                      <button class="note-btn${t.note ? ' has-note' : ''}" onclick="toggleNote(${ci},${ti})" title="${t.note ? 'Edit note' : 'Add teacher note'}">&#9998; ${t.note ? 'Note' : 'Add note'}</button>
                      ${renderDiagBtn(ci, ti, t)}
                      ${t.coordNote ? `<button class="coord-btn has-coord" onclick="toggleCoordNote(${ci},${ti})" title="Coordinator shared note">&#9432; Coord Note</button>` : ''}
                    </div>
                  </td>

                </tr>
                ${hasRes || t.activity ? `<tr class="res-row" id="res-row-${ci}-${ti}"><td colspan="2">${renderResourcesHtml(ci, ti, t)}</td></tr>` : ''}
                ${renderCoordNoteRow(ci, ti, t)}
                <tr class="note-row" id="note-row-${ci}-${ti}">
                  <td colspan="2" style="padding:0 !important; border-bottom: 1px solid var(--border) !important;">
                    <div class="note-panel${t.note ? ' open' : ''}" id="note-panel-${ci}-${ti}">
                      <textarea class="note-textarea" id="note-ta-${ci}-${ti}" placeholder="Write your observation, differentiation note, or class feedback here…">${escHtml(t.note||'')}</textarea>
                      <div class="note-actions">
                        <button class="note-save-btn" onclick="saveNote(${ci},${ti})">Save Note</button>
                        <button class="note-discard-btn" onclick="discardNote(${ci},${ti})">Cancel</button>
                        ${t.note ? `<button class="note-discard-btn" style="color:var(--accent)" onclick="deleteNote(${ci},${ti})">Delete</button>` : ''}
                      </div>
                    </div>
                  </td>
                </tr>
`;
              }).join('');
            })()}
          </tbody>
        </table>
        ${(()=>{
          const totalPages = Math.ceil(filteredTopics.length / PAGE_SIZE);
          if (totalPages <= 1) return '';
          const page = chPageMap[ci] || 0;
          const start = page * PAGE_SIZE + 1;
          const end   = Math.min((page + 1) * PAGE_SIZE, filteredTopics.length);
          let pgHtml = `<div class="ch-pagination">
            <span class="pg-info">${start}–${end} of ${filteredTopics.length} topics</span>
            <div class="pg-btns">
              <button class="pg-btn" onclick="chSetPage(${ci},${page-1})" ${page===0?'disabled':''}>‹ Prev</button>`;
          for (let p = 0; p < totalPages; p++) {
            pgHtml += `<button class="pg-btn ${p===page?'pg-active':''}" onclick="chSetPage(${ci},${p})">${p+1}</button>`;
          }
          pgHtml += `<button class="pg-btn" onclick="chSetPage(${ci},${page+1})" ${page===totalPages-1?'disabled':''}>Next ›</button>
            </div>
          </div>`;
          return pgHtml;
        })()}
      </div>
      ${renderChapterAssessmentCard(ch)}
      ${renderGalleryCardBody(ch, ci)}
    </div>`;
  });

  // Chapter paginator — rendered into the mount point outside the grid
  let chPaginatorHtml = '';
  if (totalChapterPages > 1) {
    const start = chapterPage * CPS + 1;
    const end   = Math.min((chapterPage + 1) * CPS, filteredChIndices.length);
    chPaginatorHtml = `<div class="chapter-paginator">
      <span class="ch-pg-info">Chapters ${start}–${end} of ${filteredChIndices.length}</span>
      <div class="ch-pg-btns">
        <button class="ch-pg-btn" onclick="chapterSetPage(${chapterPage - 1})" ${chapterPage === 0 ? 'disabled' : ''}>‹ Prev</button>`;
    for (let p = 0; p < totalChapterPages; p++) {
      chPaginatorHtml += `<button class="ch-pg-btn ${p === chapterPage ? 'ch-pg-active' : ''}" onclick="chapterSetPage(${p})">${p + 1}</button>`;
    }
    chPaginatorHtml += `<button class="ch-pg-btn" onclick="chapterSetPage(${chapterPage + 1})" ${chapterPage === totalChapterPages - 1 ? 'disabled' : ''}>Next ›</button>
      </div>
    </div>`;
  }

  if (!html) {
    if (DATA.length === 0) {
      html = `<div class="empty">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        </div>
        <p style="font-weight:500;color:var(--ink-2);margin-bottom:6px;">No topics yet</p>
        <p style="font-size:.75rem;line-height:1.6;">The coordinator hasn't added any content yet.<br>Please check back later.</p>
      </div>`;
    } else {
      html = `<div class="empty"><div class="empty-icon"></div><p>No topics match your filters.</p></div>`;
    }
  }
  container.innerHTML = html;

  // Update search result count
  if (searchQ) {
    const totalMatchedTopics = DATA.reduce((n, ch) => n + ch.topics.filter(t => {
      if (!matchesSyllabusFilter(t)) return false;
      const q = searchQ.toLowerCase();
      return t.topic.toLowerCase().includes(q) || t.objective.toLowerCase().includes(q);
    }).length, 0);
    updateSearchResultCount(totalMatchedTopics, false);
  } else {
    updateSearchResultCount(0, true);
  }

  // Paginator goes into the mount point (outside the grid, always at bottom)
  const mountEl = document.getElementById('chapterPaginatorMount');
  if (mountEl) mountEl.innerHTML = chPaginatorHtml;

  // Apply view mode class + dynamic grid columns
  const cols = getGalleryCols();
  container.classList.toggle('gallery-view', chapterViewMode === 'gallery');
  if (chapterViewMode === 'gallery') {
    container.style.display = 'grid';
    container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    container.style.gap = '14px';
    container.style.alignItems = 'start';

    container.style.display = '';
    container.style.gridTemplateColumns = '';
    container.style.gap = '';

  // Sync toggle buttons
  const vmtList    = document.getElementById('vmtList');
  const vmtGallery = document.getElementById('vmtGallery');
  const expandBtn  = document.getElementById('expandAllBtn');
  const collapseBtn = document.getElementById('collapseAllBtn');
  if (vmtList)    vmtList.classList.toggle('on', chapterViewMode === 'list');
  if (vmtGallery) vmtGallery.classList.toggle('on', chapterViewMode === 'gallery');
  // Expand/Collapse All only make sense in list mode
  if (expandBtn)   expandBtn.style.display   = chapterViewMode === 'list' ? '' : 'none';
  if (collapseBtn) collapseBtn.style.display = chapterViewMode === 'list' ? '' : 'none';

  collapsed.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('collapsed');});
}

function renderGalleryCardBody(ch, ci) {
  const preview = ch.topics.slice(0, 4);
  const more    = ch.topics.length - preview.length;
  const rows = preview.map(t => {
    const dotClass = t.status === 'done' ? 'done' : t.status === 'inprogress' ? 'inprogress' : 'pending';
    return `<div class="gcb-topic-row">
      <div class="gcb-topic-dot ${dotClass}"></div>
      <div class="gcb-topic-name">${escHtml(t.topic)}</div>
    </div>`;
  }).join('');
  const moreHtml = more > 0 ? `<div class="gcb-more">+${more} more topics</div>` : '';
  return `<div class="gallery-card-body">
    <div class="gcb-topics-preview">${rows}${moreHtml}</div>
    <button class="gcb-open-btn" onclick="openChapterInList(${ci})">Open chapter →</button>
  </div>`;
}

// -----------------------------------------------------------
// CHAPTER VIEW MODE
// -----------------------------------------------------------
function setChapterView(mode) {
  chapterViewMode = mode;
  localStorage.setItem(_pacingPrefix + '_view', mode);
  renderPacing();
}

function openChapterInList(ci) {
  // Switch to list view, find which chapter page ci is on, scroll to it
  chapterViewMode = 'list';
  const filteredChIndices = DATA.map((ch, idx) => idx).filter(idx => {
    const ch = DATA[idx];
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    return ch.topics.some(t => matchesSyllabusFilter(t));
  });
  const pos = filteredChIndices.indexOf(ci);
  if (pos >= 0) chapterPage = Math.floor(pos / getChapterPageSize());
  renderPacing();
  setTimeout(() => {
    const el = document.getElementById('ch-' + ci);
    if (el) { el.classList.remove('collapsed'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }, 60);
}

// -----------------------------------------------------------
// CHAPTER PAGINATION
// -----------------------------------------------------------
function chapterSetPage(page) {
  const filteredCount = DATA.filter(ch => {
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    return ch.topics.some(t => matchesSyllabusFilter(t));
  }).length;
  const totalPages = Math.ceil(filteredCount / getChapterPageSize());
  if (page < 0 || page >= totalPages) return;
  chapterPage = page;
  renderPacing();
  const wrap = document.getElementById('chBlocksWrap');
  if (wrap) wrap.scrollTop = 0;
}

// -----------------------------------------------------------
// PAGINATION (topics within a chapter)
// -----------------------------------------------------------
function chSetPage(ci, page) {
  const ch = DATA[ci];
  if (!ch) return;
  const filteredTopics = ch.topics.map((t, ti) => ({t, ti})).filter(({t}) => {
    if (filterStatus !== 'all' && t.status !== filterStatus) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      return t.topic.toLowerCase().includes(q) || t.objective.toLowerCase().includes(q);
    }
    return true;
  });
  const totalPages = Math.ceil(filteredTopics.length / PAGE_SIZE);
  if (page < 0 || page >= totalPages) return;
  chPageMap[ci] = page;
  renderPacing();
  // scroll chapter into view
  const el = document.getElementById('ch-' + ci);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// -----------------------------------------------------------
// CROSS-SUBJECT TOGGLE
// -----------------------------------------------------------
function toggleCrossSubj(subj, btn) {
  crossSubjActive[subj] = !crossSubjActive[subj];
  btn.classList.toggle('on', crossSubjActive[subj]);

  // Lazy-load from Firestore if first activation
  if (crossSubjActive[subj] && subj !== SUBJECT_CONFIG.subjectKey && crossSubjData[subj] === null) {
    const note = document.getElementById('crossSubjLoadingNote');
    if (note) note.style.display = 'inline';
    const col = CROSS_SUBJ_COLLECTIONS[subj];
    // Use window.__fbGetDoc exposed by Firebase module
    if (window.__fbGetDoc) {
      window.__fbGetDoc(col.col, col.doc).then(chapters => {
        crossSubjData[subj] = chapters;
        if (note) note.style.display = 'none';
        renderWeekly();
      }).catch(() => {
        crossSubjData[subj] = [];
        if (note) note.style.display = 'none';
        showToast('Could not load ' + col.label + ' data');
        renderWeekly();
      });
    } else {
      crossSubjData[subj] = [];
      if (note) note.style.display = 'none';
      renderWeekly();
    }
    return; // will re-render after load
  }
  renderWeekly();
}

// -----------------------------------------------------------
// RENDER - WEEKLY VIEW
// -----------------------------------------------------------
function renderWeekly() {
  const weekMap = {};

  // This subject's topics (always active)
  const selfKey = SUBJECT_CONFIG.subjectKey;
  if (crossSubjActive[selfKey]) {
    DATA.forEach(ch => {
      ch.topics.forEach(t => {
        const w = t.week ? String(t.week) : null;
        if (!w) return;
        if (!weekMap[w]) weekMap[w] = { selfHours: 0, subjTopics: {} };
        if (!weekMap[w].subjTopics[selfKey]) weekMap[w].subjTopics[selfKey] = [];
        const hr = t.duration ?? t.hour ?? 0;
        weekMap[w].subjTopics[selfKey].push({ name: t.topic, chapter: ch.chapter, year: ch.year, hour: hr });
        weekMap[w].selfHours += hr;
      });
    });
  }

  // Cross-subjects
  SUBJECT_CONFIG.crossSubjects.map(s => s.key).forEach(subj => {
    if (!crossSubjActive[subj] || !crossSubjData[subj]) return;
    crossSubjData[subj].forEach(ch => {
      (ch.topics || []).forEach(t => {
        const w = t.week ? String(t.week) : null;
        if (!w) return;
        if (!weekMap[w]) weekMap[w] = { mathHours: 0, subjTopics: {} };
        if (!weekMap[w].subjTopics[subj]) weekMap[w].subjTopics[subj] = [];
        weekMap[w].subjTopics[subj].push({ name: t.topic, chapter: ch.chapter || '', year: ch.year || '', hour: t.duration ?? t.hour ?? 0 });
      });
    });
  });

  const weeks = Object.keys(weekMap).sort((a, b) =>
    parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,''))
  );

  const subjColors = Object.fromEntries([
    [SUBJECT_CONFIG.subjectKey, SUBJECT_CONFIG.accentColor],
    ...SUBJECT_CONFIG.crossSubjects.map(s => [s.key, s.color]),
  ]);
  const subjLabels = Object.fromEntries([
    [SUBJECT_CONFIG.subjectKey, SUBJECT_CONFIG.label],
    ...SUBJECT_CONFIG.crossSubjects.map(s => [s.key, s.label]),
  ]);
  const MAX_HOURS = 12; // max expected hours per week for load bar

  if (!weeks.length) {
    document.getElementById('weekGrid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><p style="font-weight:500;color:var(--ink-2);margin-bottom:6px;">No weekly schedule yet</p><p style="font-size:.75rem;line-height:1.6;">Topics don\'t have week assignments yet.<br>Coordinators can add week numbers to topics.</p></div>';
    return;
  }

  document.getElementById('weekGrid').innerHTML = weeks.map(w => {
    const wData = weekMap[w];
    // Total hours across all active subjects for this week
    let totalHours = 0;
    Object.values(wData.subjTopics).forEach(topics => topics.forEach(t => totalHours += (t.hour || 0)));
    const loadPct = Math.min(100, Math.round(totalHours / MAX_HOURS * 100));
    const loadClass = loadPct >= 85 ? 'load-heavy' : loadPct >= 55 ? 'load-medium' : 'load-ok';
    const currentWeek = getCurrentSchoolWeek();
    const wNum = parseInt(w.replace(/\D/g,''));
    const isCurrent = wNum === currentWeek;

    let sectionsHtml = '';
    [SUBJECT_CONFIG.subjectKey, ...SUBJECT_CONFIG.crossSubjects.map(s => s.key)].forEach(subj => {
      const topics = wData.subjTopics[subj];
      if (!topics || !topics.length) return;
      const showSep = Object.keys(wData.subjTopics).length > 1;
      if (showSep) sectionsHtml += `<div class="week-card-subj-sep">${subjLabels[subj]}</div>`;
      sectionsHtml += topics.map(t => `
        <div class="week-topic-row">
          <div class="wt-dot" style="background:${subjColors[subj]}"></div>
          <div class="wt-name">${escHtml(t.name)}</div>
          <div class="wt-ch">${t.chapter ? (t.chapter.match(/^\d+/)?.[0]||'') : ''}</div>
        </div>`).join('');
    });

    return `
    <div class="week-card" style="${isCurrent ? 'border-color:var(--accent);box-shadow:0 0 0 2px rgba(41,128,185,.12)' : ''}">
      <div class="week-load-bar"><div class="week-load-fill ${loadClass}" style="width:${loadPct}%"></div></div>
      <div class="week-card-head" style="${isCurrent ? 'background:var(--accent)' : ''}">
        <div class="week-card-title">Week ${w.replace('Week ','')}${isCurrent ? ' ◀ Now' : ''}</div>
        <div class="week-hours-tag">${totalHours}h total</div>
      </div>
      <div class="week-topics-list">${sectionsHtml}</div>
    </div>`;
  }).join('');
}

// -----------------------------------------------------------
// RENDER - OBJECTIVE COVERAGE REPORT
// -----------------------------------------------------------
let coverageFilter = 'all'; // 'all' | 'uncovered' | 'partial' | 'covered'

function renderCoverage() {
  const el = document.getElementById('coverageReport');
  if (!el) return;

  // Collect all obj codes from all topics (include diag tag)
  const codeMap = {}; // code -> [{ ci, ti, topic, status, diag, chapter }]
  DATA.forEach((ch, ci) => {
    ch.topics.forEach((t, ti) => {
      const codes = parseObjCodes(t.objective || '', t.syllabusRefs);
      codes.forEach(code => {
        if (!codeMap[code]) codeMap[code] = [];
        codeMap[code].push({ ci, ti, topic: t.topic, status: t.status, diag: t.diag || '', chapter: ch.chapter });
      });
    });
  });

  const allCodes = Object.keys(codeMap).sort();
  const total    = allCodes.length;
  const covered  = allCodes.filter(c => codeMap[c].every(t => t.status === 'done')).length;
  const partial  = allCodes.filter(c => codeMap[c].some(t => t.status === 'done') && !codeMap[c].every(t => t.status === 'done')).length;
  const uncov    = allCodes.filter(c => codeMap[c].every(t => t.status !== 'done')).length;
  // Diagnostic counts across all objectives
  const weakCodes    = allCodes.filter(c => codeMap[c].some(t => t.diag === 'weak')).length;
  const reviewCodes  = allCodes.filter(c => codeMap[c].some(t => t.diag === 'review') && !codeMap[c].some(t => t.diag === 'weak')).length;

  if (!total) {
    el.innerHTML = '<div class="empty"><p style="color:var(--ink-2);font-size:.8rem">No objective codes found. Coordinators can add Cambridge objective codes (e.g. C1.1, E2.3) to topic objectives.</p></div>';
    return;
  }

  // Filter
  const visible = coverageFilter === 'all' ? allCodes
    : allCodes.filter(code => {
        const topics = codeMap[code];
        const allDone = topics.every(t => t.status === 'done');
        const someDone = topics.some(t => t.status === 'done');
        if (coverageFilter === 'covered')   return allDone;
        if (coverageFilter === 'partial')   return someDone && !allDone;
        if (coverageFilter === 'uncovered') return !someDone;
        if (coverageFilter === 'weak')      return codeMap[code].some(t => t.diag === 'weak');
        return true;
      });

  const pct = Math.round(covered / total * 100);

  el.innerHTML = `
    <div class="coverage-summary">
      <div class="cov-stat"><div class="cov-stat-num">${total}</div><div class="cov-stat-label">Total objectives</div></div>
      <div class="cov-stat ok"><div class="cov-stat-num">${covered}</div><div class="cov-stat-label">Fully covered (${pct}%)</div></div>
      <div class="cov-stat"><div class="cov-stat-num" style="color:var(--amber,#d97706)">${partial}</div><div class="cov-stat-label">In progress</div></div>
      <div class="cov-stat danger"><div class="cov-stat-num">${uncov}</div><div class="cov-stat-label">Not started</div></div>
      ${weakCodes > 0 ? `<div class="cov-stat danger"><div class="cov-stat-num">${weakCodes}</div><div class="cov-stat-label">⚠ Has weak topic</div></div>` : ''}
    </div>

    <div style="background:white;border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;box-shadow:var(--shadow-sm)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="font-size:.68rem;font-weight:700;color:var(--ink-3)">OVERALL COVERAGE</span>
        <span style="font-size:.72rem;color:var(--ink-2)">${pct}% complete</span>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--green);border-radius:4px;transition:width .5s"></div>
      </div>
    </div>

    <div class="cov-filter-bar">
      <button class="cov-filter-chip${coverageFilter==='all'?' on':''}" onclick="setCovFilter('all')">All (${total})</button>
      <button class="cov-filter-chip${coverageFilter==='covered'?' on':''}" onclick="setCovFilter('covered')">Covered (${covered})</button>
      <button class="cov-filter-chip${coverageFilter==='partial'?' on':''}" onclick="setCovFilter('partial')">In Progress (${partial})</button>
      <button class="cov-filter-chip${coverageFilter==='uncovered'?' on':''}" onclick="setCovFilter('uncovered')">Not Started (${uncov})</button>
      ${weakCodes > 0 ? `<button class="cov-filter-chip${coverageFilter==='weak'?' on':''}" onclick="setCovFilter('weak')" style="border-color:#fca5a5;color:#dc2626">⚠ Weak (${weakCodes})</button>` : ''}
    </div>

    ${visible.length === 0 ? '<p style="color:var(--ink-3);font-size:.8rem;padding:12px 0">No objectives match this filter.</p>' : ''}

    <table class="coverage-table">
      <thead><tr>
        <th style="width:90px">Code</th>
        <th style="width:110px">Status</th>
        <th>Topics using this objective</th>
      </tr></thead>
      <tbody>
        ${visible.map(code => {
          const topics = codeMap[code];
          const allDone  = topics.every(t => t.status === 'done');
          const someDone = topics.some(t => t.status === 'done');
          const hasWeak   = topics.some(t => t.diag === 'weak');
          const hasReview = topics.some(t => t.diag === 'review');
          const rowClass = hasWeak ? 'cov-uncovered' : allDone ? 'cov-covered' : someDone ? 'cov-partial' : 'cov-uncovered';
          const badge    = allDone ? 'covered' : someDone ? 'partial' : 'uncovered';
          const badgeLabel = allDone ? 'Covered' : someDone ? 'In Progress' : 'Not Started';
          const diagBadge = hasWeak
            ? `<span style="font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:100px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;white-space:nowrap">⚠ Weak</span>`
            : hasReview
            ? `<span style="font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:100px;background:#fef9c3;color:#92400e;border:1px solid #fde68a;white-space:nowrap">↻ Review</span>`
            : '';
          const topicLinks = topics.map(t => {
            const diagDot = t.diag === 'weak'
              ? `<span title="Weak" style="color:#dc2626;font-size:.7rem">⚠</span>`
              : t.diag === 'review'
              ? `<span title="Needs review" style="color:#d97706;font-size:.7rem">↻</span>`
              : '';
            return `<span class="cov-topic-link ${t.status}" onclick="scrollToChapter(${t.ci})" title="Ch ${t.ci+1}: ${escHtml(t.chapter)}">${diagDot}${escHtml(t.topic.substring(0,38))}${t.topic.length>38?'…':''}</span>`;
          }).join('');
          return `<tr class="${rowClass}">
            <td><span class="cov-code">${escHtml(code)}</span></td>
            <td style="display:flex;gap:4px;align-items:center;flex-wrap:wrap"><span class="cov-status-badge ${badge}">${badgeLabel}</span>${diagBadge}</td>
            <td><div class="cov-topic-links">${topicLinks}</div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function setCovFilter(f) {
  coverageFilter = f;
  renderCoverage();
}

function renderDiagRollup() {
  const container = document.getElementById('varianceReport');
  if (!container || !DATA.length) return;

  // Collect weak + revisit topics per chapter
  const weakByChapter = [];
  const revisitByChapter = [];
  let totalWeak = 0, totalRevisit = 0;

  DATA.forEach((ch, ci) => {
    const weakTopics = ch.topics.filter(t => t.diag === 'weak');
    const revisitTopics = ch.topics.filter(t => t.status === 'revisit');
    if (weakTopics.length) {
      weakByChapter.push({ chapter: ch.chapter, ci, topics: weakTopics });
      totalWeak += weakTopics.length;
    }
    if (revisitTopics.length) {
      revisitByChapter.push({ chapter: ch.chapter, ci, topics: revisitTopics });
      totalRevisit += revisitTopics.length;
    }
  });

  if (totalWeak === 0 && totalRevisit === 0) return; // nothing to show

  // Remove previous rollup if re-rendering
  const existing = document.getElementById('diagRollupPanel');
  if (existing) existing.remove();

  const panel = document.createElement('div');
  panel.id = 'diagRollupPanel';
  panel.style.cssText = 'margin-top:24px';

  const renderChapterList = (items, accentColor, accentBg, icon, diagLabel) => {
    if (!items.length) return `<p style="color:var(--ink-3);font-size:.8rem;padding:8px 0">None</p>`;
    return items.map(({ chapter, ci, topics }) => `
      <div style="margin-bottom:12px">
        <div style="font-size:.72rem;font-weight:700;color:var(--ink-2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em">
          Ch ${ci + 1} — ${escHtml(chapter)}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${topics.map(t => `
            <span onclick="scrollToChapter(${ci})" style="cursor:pointer;font-size:.72rem;padding:3px 10px;border-radius:100px;background:${accentBg};border:1px solid ${accentColor};color:${accentColor};display:inline-flex;align-items:center;gap:4px" title="${escHtml(t.topic)}">
              ${icon} ${escHtml(t.topic.substring(0, 40))}${t.topic.length > 40 ? '…' : ''}
            </span>
          `).join('')}
        </div>
      </div>
    `).join('');
  };

  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:.75rem;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.06em">Coordinator Attention</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px">
      ${totalWeak > 0 ? `
      <div style="background:white;border:1px solid #fca5a5;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:1rem">⚠</span>
          <div>
            <div style="font-size:.78rem;font-weight:700;color:#dc2626">${totalWeak} Weak Topic${totalWeak !== 1 ? 's' : ''}</div>
            <div style="font-size:.68rem;color:var(--ink-3)">Flagged by coordinator — needs re-teaching</div>
          </div>
        </div>
        ${renderChapterList(weakByChapter, '#dc2626', '#fee2e2', '⚠', 'weak')}
      </div>
      ` : ''}

      ${totalRevisit > 0 ? `
      <div style="background:white;border:1px solid #fde68a;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:1rem">↺</span>
          <div>
            <div style="font-size:.78rem;font-weight:700;color:#d97706">${totalRevisit} Topic${totalRevisit !== 1 ? 's' : ''} Marked for Revisit</div>
            <div style="font-size:.68rem;color:var(--ink-3)">Scheduled for additional review</div>
          </div>
        </div>
        ${renderChapterList(revisitByChapter, '#d97706', '#fef9c3', '↺', 'revisit')}
      </div>
      ` : ''}
    </div>
  `;

  container.appendChild(panel);
}

// -----------------------------------------------------------
// INTERACTIONS
// -----------------------------------------------------------
function toggleDone(ci, ti) {
  if (!currentClass || currentClass === 'default') {
    showToast('Select a class first to save progress', 'warn');
    return;
  }
  const cur = DATA[ci].topics[ti].status;
  // Cycle: pending → inprogress → done → pending (revisit stays out of cycle — use pill)
  const next = cur === 'pending' ? 'inprogress' : cur === 'inprogress' ? 'done' : 'pending';
  DATA[ci].topics[ti].status = next;
  // Clear status filter so the topic doesn't disappear after status change
  if (filterStatus !== 'all') {
    filterStatus = 'all';
    document.querySelectorAll('[data-status]').forEach(c => c.classList.toggle('on', c.dataset.status === 'all'));
  }
  saveState(); render();
}

function bulkMarkDone(ci) {
  if (!currentClass || currentClass === 'default') {
    showToast('Select a class first to save progress', 'warn');
    return;
  }
  const ch = DATA[ci];
  if (!ch) return;
  const allDone = ch.topics.every(t => t.status === 'done');
  // Toggle: if all done → reset to pending; otherwise → mark all done
  const newStatus = allDone ? 'pending' : 'done';
  ch.topics.forEach(t => { t.status = newStatus; });
  saveState(); render();
  showToast(allDone ? 'Chapter reset to pending' : 'All topics marked done');
}

function setStatus(ci, ti, val) {
  if (!currentClass || currentClass === 'default') {
    showToast('Select a class first to save progress', 'warn');
    return;
  }
  DATA[ci].topics[ti].status = val;
  // Clear status filter so the topic doesn't disappear after status change
  if (filterStatus !== 'all') {
    filterStatus = 'all';
    document.querySelectorAll('[data-status]').forEach(c => c.classList.toggle('on', c.dataset.status === 'all'));
  }
  saveState(); render();
}

function scrollToChapter(ci) {
  // Switch to pacing tab (update button state too)
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  const pacingTab = document.querySelector('.tab-btn[onclick*="pacing"]');
  if (pacingTab) pacingTab.classList.add('on');
  switchViewById('pacing');

  // Make sure chapter is on the visible page
  const filteredChIndices = DATA.map((ch, idx) => idx).filter(idx => {
    const ch = DATA[idx];
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    return ch.topics.some(t => matchesSyllabusFilter(t));
  });
  const pos = filteredChIndices.indexOf(ci);
  if (pos >= 0) chapterPage = Math.floor(pos / getChapterPageSize());
  renderPacing();

  setTimeout(() => {
    const el = document.getElementById(`ch-${ci}`);
    if (!el) return;
    el.classList.remove('collapsed');
    // Flash the chapter header briefly to draw attention
    el.style.transition = 'box-shadow .2s';
    el.style.boxShadow = '0 0 0 3px rgba(41,128,185,.35)';
    setTimeout(() => { el.style.boxShadow = ''; }, 1200);
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 60);
}

let _resetTimer = null;
function resetMyProgress() {

    DATA.forEach(ch => ch.topics.forEach(t => t.status = 'pending'));

    btn._timer = setTimeout(() => {
      btn.dataset.confirming = '';
      btn.textContent = 'Reset My Progress';
      btn.style.background = '';
    }, 3000);
  }
}

async function buildClassSelector() {
  const wrap   = document.getElementById('classSelectorWrap');
  const select = document.getElementById('classSelect');
  if (!wrap || !select) return;

  const p       = window.userProfile;
  const isAdmin = p?.role_teachershub === 'teachers_admin';
  const COMBO   = 'igcse_physics';

  if (!isAdmin) {
    const combos = Array.isArray(p?.teaching_combos) ? p.teaching_combos : [];
    if (!combos.includes(COMBO)) {
      _showNotAssigned('IGCSE Physics', 'igcse');
      return;

  let effectiveList = [];
  if (isAdmin) {
    const schoolId = p?.schoolId;
    if (schoolId) {
      try {
        const snap = await getDocs(query(collection(db, 'schools', schoolId, 'classes'), orderBy('grade'), orderBy('section')));
        snap.forEach(d => effectiveList.push(d.data().name));
      } catch { /* ignore */ }

  wrap.style.display = effectiveList.length > 0 ? 'flex' : 'none';
  select.innerHTML = '<option value="default">All Classes</option>';

    select.appendChild(opt);

const CAMBRIDGE_CMD_WORDS = {
  'Calculate':   'Work out from given facts, figures or information.',
  'Construct':   'Make an accurate drawing.',
  'Determine':   'Establish with certainty.',
  'Describe':    'State the points of a topic / give characteristics and main features.',
  'Explain':     'Set out purposes or reasons / make the relationships between things clear.',
  'Give':        'Produce an answer from a given source or recall/memory.',
  'Plot':        'Mark accurate points on a graph using data given.',
  'Show (that)': 'Provide structured evidence that leads to a given result.',
  'Sketch':      'Make a simple freehand drawing showing the key features.',
  'State':       'Express in clear terms.',
  'Work out':    'Calculate from given facts, figures or information.',
  'Write':       'Give an answer in a specific form.',
  'Write down':  'Give an answer without needing to show working.',
};

// Detect which command words are likely relevant to a syllabus entry
function detectCmdWords(entry) {
  if (!entry) return [];
  const text = [
    entry.title || '',
    entry.description || '',
    ...(entry.content || []),
    ...(entry.notes || entry.notesExamples || []),
  ].join(' ').toLowerCase();

  return Object.keys(CAMBRIDGE_CMD_WORDS).filter(cw => {
    const lower = cw.toLowerCase();
    return text.includes(lower) || text.includes(lower.replace(' (that)', ''));
  });
}

function renderCmdWordBadges(entry) {
  const detected = detectCmdWords(entry);
  // Always show all 13 command words; highlight detected ones
  const chips = Object.keys(CAMBRIDGE_CMD_WORDS).map(cw => {
    const isDetected = detected.includes(cw);
    const style = isDetected
      ? 'background:#eef4ff;color:#1a5fa8;border-color:#c2d8f5;font-weight:700'
      : '';
    return `<span class="cmd-chip" title="${escHtml(CAMBRIDGE_CMD_WORDS[cw])}" style="${style}">${escHtml(cw)}</span>`;
  }).join('');
  return `<div class="cmd-words-wrap">
    <div class="cmd-words-label">Cambridge Command Words</div>
    <div class="cmd-word-chips">${chips}</div>
  </div>`;
}

var syllabusIndex = {};

// Lookup helper: tries exact key, then _core / _supplement suffixes.
// Biology/Chemistry/Physics docs are stored as "0610_1.1_core" etc.
function lookupSyllabus(prefix, code) {
  const exact = prefix + '_' + code;
  if (syllabusIndex[exact]) return { key: exact, entry: syllabusIndex[exact] };
  for (const suffix of ['_core', '_supplement', '_extended']) {
    const k = exact + suffix;
    if (syllabusIndex[k]) return { key: k, entry: syllabusIndex[k] };
  }
  return { key: exact, entry: undefined };
}

function tierBadgeHtml(tier, alwaysSlot = false) {
  const t = (tier || '').toLowerCase();
  const label = t === 'core' ? 'C' : t === 'supplement' ? 'S' : t === 'extended' ? 'E' : '';
  if (!label) return alwaysSlot ? '<span></span>' : '';
  return `<span class="syl-tier-badge ${t}">${label}</span>`;
}

function openSyllabusDetail(indexKey) {
  const entry = syllabusIndex[indexKey];
  const modal = document.getElementById('syllabusDetailModal');
  const body  = document.getElementById('syllabusDetailBody');
  if (!modal || !body) return;

  if (!entry) {
    body.innerHTML = `<p class="syl-no-detail">No syllabus data found for <strong>${escHtml(indexKey)}</strong>.</p>`;
  } else {
    const code        = entry.code || indexKey.split('_').slice(1).join('_');
    const title       = entry.title || '';
    const topic       = entry.topicArea || entry.topic || '';
    const tier        = entry.tier || '';
    const description = entry.description || '';
    const content     = entry.content || [];
    const notes       = entry.notes || entry.notesExamples || [];

    const descHtml = description
      ? `<p class="syl-description">${escHtml(description)}</p>`
      : '';

    const leftHtml = content.length
      ? `<p class="syl-section-label">Learning Objectives</p>
         <ul class="syl-content-list">${content.map(c => `<li>${escHtml(c)}</li>`).join('')}</ul>`
      : `<p class="syl-no-detail">No objectives listed.</p>`;

    const rightHtml = notes.length
      ? `<p class="syl-section-label">Notes and Examples</p>
         <ul class="syl-notes-list">${notes.map(n => `<li>${escHtml(n)}</li>`).join('')}</ul>`
      : '';

    const colsHtml = (content.length && notes.length)
      ? `<div class="syl-cols"><div class="syl-col">${leftHtml}</div><div class="syl-col">${rightHtml}</div></div>`
      : leftHtml + rightHtml || `<p class="syl-no-detail">No detailed content available.</p>`;

    body.innerHTML = `
      <div class="syl-detail-header">
        <span class="syl-detail-code">${escHtml(code)}</span>
        <div class="syl-detail-meta">
          ${title ? `<div class="syl-detail-title">${escHtml(title)}</div>` : ''}

        ${tier ? `<span class="syl-detail-tier">${escHtml(tier)}</span>` : ''}
      </div>
      ${descHtml}
      ${colsHtml}
      ${renderCmdWordBadges(entry)}`;
  }

  modal.classList.add('open');
}

  if (modal) modal.classList.remove('open');
}

    document.getElementById('objModalBody').innerHTML = objRaw ||
      '<p style="color:var(--ink-3);font-size:.8rem">No objectives listed for this topic.</p>';

    const parts = objRaw.split(/\n\n+/).filter(Boolean);
    document.getElementById('objModalBody').innerHTML = parts.map(p => {
      const colonIdx = p.indexOf(':');
      const code = colonIdx > -1 ? p.substring(0, colonIdx) : '';

// -----------------------------------------------------------
// AO BADGE HELPERS
// Cambridge IGCSE 0580: AO1 = Knowledge & techniques (Core 60-70%, Ext 40-50%)
//                       AO2 = Analyse/Interpret/Communicate (Core 30-40%, Ext 50-60%)
// Topic-level AO is derived from the objective codes:
//   - Pure computation/recall topics → AO1
//   - Problem-solving / reasoning / interpretation topics → AO2
//   - Mixed → both
// We read from t.ao field if set by coordinator; otherwise infer from syllabus tier.
// -----------------------------------------------------------
// AO inference — Cambridge IGCSE 0580
// AO1: recall and apply mathematical knowledge; carry out routine procedures
// AO2: analyse, interpret, communicate mathematically
// Source: Cambridge 0580 syllabus assessment objectives
const AO1_KEYWORDS = [
  'calculate', 'state', 'write down', 'give', 'find', 'work out',
  'construct', 'sketch', 'plot', 'draw', 'measure', 'complete', 'list',
  'convert', 'simplify', 'expand', 'factorise', 'substitute', 'solve',
  'use', 'apply', 'carry out', 'perform', 'recall', 'express',
  'write', 'evaluate', 'compute',
];
const AO2_KEYWORDS = [
  'interpret', 'analyse', 'show that', 'prove', 'derive', 'justify',
  'explain', 'describe', 'deduce', 'determine', 'predict', 'generalise',
  'compare', 'comment', 'reason', 'formulate', 'model', 'make connections',
  'identify pattern', 'identify strategy', 'select appropriate',
  'communicate', 'present', 'discuss',
];

function inferAO(t) {
  // If explicitly tagged by coordinator, use that
  if (t.ao === 'AO1') return 'AO1';
  if (t.ao === 'AO2') return 'AO2';
  if (t.ao === 'AO1+AO2') return 'AO1+AO2';

  // Infer from topic name + objective text (strip HTML first)
  const raw = ((t.topic || '') + ' ' + (t.objective || t.objectives || '')).toLowerCase();
  const text = raw.replace(/<[^>]*>/g, ' ');
  const hasAO1 = AO1_KEYWORDS.some(kw => text.includes(kw));
  const hasAO2 = AO2_KEYWORDS.some(kw => text.includes(kw));
  if (hasAO1 && hasAO2) return 'AO1+AO2';
  if (hasAO2) return 'AO2';
  return 'AO1'; // default: most IGCSE math topics are primarily procedural (AO1)
}

function renderAoBadges(t) {
  const ao = inferAO(t);
  if (ao === 'AO1+AO2') {
    return `<span class="ao-badges-wrap"><span class="ao-badge ao1" title="AO1: Knowledge &amp; techniques">AO1</span><span class="ao-badge ao2" title="AO2: Analyse &amp; interpret">AO2</span></span>`;
  }
  if (ao === 'AO2') return `<span class="ao-badge ao2" title="AO2: Analyse, interpret &amp; communicate">AO2</span>`;
  return `<span class="ao-badge ao1" title="AO1: Knowledge &amp; techniques">AO1</span>`;
}

// -----------------------------------------------------------
// PAPER INDICATOR HELPERS
// Cambridge 0580: Core = Paper 1 (non-calc) + Paper 3 (calc)
//                 Extended = Paper 2 (non-calc) + Paper 4 (calc)
// Derived from topic's syllabus code prefix: C = Core, E = Extended
// -----------------------------------------------------------
function renderPaperBadge(t) {
  const codes = parseObjCodes(t.objective || '', t.syllabusRefs || []);
  const hasC = codes.some(c => c.startsWith('C'));
  const hasE = codes.some(c => c.startsWith('E'));
  if (hasC && hasE) {
    return `<span class="paper-badge both" title="Tested in Paper 1+3 (Core) and Paper 2+4 (Extended)">P1/2/3/4</span>`;
  }
  if (hasE) {
    return `<span class="paper-badge extended" title="Extended only — Paper 2 (non-calc) &amp; Paper 4 (calc)">P2+P4 Ext</span>`;
  }
  if (hasC) {
    return `<span class="paper-badge core" title="Core — Paper 1 (non-calc) &amp; Paper 3 (calc)">P1+P3 Core</span>`;
  }
  return ''; // no codes — no badge
}

// Migrate a raw statuses map: rewrite any legacy "ci-ti" keys → "chId.tId"
// using the current sharedStructure as the lookup table.
function _migrateLegacyKeys(rawStatuses) {
  const migrated = {};
  const legacyPattern  = /^(\d+)-(\d+)$/;
  const legacyPrefixed = /^(note|diag|actual)-(\d+)-(\d+)$/;

  Object.entries(rawStatuses).forEach(([k, v]) => {
    let m;
    if ((m = k.match(legacyPattern))) {
      const ci = parseInt(m[1]), ti = parseInt(m[2]);
      const ch = sharedStructure[ci], t = ch?.topics?.[ti];
      if (ch?.id && t?.id) migrated[_topicKey(ch.id, t.id)] = v;
      // else discard — orphan from deleted chapter/topic
    } else if ((m = k.match(legacyPrefixed))) {
      const pfx = m[1], ci = parseInt(m[2]), ti = parseInt(m[3]);
      const ch = sharedStructure[ci], t = ch?.topics?.[ti];
      if (ch?.id && t?.id) migrated[_prefixKey(pfx, ch.id, t.id)] = v;
    } else {
      migrated[k] = v; // already new format or unknown — keep as-is
    }
  });
  return migrated;
}

// -- Merge shared structure + per-user statuses → window.DATA ------
async function _mergeAndRender(isFirstLoad) {
  if (!sharedStructure) return;

  // Migrate legacy ci-ti keys once, then persist so next load skips migration
  const hasLegacy = Object.keys(userStatuses).some(k => /^\d+-\d+$/.test(k) || /^(note|diag|actual)-\d+-\d+$/.test(k));
  if (hasLegacy) {
    userStatuses = _migrateLegacyKeys(userStatuses);
    // Persist migrated keys so future loads start clean
    const progressKey = currentClass && currentClass !== 'default'
      ? `statuses_${currentClass.replace(/\s/g,'_')}`
      : 'statuses';
    setDoc(doc(window.db, 'userProgress', currentUID),
      { [progressKey]: userStatuses, updatedAt: serverTimestamp() },
      { merge: true }
    ).catch(e => console.warn('Migration persist error:', e));
  }

  window.DATA = sharedStructure.map((ch) => ({
    ...ch,
    topics: (ch.topics || []).map((t) => {
      // Only read status if both IDs are present (topics without id have no saved progress)
      if (!ch.id || !t.id) return { ...t, status: 'pending', note: '', diag: '', actualHour: null };
      const k = _topicKey(ch.id, t.id);
      return {
        ...t,
        status:     userStatuses[k]             || 'pending',
        note:       userStatuses[`note.${k}`]   || '',
        diag:       userStatuses[`diag.${k}`]   || '',
        actualHour: userStatuses[`actual.${k}`] != null
                      ? Number(userStatuses[`actual.${k}`]) : null,
      };
    }),
  }));

  if (isFirstLoad) {
    const _ls = document.getElementById('loadingScreen'); if (_ls) _ls.style.display = 'none';
    await buildClassSelector();
    render();
  } else {
    render();
  }
}

// -- Start real-time listeners -------------------------------------
function _startSnapshot(uid) {
  if (unsubStructure) unsubStructure();
  if (unsubUserProg)  unsubUserProg();

  currentUID  = uid;

  const db           = window.db;
  const structureRef = doc(db, window.SUBJECT_CONFIG.collection, window.SUBJECT_CONFIG.docId);
  const userProgRef  = doc(db, 'userProgress', uid);

  let firstLoad      = true;
  let structureReady = false;
  let progressReady  = false;

  function tryRender() {
    if (!structureReady || !progressReady) return;
    const fl = firstLoad;
    firstLoad = false;
    _mergeAndRender(fl);
  }

  // -- Shared structure listener ---------------------------------
  unsubStructure = onSnapshot(structureRef, (snap) => {
    sharedStructure = snap.exists() && Array.isArray(snap.data().chapters)
      ? snap.data().chapters : [];
    // Load class list from structure meta
    if (snap.exists() && Array.isArray(snap.data().classes)) {
      classList = snap.data().classes;
    }
    // Load objective code prefixes from structure meta (set by CH admin in Settings)
    if (snap.exists() && Array.isArray(snap.data().objPrefixes) && snap.data().objPrefixes.length) {
      _objPrefixes = snap.data().objPrefixes;
    }
    structureReady = true;
    tryRender();
  }, async (err) => {
    console.error('Structure snapshot error:', err);
    sharedStructure = [];
    structureReady  = true;
    await buildClassSelector();
    render();
    showToast('Firestore connection error');
  });

  // Per-user progress listener — key is class-scoped
  function _progressKey() {
    return currentClass && currentClass !== 'default'
      ? `statuses_${currentClass.replace(/\s/g,'_')}`
      : 'statuses';
  }

  // -- Per-user progress listener --------------------------------
  unsubUserProg = onSnapshot(userProgRef, (snap) => {
    userStatuses  = (snap.exists() && snap.data()[_progressKey()])
       ? snap.data()[_progressKey()] : {};
    progressReady = true;
    tryRender();
  }, (err) => {
    console.error('User progress snapshot error:', err);
    userStatuses  = {};
    progressReady = true;
    tryRender();
  });

  // Fallback: if Firestore snapshots don't return within 8s, unblock the UI
  setTimeout(async () => {
    if (!structureReady || !progressReady) {
      sharedStructure = sharedStructure || [];
      userStatuses    = userStatuses    || {};
      structureReady  = true;
      progressReady   = true;
      const _ls = document.getElementById('loadingScreen'); if (_ls) _ls.style.display = 'none';
      await buildClassSelector();
      render();
    }
  }, 8000);
}

// -- Expose Firestore helpers for use in plain <script> blocks -----
window.__fbFS = { getDoc, getDocs, collection, doc, query, orderBy };

// -- Save to Firestore ---------------------------------------------
window.__fbSaveState = async function(data) {
  if (!currentUID) return;

  // Backfill any missing IDs in DATA before saving.
  // This handles legacy Firestore docs that predate the stable-ID system.
  // The backfilled IDs are also written to the structure so CH stays in sync.
  let needsStructureWrite = false;
  data.forEach(ch => {
    if (!ch.id) { ch.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6); needsStructureWrite = true; }
    (ch.topics || []).forEach(t => {
      if (!t.id) { t.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6); needsStructureWrite = true; }
    });
  });
  if (needsStructureWrite) {
    // Write backfilled IDs back to the shared pacing structure so all users benefit
    const structureOnly = data.map(ch => ({
      ...ch,
      topics: ch.topics.map(({ status, note, diag, actualHour, ...rest }) => rest),
    }));
    setDoc(
      doc(window.db, window.SUBJECT_CONFIG.collection, window.SUBJECT_CONFIG.docId),
      { chapters: structureOnly, updatedAt: serverTimestamp() },
      { merge: true }
    ).catch(e => console.warn('ID backfill structure write error:', e));
  }

  // 1. Build this user's status map keyed by stable chId.tId
  //    Skip 'pending' to keep doc lean.
  const newStatuses = {};
  data.forEach((ch) => {
    if (!ch.id) return;
    (ch.topics || []).forEach((t) => {
      if (!t.id) return;
      const k = _topicKey(ch.id, t.id);
      if (t.status && t.status !== 'pending') {
        newStatuses[k] = t.status;
      }
      if (t.note && t.note.trim()) {
        newStatuses[`note.${k}`] = t.note.trim();
      }
      if (t.diag && t.diag.trim()) {
        newStatuses[`diag.${k}`] = t.diag.trim();
      }
      if (t.actualHour !== null && t.actualHour !== undefined) {
        newStatuses[`actual.${k}`] = t.actualHour;
      }
    });
  });

  // 2. Save user's own progress (class-scoped key).
  //    Use merge:true so other class keys in the same doc are preserved.
  //    The active class key is fully replaced (no merge inside it) — this
  //    clears orphan entries from deleted topics automatically.
  const progressKey = currentClass && currentClass !== 'default'
    ? `statuses_${currentClass.replace(/\s/g,'_')}`
    : 'statuses';
  try {
    await setDoc(
      doc(window.db, 'userProgress', currentUID),
      { [progressKey]: newStatuses, updatedAt: serverTimestamp() },
      { merge: true }
    );
  } catch(e) {
    console.error('User progress save error:', e);
    showToast('Save failed - check connection');
    return;
  }

  // Teachers only write their own progress — structure is managed by Central Hub admin.
};

// -- One-shot document fetch for cross-subject data --
window.__fbGetDoc = async function(colName, docName) {
  const db = window.db;
  const snap = await getDoc(doc(db, colName, docName));
  if (snap.exists() && Array.isArray(snap.data().chapters)) {
    return snap.data().chapters;
  }
  return [];
};

// -- Class switching: reload user progress from class-specific sub-key --
window.__fbSwitchClass = function(cls) {
  if (!sharedStructure) return;
  currentClass = cls;
  _startSnapshot(currentUID);
};

// Class groups are managed exclusively in Central Hub (igcse-pacing.html settings).
// Teachers Hub reads classList from the physics_pacing snapshot — do not write it here.

// -- Syllabus loader ------------------------------------------------
async function loadSyllabus() {
  try {
    const snap = await getDocs(collection(window.db, 'igcse_syllabus'));
    snap.forEach(d => { window.syllabusIndex[d.id] = d.data(); });
  } catch (e) {
    console.warn('Could not load igcse_syllabus:', e);
  }
}

// -- auth-guard.js dispatches authReady when auth + role confirmed -
document.addEventListener('authReady', ({ detail: { user, profile } }) => {
  // Show tracker link for subject leaders
  const _thSubs = profile.th_sub_roles || [];
  if (_thSubs.includes('subject_leader')) {
    const _tl = document.getElementById('trackerLink');
    if (_tl) _tl.style.display = 'inline-flex';
  }

  loadCalendarSettings(window.db);
  loadSyllabus();

  // Expose signOut for navbar dropdown
  import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js').then(({ signOut }) => {
    window.authSignOut = () => signOut(window.auth).then(() => { window.location.href = 'login.html'; });
  });

  // Load navbar partial
  const nameShort = (user.displayName || user.email.split('@')[0]).split(' ')[0];
  fetch('partials/navbar.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      initNavbar();
      setupNavBadges(window.db, { onSnapshot, collection });
      const nEl = document.getElementById('profileNameShort');
      const aEl = document.getElementById('profileAvatar');
      const wEl = document.getElementById('profileWrap');
      if (nEl) nEl.textContent = nameShort;
      if (aEl && typeof buildAvatarEl === 'function') buildAvatarEl(aEl, user);
      if (wEl) wEl.style.display = 'flex';
    });

  _startSnapshot(user.uid);
});
</script>
