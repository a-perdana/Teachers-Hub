<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Application status â€” Eduversal Careers</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23331e05'/><polygon points='10,45 50,65 50,70 10,50' fill='%23a8650a'/><polygon points='90,45 50,65 50,70 90,50' fill='%23c2780c'/><polygon points='50,25 90,45 50,65 10,45' fill='%23d97706'/><circle cx='76' cy='76' r='20' fill='%23d97706' stroke='%23331e05' stroke-width='3'/><text x='76' y='84' font-family='Georgia,serif' font-size='26' font-weight='bold' text-anchor='middle' fill='white'>T</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
<!-- FIREBASE_ENV -->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1c1c2e; --ink-2: #44445a; --ink-3: #8888a8;
    --paper: #f7f6f3; --paper-2: #efede8; --white: #ffffff;
    --border: #e0ddd6;
    --brand: #6c5ce7; --brand-2: #ede9fe; --brand-dark: #5a4bd1;
    --green: #059669; --green-2: #d1fae5;
    --red: #dc2626;   --red-2: #fee2e2;
    --amber: #b07800;
    --shadow-sm: 0 1px 4px rgba(28,28,46,.07);
    --shadow: 0 3px 14px rgba(28,28,46,.10);
    --radius-lg: 16px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .top-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .brand-mark { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--ink); }
  .brand-logo { height: 34px; padding: 0 12px; background: var(--brand); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(108, 92, 231, 0.25); }
  .brand-logo img { height: 18px; width: auto; display: block; }
  .brand-text { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; }
  .top-bar-link { color: var(--ink-2); text-decoration: none; font-size: 14px; font-weight: 500; }
  .top-bar-link:hover { color: var(--brand); }

  .page-wrap { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; box-shadow: var(--shadow); margin-bottom: 18px; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 18px; }
  .card-head h2 { font-family: 'Lora', serif; font-size: 19px; font-weight: 600; line-height: 1.3; }
  .card-head .sub { color: var(--ink-3); font-size: 13px; margin-top: 4px; }

  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }
  .status-badge.submitted           { background: #f1f5f9; color: #64748b; }
  .status-badge.under_review        { background: #e8f0fb; color: #1a5fa8; }
  .status-badge.shortlisted         { background: var(--brand-2); color: var(--brand-dark); }
  .status-badge.interview_scheduled { background: #cffafe; color: #0e7490; }
  .status-badge.interview_done      { background: #fef3c7; color: #92400e; }
  .status-badge.offered             { background: #d1fae5; color: #065f46; }
  .status-badge.hired               { background: #047857; color: white; }
  .status-badge.rejected            { background: #fee2e2; color: #991b1b; }
  .status-badge.withdrew            { background: #e2e8f0; color: #475569; }

  /* Timeline */
  .tl { display: flex; flex-direction: column; gap: 0; padding-left: 8px; margin-top: 18px; }
  .tl-step { position: relative; padding-left: 30px; padding-bottom: 22px; }
  .tl-step:last-child { padding-bottom: 0; }
  .tl-step::before { content: ''; position: absolute; left: 7px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--paper-2); border: 2px solid var(--border); }
  .tl-step::after  { content: ''; position: absolute; left: 11px; top: 18px; bottom: -4px; width: 2px; background: var(--border); }
  .tl-step:last-child::after { display: none; }
  .tl-step.done::before    { background: var(--green); border-color: var(--green); }
  .tl-step.current::before { background: var(--brand); border-color: var(--brand); box-shadow: 0 0 0 4px var(--brand-2); }
  .tl-step .lbl { font-size: 13.5px; font-weight: 600; color: var(--ink-3); }
  .tl-step.done .lbl    { color: var(--ink-2); }
  .tl-step.current .lbl { color: var(--ink); }
  .tl-step .desc { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }

  /* Interview block */
  .iv { background: var(--paper); border-left: 3px solid var(--brand); border-radius: 8px; padding: 14px 16px; margin-top: 16px; }
  .iv-title { font-weight: 700; color: var(--ink); font-size: 13.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .iv-row { font-size: 13px; color: var(--ink-2); margin-bottom: 4px; }
  .iv-row strong { color: var(--ink); margin-right: 6px; }
  .iv-link { display: inline-block; margin-top: 8px; padding: 8px 14px; background: var(--brand); color: white; border-radius: 8px; text-decoration: none; font-size: 13px; font-weight: 600; }
  .iv-link:hover { background: var(--brand-dark); }

  /* Decision block */
  .dec.offered  { background: var(--green-2); border-left-color: var(--green); }
  .dec.rejected { background: var(--red-2); border-left-color: var(--red); }
  .dec { background: var(--paper); border-left: 3px solid var(--ink-3); border-radius: 8px; padding: 14px 16px; margin-top: 16px; }
  .dec h3 { font-family: 'Lora', serif; font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
  .dec p { font-size: 13.5px; color: var(--ink-2); }

  /* Withdraw button */
  .withdraw-btn { background: transparent; border: 1.5px solid var(--border); color: var(--ink-3); padding: 8px 14px; border-radius: 8px; font-family: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; margin-top: 14px; }
  .withdraw-btn:hover { border-color: var(--red); color: var(--red); }

  /* Sign-in / loading / empty */
  .signin { text-align: center; padding: 24px 0; }
  .signin-icon { width: 60px; height: 60px; background: var(--brand-2); color: var(--brand); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 26px; }
  .signin-h { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
  .signin-sub { color: var(--ink-2); font-size: 14px; max-width: 480px; margin: 0 auto 20px; }
  .signin-form { display: flex; gap: 8px; max-width: 420px; margin: 0 auto; }
  .signin-form input { flex: 1; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 9px; font-size: 14px; font-family: inherit; }
  .signin-form input:focus { outline: none; border-color: var(--brand); }
  .signin-form button { padding: 11px 18px; background: var(--brand); color: white; border: none; border-radius: 9px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
  .signin-form button:hover { background: var(--brand-dark); }
  .signin-form button:disabled { opacity: .5; cursor: not-allowed; }

  .alert { padding: 12px 16px; border-radius: 10px; font-size: 13.5px; margin-top: 14px; }
  .alert-success { background: var(--green-2); color: #065f46; border: 1px solid var(--green); }
  .alert-error   { background: var(--red-2);   color: #7f1d1d; border: 1px solid var(--red); }
  .alert-info    { background: var(--brand-2); color: var(--brand-dark); border: 1px solid var(--brand); }

  .loading { text-align: center; padding: 40px; color: var(--ink-3); font-size: 14px; }
  .empty   { text-align: center; padding: 40px; color: var(--ink-3); }
  .empty h3 { font-family: 'Lora', serif; font-size: 18px; color: var(--ink-2); margin-bottom: 6px; font-weight: 600; }

  .footer { text-align: center; color: var(--ink-3); font-size: 12.5px; margin-top: 32px; }
  .footer a { color: var(--ink-2); text-decoration: none; }
</style>
</head>
<body>

<header class="top-bar">
  <a class="brand-mark" href="/careers"><div class="brand-logo"><img src="eduversal-logo-white.png" alt="Eduversal"></div><div class="brand-text">Careers</div></a>
  <a class="top-bar-link" href="/careers">Browse positions</a>
</header>

<div class="page-wrap" id="root">
  <div class="loading">Loadingâ€¦</div>
</div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, isSignInWithEmailLink, signInWithEmailLink, sendSignInLinkToEmail, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, query, where, orderBy, getDocs, doc, updateDoc, serverTimestamp, limit }
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const app = getApps().length ? getApps()[0] : initializeApp({
    apiKey:            window.ENV.FIREBASE_API_KEY,
    authDomain:        window.ENV.FIREBASE_AUTH_DOMAIN,
    projectId:         window.ENV.FIREBASE_PROJECT_ID,
    storageBucket:     window.ENV.FIREBASE_STORAGE_BUCKET,
    messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
    appId:             window.ENV.FIREBASE_APP_ID,
  });
  const db   = getFirestore(app);
  const auth = getAuth(app);

  const escHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  const safeUrl = u => /^https?:\/\//i.test(String(u || '')) ? u : '#';
  function fmtDate(ts) {
    if (!ts) return 'â€”';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(d.getTime())) return 'â€”';
    return d.toLocaleString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  const STATUSES = [
    { key: 'submitted',           label: 'Application received',   desc: 'Thank you. Our hiring team will review.' },
    { key: 'under_review',        label: 'Under review',           desc: 'Your CV is being reviewed.' },
    { key: 'shortlisted',         label: 'Shortlisted',            desc: 'You\'ve been shortlisted for an interview.' },
    { key: 'interview_scheduled', label: 'Interview scheduled',    desc: 'Check the interview details below.' },
    { key: 'interview_done',      label: 'Interview complete',     desc: 'We\'re collating panel feedback.' },
    { key: 'offered',             label: 'Offer extended',         desc: 'Congratulations â€” see the offer note below.' },
    { key: 'hired',               label: 'Hired',                  desc: 'Welcome to the network!' },
  ];

  // â”€â”€ boot â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  // Three flows:
  //   1. URL contains email-link â†’ complete sign-in, then load apps
  //   2. Already signed-in (verified email) â†’ load apps
  //   3. Otherwise â†’ show email entry to request a fresh magic-link
  (async function boot() {
    const root = document.getElementById('root');
    try {
      if (isSignInWithEmailLink(auth, window.location.href)) {
        await completeEmailLinkSignIn();
      }
      onAuthStateChanged(auth, async user => {
        if (user && user.emailVerified) {
          await renderApplications(user);
        } else {
          renderSignIn();
        }
      });
    } catch (err) {
      console.error('[status] boot failed', err);
      root.innerHTML = `<div class="card"><div class="alert alert-error">Could not initialise â€” please refresh the page.</div></div>`;
    }
  })();

  async function completeEmailLinkSignIn() {
    let email = window.localStorage.getItem('eduversal_apply_email');
    if (!email) {
      // Ask the user for their email â€” magic-link requires the original email for security.
      email = window.prompt('Confirm your email address (for security):');
      if (!email) throw new Error('Email confirmation cancelled.');
    }
    try {
      await signInWithEmailLink(auth, email.trim().toLowerCase(), window.location.href);
      window.localStorage.removeItem('eduversal_apply_email');
      // Clean URL so refresh doesn't re-trigger sign-in
      window.history.replaceState({}, document.title, '/careers-status');
    } catch (err) {
      console.error('[status] email-link sign-in failed', err);
      throw err;
    }
  }

  function renderSignIn(extra = '') {
    document.getElementById('root').innerHTML = `
      <div class="card">
        <div class="signin">
          <div class="signin-icon">âœ‰ï¸</div>
          <h2 class="signin-h">Track your application</h2>
          <p class="signin-sub">Enter the email you used to apply. We'll send a magic-link to your inbox; click it to see your application status.</p>
          <form class="signin-form" id="signinForm">
            <input aria-label="you@example.com" id="signinEmail" type="email" placeholder="you@example.com" required />
            <button id="signinBtn" type="submit">Send link</button>
          </form>
          ${extra}
          <p style="font-size:12.5px;color:var(--ink-3);margin-top:18px">First time here? Browse <a href="/careers" style="color:var(--brand)">open positions</a> and submit an application.</p>
        </div>
      </div>
      <div class="footer">Â© Eduversal Â· <a href="/careers">Browse positions</a></div>
    `;
    document.getElementById('signinForm').addEventListener('submit', async e => {
      e.preventDefault();
      const email = (document.getElementById('signinEmail').value || '').trim().toLowerCase();
      if (!email) return;
      const btn = document.getElementById('signinBtn');
      btn.disabled = true; btn.textContent = 'Sendingâ€¦';
      try {
        await sendSignInLinkToEmail(auth, email, {
          url: window.location.origin + '/careers-status',
          handleCodeInApp: true,
        });
        window.localStorage.setItem('eduversal_apply_email', email);
        renderSignIn(`<div class="alert alert-success">Magic-link sent to <strong>${escHtml(email)}</strong>. Open it from your email â€” it works on this device.</div>`);
      } catch (err) {
        console.error('[status] send link failed', err);
        renderSignIn(`<div class="alert alert-error">Could not send link. Double-check the email and try again. (${escHtml(err.code || err.message || '')})</div>`);
      }
    });
  }

  async function renderApplications(user) {
    const root = document.getElementById('root');
    root.innerHTML = `<div class="loading">Loading your applicationsâ€¦</div>`;
    try {
      const qRef = query(
        collection(db, 'job_applications'),
        where('applicantEmail', '==', user.email),
        orderBy('createdAt', 'desc'),
        limit(20)
      );
      const snap = await getDocs(qRef);
      const apps = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (apps.length === 0) {
        root.innerHTML = `
          <div class="card">
            <div class="empty">
              <h3>No applications found</h3>
              <p>We couldn't find any applications under <strong>${escHtml(user.email)}</strong>.</p>
              <p style="margin-top:14px"><a href="/careers" style="color:var(--brand)">Browse open positions â†’</a></p>
            </div>
          </div>
          <div class="footer">Signed in as ${escHtml(user.email)} Â· <a href="#" id="signoutLink">sign out</a></div>
        `;
        wireSignOut();
        return;
      }

      let html = '';
      apps.forEach(a => {
        html += renderAppCard(a);
      });
      html += `<div class="footer">Signed in as ${escHtml(user.email)} Â· <a href="#" id="signoutLink">sign out</a></div>`;
      root.innerHTML = html;
      wireSignOut();
      wireWithdraw();
    } catch (err) {
      console.error('[status] load failed', err);
      root.innerHTML = `<div class="card"><div class="alert alert-error">Could not load your applications. Please refresh, or email <a href="mailto:careers@eduversal.org" style="color:var(--brand)">careers@eduversal.org</a>.</div></div>`;
    }
  }

  function renderAppCard(a) {
    const ap = a.applicant || {};
    const sch = a.interviewSchedule || {};
    const fd  = a.finalDecision;
    const isFinal = a.status === 'hired' || a.status === 'rejected' || a.status === 'withdrew';
    const canWithdraw = !isFinal && a.status !== 'offered';

    // Timeline
    const currentIdx = STATUSES.findIndex(s => s.key === a.status);
    let timelineHtml = '';
    if (a.status === 'rejected' || a.status === 'withdrew') {
      // Final negative outcome â€” show submitted only + final state
      timelineHtml = `
        <div class="tl">
          <div class="tl-step done"><div class="lbl">Application received</div><div class="desc">${escHtml(fmtDate(a.createdAt))}</div></div>
          <div class="tl-step current"><div class="lbl">${a.status === 'rejected' ? 'Not moving forward' : 'Withdrawn'}</div><div class="desc">${escHtml(fmtDate(a.updatedAt))}</div></div>
        </div>`;
    } else {
      timelineHtml = `<div class="tl">${STATUSES.map((s, i) => {
        const cls = i < currentIdx ? 'done' : i === currentIdx ? 'current' : '';
        return `<div class="tl-step ${cls}"><div class="lbl">${escHtml(s.label)}</div>${i === currentIdx ? `<div class="desc">${escHtml(s.desc)}</div>` : ''}</div>`;
      }).join('')}</div>`;
    }

    // Interview block (visible if scheduled)
    let ivHtml = '';
    if (sch.scheduledAt && (a.status === 'interview_scheduled' || a.status === 'interview_done')) {
      ivHtml = `
        <div class="iv">
          <div class="iv-title">ðŸ“… Interview details</div>
          <div class="iv-row"><strong>When:</strong> ${escHtml(fmtDate(sch.scheduledAt))}</div>
          <div class="iv-row"><strong>Mode:</strong> ${escHtml((sch.mode || '').replace(/_/g,' '))}</div>
          ${sch.meetingUrl ? `<div class="iv-row"><strong>Meeting URL:</strong> <a href="${escHtml(safeUrl(sch.meetingUrl))}" target="_blank" rel="noopener" style="color:var(--brand)">${escHtml(sch.meetingUrl)} â†—</a></div>` : ''}
          ${sch.meetingUrl ? `<a class="iv-link" href="${escHtml(safeUrl(sch.meetingUrl))}" target="_blank" rel="noopener">Join meeting â†—</a>` : ''}
        </div>`;
    }

    // Decision block
    let decHtml = '';
    if (fd?.outcome === 'offered') {
      decHtml = `
        <div class="dec offered">
          <h3>ðŸŽ‰ Offer extended</h3>
          <p>${escHtml(fd.note || 'Our team will be in touch shortly with the formal offer letter and next steps.')}</p>
        </div>`;
    } else if (fd?.outcome === 'rejected') {
      decHtml = `
        <div class="dec rejected">
          <h3>Update on your application</h3>
          <p>${escHtml(fd.note || 'Thank you for applying. After careful consideration, we have decided not to move forward at this time. We wish you the best in your career.')}</p>
        </div>`;
    }

    return `
      <div class="card" data-app-id="${escHtml(a.id)}">
        <div class="card-head">
          <div>
            <h2>${escHtml(a.positionTitle || 'Application')}</h2>
            <div class="sub">${escHtml(a.schoolName || '')}${a.createdAt ? ' Â· submitted ' + escHtml(fmtDate(a.createdAt)) : ''}</div>
          </div>
          <span class="status-badge ${escHtml(a.status)}">${escHtml((a.status || '').replace(/_/g,' '))}</span>
        </div>
        ${timelineHtml}
        ${ivHtml}
        ${decHtml}
        ${canWithdraw ? `<button class="withdraw-btn" data-withdraw="${escHtml(a.id)}">Withdraw this application</button>` : ''}
      </div>
    `;
  }

  function wireSignOut() {
    const link = document.getElementById('signoutLink');
    if (!link) return;
    link.addEventListener('click', async (e) => {
      e.preventDefault();
      try { await signOut(auth); } catch (_) {}
      window.location.replace('/careers-status');
    });
  }

  function wireWithdraw() {
    document.querySelectorAll('[data-withdraw]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const appId = btn.dataset.withdraw;
        if (!confirm('Withdraw this application? This cannot be undone.')) return;
        btn.disabled = true; btn.textContent = 'Withdrawingâ€¦';
        try {
          await updateDoc(doc(db, 'job_applications', appId), {
            status:    'withdrew',
            updatedAt: serverTimestamp(),
          });
          // Re-render
          if (auth.currentUser) await renderApplications(auth.currentUser);
        } catch (err) {
          console.error('[status] withdraw failed', err);
          alert('Could not withdraw â€” please email careers@eduversal.org.');
          btn.disabled = false; btn.textContent = 'Withdraw this application';
        }
      });
    });
  }
</script>

</body>
</html>
