<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resource Library — Teachers Hub</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="stylesheet" href="base.css">
<style>
/* ─── SUBJECT COLORS ─────────────────────────────── */
:root {
  --subj-math:      #2563eb;
  --subj-physics:   #7c3aed;
  --subj-chemistry: #d97706;
  --subj-biology:   #059669;
  --subj-general:   #6b7280;

  --type-video:   #7c3aed;
  --type-video-2: #ede9fe;
  --type-pdf:     #dc2626;
  --type-pdf-2:   #fee2e2;
  --type-web:     #059669;
  --type-web-2:   #d1fae5;
  --type-other:   #6b7280;
  --type-other-2: #f3f4f6;
}

/* ─── LAYOUT ─────────────────────────────────────── */
.content-layout {
  display: block;
  max-width: 1280px;
  margin: 0 auto;
  padding: 20px 24px 100px;
}

/* ─── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  width: 220px;
  position: fixed;
  top: 68px;
  left: max(24px, calc(50vw - 640px + 24px));
  display: flex;
  flex-direction: column;
  gap: 24px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
}

/* ─── MAIN AREA ───────────────────────────────────── */
.main-area {
  margin-left: 256px;
}
.sidebar-section { display: flex; flex-direction: column; gap: 5px; }
.sidebar-label {
  font-size: 10px; font-weight: 700; letter-spacing: .09em;
  text-transform: uppercase; color: var(--ink-3);
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.sf-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; text-align: left;
  padding: 7px 10px; border-radius: 8px;
  border: none; background: transparent;
  font-size: 13px; font-weight: 500; color: var(--ink-2);
  cursor: pointer; transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.sf-btn:hover { background: var(--paper-2); color: var(--ink); }
.sf-btn.active { background: var(--paper-2); color: var(--ink); font-weight: 700; }
.sf-type-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

/* stat rows */
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 2px; font-size: 13px; color: var(--ink-2);
}
.stat-row .stat-val { font-weight: 700; color: var(--ink); }
.stat-type-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 2px; font-size: 12px; color: var(--ink-3);
}
.stat-type-row .stat-val { font-weight: 600; color: var(--ink-2); }


/* ─── SEARCH BAR ────────────────────────────────── */
.search-wrap {
  position: relative; margin-bottom: 16px;
}
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-3); pointer-events: none;
  display: flex; align-items: center;
}
.search-input {
  width: 100%; padding: 10px 12px 10px 38px;
  border: 1px solid var(--border); border-radius: 10px;
  font-size: 13.5px; font-family: 'DM Sans', sans-serif;
  color: var(--ink); outline: none; background: var(--white);
  transition: border-color .15s;
  box-sizing: border-box;
}
.search-input:focus { border-color: var(--ink-2); }
.search-input::placeholder { color: var(--ink-3); }

/* ─── RESOURCE COUNT ─────────────────────────────── */
.resource-count {
  font-size: 12.5px; color: var(--ink-3); margin-bottom: 18px;
  font-weight: 500;
}

/* ─── GRIDS ──────────────────────────────────────── */
.res-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 20px;
}
.res-grid.grid-video {
  grid-template-columns: 1fr;
  gap: 20px;
}
.res-grid.grid-pdf {
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* ─── DELETE BUTTON (shared) ─────────────────────── */
.res-del-btn {
  position: absolute; top: 12px; right: 12px;
  width: 26px; height: 26px; border-radius: 7px;
  background: rgba(255,255,255,.85); border: 1px solid var(--border);
  color: var(--ink-3); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; z-index: 2;
  backdrop-filter: blur(4px);
}
.res-del-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }

/* ─── SHARED FOOTER ──────────────────────────────── */
.res-meta { font-size: 11.5px; color: var(--ink-3); }
.res-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* ─── VIDEO CARD ─────────────────────────────────── */
.card-video {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: row;
  position: relative;
  transition: box-shadow .2s, transform .2s;
}
.card-video:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

.video-thumb {
  width: 260px;
  flex-shrink: 0;
  background: linear-gradient(135deg, #1a1035 0%, #2d1b69 50%, #1e0f3d 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  min-height: 160px;
}
.video-thumb::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(124,58,237,.25) 0%, transparent 70%);
}
.video-play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(255,255,255,.15);
  border: 2px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 20px;
  position: relative; z-index: 1;
  backdrop-filter: blur(8px);
  transition: all .2s;
}
.card-video:hover .video-play-btn {
  background: var(--type-video);
  border-color: var(--type-video);
  transform: scale(1.08);
}

.video-body {
  flex: 1; min-width: 0; overflow: hidden;
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 8px;
}
.card-video .res-title {
  -webkit-line-clamp: 1;
  white-space: nowrap;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-video .res-desc {
  -webkit-line-clamp: 2;
}
.video-subject-chip {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
  background: var(--type-video-2); color: var(--type-video);
  align-self: flex-start;
}
.res-title {
  font-size: 15px; font-weight: 700; color: var(--ink);
  line-height: 1.3;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.res-desc {
  font-size: 13px; color: var(--ink-2); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; flex: 1;
}
.res-open-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px;
  border: none; color: white;
  font-size: 12.5px; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.res-open-btn.btn-video { background: var(--type-video); }
.res-open-btn.btn-video:hover { background: #6d28d9; }

/* ─── PDF CARD ───────────────────────────────────── */
.card-pdf {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 5px solid var(--type-pdf);
  border-radius: 0 12px 12px 0;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  position: relative;
  transition: box-shadow .2s, transform .2s;
}
.card-pdf:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

.pdf-preview {
  background: #fafafa;
  border-bottom: 1px solid var(--border);
  padding: 20px;
  display: flex; align-items: center; justify-content: center;
  min-height: 110px;
}
.pdf-doc-icon {
  display: flex; flex-direction: column; gap: 4px;
  align-items: center;
}
.pdf-doc-icon svg { color: var(--type-pdf); }
.pdf-lines {
  display: flex; flex-direction: column; gap: 4px;
  margin-top: 6px;
}
.pdf-line {
  height: 4px; border-radius: 2px;
  background: #e5e7eb;
}
.pdf-line:nth-child(1) { width: 80px; }
.pdf-line:nth-child(2) { width: 60px; }
.pdf-line:nth-child(3) { width: 70px; }

.pdf-body {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.pdf-subject-chip {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
  background: var(--type-pdf-2); color: var(--type-pdf);
  align-self: flex-start;
}
.res-open-btn.btn-pdf { background: var(--type-pdf); }
.res-open-btn.btn-pdf:hover { background: #b91c1c; }

/* ─── WEBSITE CARD ───────────────────────────────── */
.card-website {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  position: relative;
  transition: box-shadow .2s, transform .2s;
}
.card-website:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

.browser-bar {
  background: #f3f4f6;
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.browser-dots {
  display: flex; gap: 5px; flex-shrink: 0;
}
.browser-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.browser-dot:nth-child(1) { background: #ef4444; }
.browser-dot:nth-child(2) { background: #f59e0b; }
.browser-dot:nth-child(3) { background: #22c55e; }
.browser-url {
  flex: 1; min-width: 0;
  font-size: 11px; font-family: monospace;
  color: var(--ink-3); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 8px;
}

.website-body {
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
  flex: 1;
}
.web-subject-chip {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
  background: var(--type-web-2); color: var(--type-web);
  align-self: flex-start;
}
.res-open-btn.btn-website { background: var(--type-web); }
.res-open-btn.btn-website:hover { background: #047857; }

/* ─── OTHER CARD ─────────────────────────────────── */
.card-other {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column;
  position: relative;
  transition: box-shadow .2s, transform .2s;
  padding: 18px 20px;
  gap: 10px;
}
.card-other:hover { box-shadow: var(--shadow); transform: translateY(-2px); }

.other-icon-row {
  display: flex; align-items: center; gap: 10px;
}
.other-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--type-other-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.other-subject-chip {
  display: inline-block;
  padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600;
  background: var(--type-other-2); color: var(--type-other);
}
.res-open-btn.btn-other { background: var(--type-other); }
.res-open-btn.btn-other:hover { background: #4b5563; }

/* ─── SUBJECT COLOR HELPERS ──────────────────────── */
.card-pdf[data-subject="Math"]      { border-left-color: var(--subj-math); }
.card-pdf[data-subject="Physics"]   { border-left-color: var(--subj-physics); }
.card-pdf[data-subject="Chemistry"] { border-left-color: var(--subj-chemistry); }
.card-pdf[data-subject="Biology"]   { border-left-color: var(--subj-biology); }
.card-pdf[data-subject="General"]   { border-left-color: var(--subj-general); }

/* ─── ADD RESOURCE MODAL ─────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  z-index: 500; display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--white); border-radius: 18px;
  width: 100%; max-width: 560px; padding: 28px 28px 24px;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column; gap: 18px;
  max-height: 90vh; overflow-y: auto;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 17px; font-weight: 700; color: var(--ink); margin: 0; }
.modal-close-btn {
  width: 30px; height: 30px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent;
  color: var(--ink-3); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 14px; transition: all .15s;
  font-family: 'DM Sans', sans-serif;
}
.modal-close-btn:hover { background: var(--paper-2); color: var(--ink); }

.modal-field { display: flex; flex-direction: column; gap: 6px; }
.modal-label { font-size: 12.5px; font-weight: 600; color: var(--ink-2); }
.modal-input, .modal-textarea, .modal-select {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 9px;
  font-size: 13.5px; font-family: 'DM Sans', sans-serif;
  color: var(--ink); outline: none; background: var(--paper);
  transition: border-color .15s; box-sizing: border-box;
}
.modal-input:focus, .modal-textarea:focus, .modal-select:focus {
  border-color: var(--ink-2); background: var(--white);
}
.modal-textarea { min-height: 80px; resize: vertical; line-height: 1.6; }

/* type selector — icon cards */
.type-cards {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.type-card {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 12px 8px; border-radius: 10px;
  border: 2px solid var(--border); cursor: pointer;
  font-size: 11.5px; font-weight: 600; color: var(--ink-2);
  transition: all .15s; user-select: none; background: var(--paper);
  text-align: center;
}
.type-card input { display: none; }
.type-card-icon { font-size: 22px; line-height: 1; }
.type-card:has(input:checked) { border-color: var(--accent-active); color: var(--accent-active); background: var(--accent-bg); }
.type-card[data-type="video"]:has(input:checked)   { border-color: var(--type-video); color: var(--type-video); background: var(--type-video-2); }
.type-card[data-type="pdf"]:has(input:checked)     { border-color: var(--type-pdf); color: var(--type-pdf); background: var(--type-pdf-2); }
.type-card[data-type="website"]:has(input:checked) { border-color: var(--type-web); color: var(--type-web); background: var(--type-web-2); }
.type-card[data-type="other"]:has(input:checked)   { border-color: var(--type-other); color: var(--type-other); background: var(--type-other-2); }

.modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
.modal-cancel {
  padding: 9px 20px; border-radius: 9px; border: 1px solid var(--border);
  background: transparent; color: var(--ink-2); font-size: 13px;
  font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500;
  transition: all .15s;
}
.modal-cancel:hover { background: var(--paper-2); }
.modal-add {
  padding: 9px 22px; border-radius: 9px; border: none;
  background: var(--ink); color: white; font-size: 13px;
  font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 600;
  transition: all .15s;
}
.modal-add:hover { opacity: .85; }
.modal-add:disabled { opacity: .5; cursor: default; }
.modal-err { font-size: 12px; color: #dc2626; min-height: 16px; }

/* ─── CONFIRM DIALOG ─────────────────────────────── */
.confirm-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5); backdrop-filter: blur(3px);
  z-index: 600; display: none; align-items: center; justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--white); border-radius: 14px;
  padding: 28px 28px 22px; max-width: 360px; width: 90%;
  box-shadow: var(--shadow-lg); text-align: center;
}
.confirm-box h4 { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.confirm-box p { font-size: 13px; color: var(--ink-2); margin-bottom: 22px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.confirm-cancel { padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--ink-2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 500; transition: background .15s; }
.confirm-cancel:hover { background: var(--paper-2); }
.confirm-delete { padding: 8px 20px; border-radius: 8px; border: none; background: #dc2626; color: white; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; font-weight: 600; transition: opacity .15s; }
.confirm-delete:hover { opacity: .85; }

/* ─── FLOATING HOME BUTTON ────────────────────────── */
.home-float {
  position: fixed; bottom: 22px; left: 22px;
  width: 42px; height: 42px; border-radius: 12px;
  background: var(--ink); border: 1px solid rgba(255,255,255,0.10);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.5); text-decoration: none;
  box-shadow: 0 4px 18px rgba(28,28,46,0.35);
  transition: all 0.22s cubic-bezier(0.16,1,0.3,1); z-index: 150;
}
.home-float:hover {
  color: white; background: #374151; border-color: #4b5563;
  box-shadow: 0 6px 24px rgba(28,28,46,0.45); transform: translateY(-2px);
}

/* ─── ADD FAB ────────────────────────────────────── */
.add-fab {
  position: fixed; bottom: 22px; right: 22px;
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px 0 16px; height: 48px; border-radius: 24px;
  background: var(--ink); border: none; color: white;
  font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 18px rgba(28,28,46,.4);
  transition: all .22s cubic-bezier(0.16,1,0.3,1);
  font-family: 'DM Sans', sans-serif; z-index: 150;
}
.add-fab:hover { opacity: .85; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(28,28,46,.5); }
.add-fab svg { width: 18px; height: 18px; }

/* ─── EMPTY STATE ────────────────────────────────── */
.empty-state {
  grid-column: 1 / -1;
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 20px; gap: 12px;
}
.empty-state-icon { font-size: 40px; }
.empty-state p { font-size: 14px; color: var(--ink-3); }
</style>
</head>
<body>

<div id="navbar-container"></div>

<main class="content-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Type</div>
      <div id="typeFilters">
        <button class="sf-btn active" data-type="All">
          <span class="sf-type-dot" style="background:#94a3b8;"></span> All
        </button>
        <button class="sf-btn" data-type="video">
          <span class="sf-type-dot" style="background:var(--type-video);"></span> Video
        </button>
        <button class="sf-btn" data-type="pdf">
          <span class="sf-type-dot" style="background:var(--type-pdf);"></span> PDF
        </button>
        <button class="sf-btn" data-type="website">
          <span class="sf-type-dot" style="background:var(--type-web);"></span> Website
        </button>
        <button class="sf-btn" data-type="other">
          <span class="sf-type-dot" style="background:var(--type-other);"></span> Other
        </button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Subject</div>
      <div id="subjectFilters">
        <button class="sf-btn active" data-subject="All">All</button>
        <button class="sf-btn" data-subject="Math">Math</button>
        <button class="sf-btn" data-subject="Physics">Physics</button>
        <button class="sf-btn" data-subject="Chemistry">Chemistry</button>
        <button class="sf-btn" data-subject="Biology">Biology</button>
        <button class="sf-btn" data-subject="General">General</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Stats</div>
      <div class="stat-row"><span>Total</span><span class="stat-val" id="statTotal">—</span></div>
      <div class="stat-row"><span>Showing</span><span class="stat-val" id="statShowing">—</span></div>
      <div class="stat-type-row"><span>🎬 Videos</span><span class="stat-val" id="statVideos">—</span></div>
      <div class="stat-type-row"><span>📄 PDFs</span><span class="stat-val" id="statPdfs">—</span></div>

  <!-- Main content -->
  <div class="main-area">

          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>

    <!-- Search -->

<!-- FIREBASE_ENV -->
<script type="module" src="auth-guard.js"></script>
<script>
  // Load navbar
  fetch('partials/navbar.html')
    .then(response => response.text())
    .then(html => {
      document.getElementById('navbar-container').innerHTML = html;
      initNavbar();
      if (typeof window._pendingNavbarUpdate === 'function') {
        window._pendingNavbarUpdate();
        window._pendingNavbarUpdate = null;
      }
      if (typeof window._pendingBadgeSetup === 'function') {
        window._pendingBadgeSetup();
        window._pendingBadgeSetup = null;
      }
      if (typeof window._pendingFeedbackSetup === 'function') {
        window._pendingFeedbackSetup();
        window._pendingFeedbackSetup = null;
      }
    })
    .catch(error => console.error('Error loading navbar:', error));

  if (!window.ENV) window.ENV = {
    FIREBASE_API_KEY:            "__FIREBASE_API_KEY__",
    FIREBASE_AUTH_DOMAIN:        "__FIREBASE_AUTH_DOMAIN__",
    FIREBASE_PROJECT_ID:         "__FIREBASE_PROJECT_ID__",
    FIREBASE_STORAGE_BUCKET:     "__FIREBASE_STORAGE_BUCKET__",
    FIREBASE_MESSAGING_SENDER_ID:"__FIREBASE_MESSAGING_SENDER_ID__",
    FIREBASE_APP_ID:             "__FIREBASE_APP_ID__",
  };
</script>
<script type="module">
  import {
    collection,
    doc,
    addDoc,
    deleteDoc,
    getDoc,
    onSnapshot,
    query,
    where,
    orderBy,
    setDoc,
    serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  let db = null;
  let currentUser = null;
  let isAdmin = false;
  let allResources = [];
  let activeType = 'All';
  let activeSubject = 'All';
  let searchQuery = '';
  let unsubLib = null;

  // ── Helpers ─────────────────────────────────────────────────
  const PALETTE = ['#6c5ce7','#00b894','#e17055','#0984e3','#a29bfe','#e84393','#00cec9','#f39c12'];
  function avatarColor(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
    return PALETTE[Math.abs(h) % PALETTE.length];
  }
  function getInitials(name) {
    return name.split(' ').filter(Boolean).map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
  }
  function buildAvatarEl(el, user) {
    if (user.photoURL) {
      el.innerHTML = `<img src="${user.photoURL}" referrerpolicy="no-referrer" alt="">`;
      el.style.background = 'transparent';
    } else {
      const n = user.displayName || user.email.split('@')[0];
      el.style.background = avatarColor(n);
      el.textContent = getInitials(n);
    }
  }
  function relativeTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return d.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
  }
  const TYPE_ICONS = { video: '🎬', pdf: '📄', website: '🌐', other: '📦' };
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function extractHostname(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }

  // ── Auth ─────────────────────────────────────────────────────
  document.addEventListener('authReady', ({ detail: { user, profile } }) => {
    db = window.db;
    currentUser = user;
    isAdmin = profile?.role_teachershub === 'teachers_admin';

    // Show UI - Update navbar elements
    const nameShort = (user.displayName || user.email.split('@')[0]).split(' ')[0];

    // Wait for navbar to load before updating elements
    const updateNavbarElements = () => {
      const profileNameShort = document.getElementById('profileNameShort');
      const profileAvatar = document.getElementById('profileAvatar');
      const profileWrap = document.getElementById('profileWrap');

      if (profileNameShort) profileNameShort.textContent = nameShort;
      if (profileAvatar && typeof buildAvatarEl === 'function') {
        buildAvatarEl(profileAvatar, user);
      }
      if (profileWrap) profileWrap.style.display = 'flex';
    };

    // Update immediately if navbar is loaded, otherwise defer until navbar fetch resolves
    if (document.getElementById('profileNameShort')) {
      updateNavbarElements();
    } else {
      window._pendingNavbarUpdate = updateNavbarElements;
    }

    // Badge setup
    const doBadgeSetup = () => setupNavBadges(db, { onSnapshot, collection });
    if (document.getElementById('msgBoardBadge')) {
      doBadgeSetup();
    } else {
      window._pendingBadgeSetup = doBadgeSetup;
    }

    // Feedback setup
    window.currentUser = user;
    const doFeedbackSetup = () => initFeedback(db, { addDoc, collection, serverTimestamp });
    if (document.getElementById('feedbackOverlay')) {
      doFeedbackSetup();
    } else {
      window._pendingFeedbackSetup = doFeedbackSetup;
    }

    document.getElementById('addFab').style.display = 'flex';

    initLibrary();
  });

  // ── Library ──────────────────────────────────────────────────
  function initLibrary() {
    const q = query(collection(db, 'library'), orderBy('createdAt', 'desc'));
    unsubLib = onSnapshot(q, (snap) => {
      allResources = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGrid();
    }, err => console.error(err));
  }

  function renderGrid() {
    const grid = document.getElementById('resGrid');
    const countEl = document.getElementById('resCount');
    const sq = searchQuery.toLowerCase();

    const filtered = allResources.filter(r => {
      const typeOk    = activeType === 'All' || r.type === activeType;
      const subjectOk = activeSubject === 'All' || r.subject === activeSubject;
      const searchOk  = !sq ||
        (r.title || '').toLowerCase().includes(sq) ||
        (r.description || '').toLowerCase().includes(sq);
      return typeOk && subjectOk && searchOk;
    });

    // Update stats
    countEl.textContent = `${filtered.length} resource${filtered.length !== 1 ? 's' : ''}`;
    const statTotal    = document.getElementById('statTotal');
    const statShowing  = document.getElementById('statShowing');
    const statVideos   = document.getElementById('statVideos');
    const statPdfs     = document.getElementById('statPdfs');
    const statWebsites = document.getElementById('statWebsites');
    const statOther    = document.getElementById('statOther');
    if (statTotal)    statTotal.textContent    = allResources.length;
    if (statShowing)  statShowing.textContent  = filtered.length;
    if (statVideos)   statVideos.textContent   = allResources.filter(r => r.type === 'video').length;
    if (statPdfs)     statPdfs.textContent     = allResources.filter(r => r.type === 'pdf').length;
    if (statWebsites) statWebsites.textContent = allResources.filter(r => r.type === 'website').length;
    if (statOther)    statOther.textContent    = allResources.filter(r => !['video','pdf','website'].includes(r.type)).length;

    // Switch grid layout class
    grid.className = 'res-grid';
    if (activeType === 'video')   grid.classList.add('grid-video');
    else if (activeType === 'pdf') grid.classList.add('grid-pdf');

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><p>No resources found. Be the first to add one!</p></div>`;
      return;
    }

    grid.innerHTML = filtered.map(r => {
      const canDel      = isAdmin || (currentUser && r.authorId === currentUser.uid);
      const authorShort = (r.authorName || 'Unknown').split(' ')[0];
      const delBtn      = canDel ? `<button class="res-del-btn" data-del="${r.id}" title="Remove">✕</button>` : '';
      const subject     = escHtml(r.subject || 'General');
      const title       = escHtml(r.title || '');
      const desc        = escHtml(r.description || '');
      const url         = escHtml(r.url || '');
      const meta        = `by ${escHtml(authorShort)} · ${relativeTime(r.createdAt)}`;

      if (r.type === 'video') {
        return `
          <div class="card-video" data-id="${r.id}">
            ${delBtn}
            <div class="video-thumb">
              <div class="video-play-btn">▶</div>
            </div>
            <div class="video-body">
              <span class="video-subject-chip">${subject}</span>
              <div class="res-title">${title}</div>
              <p class="res-desc">${desc}</p>
              <div class="res-footer">
                <span class="res-meta">${meta}</span>
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="res-open-btn btn-video">▶ Watch</a>
              </div>
            </div>
          </div>`;
      }

      if (r.type === 'pdf') {
        return `
          <div class="card-pdf" data-id="${r.id}" data-subject="${r.subject || 'General'}">
            ${delBtn}
            <div class="pdf-preview">
              <div class="pdf-doc-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/>
                  <line x1="16" y1="17" x2="8" y2="17"/>
                  <polyline points="10 9 9 9 8 9"/>
                </svg>
                <div class="pdf-lines">
                  <div class="pdf-line"></div>
                  <div class="pdf-line"></div>
                  <div class="pdf-line"></div>
                </div>
              </div>
            </div>
            <div class="pdf-body">
              <span class="pdf-subject-chip">${subject}</span>
              <div class="res-title">${title}</div>
              <p class="res-desc">${desc}</p>
              <div class="res-footer">
                <span class="res-meta">${meta}</span>
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="res-open-btn btn-pdf">📄 Open PDF</a>
              </div>
            </div>
          </div>`;
      }

      if (r.type === 'website') {
        const hostname = escHtml(extractHostname(r.url || ''));
        return `
          <div class="card-website" data-id="${r.id}">
            ${delBtn}
            <div class="browser-bar">
              <div class="browser-dots">
                <div class="browser-dot"></div>
                <div class="browser-dot"></div>
                <div class="browser-dot"></div>
              </div>
              <span class="browser-url">${hostname}</span>
            </div>
            <div class="website-body">
              <span class="web-subject-chip">${subject}</span>
              <div class="res-title">${title}</div>
              <p class="res-desc">${desc}</p>
              <div class="res-footer">
                <span class="res-meta">${meta}</span>
                <a href="${url}" target="_blank" rel="noopener noreferrer" class="res-open-btn btn-website">🌐 Visit</a>
              </div>
            </div>
          </div>`;
      }

      // Other / fallback
      const icon = TYPE_ICONS[r.type] || '📦';
      return `
        <div class="card-other" data-id="${r.id}">
          ${delBtn}
          <div class="other-icon-row">
            <div class="other-icon">${icon}</div>
            <span class="other-subject-chip">${subject}</span>
          </div>
          <div class="res-title">${title}</div>
          <p class="res-desc">${desc}</p>
          <div class="res-footer">
            <span class="res-meta">${meta}</span>
            <a href="${url}" target="_blank" rel="noopener noreferrer" class="res-open-btn btn-other">Open</a>
          </div>
        </div>`;
    }).join('');

    // Delete buttons
    grid.querySelectorAll('[data-del]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.del;
        const res = allResources.find(r => r.id === id);
        showConfirm('Remove this resource?', `"${res?.title || 'Resource'}" will be permanently deleted.`, async () => {
          try { await deleteDoc(doc(db, 'library', id)); }
          catch (err) { console.error(err); }
        });
      });
    });
  }

  // ── Filters ──────────────────────────────────────────────────
  document.getElementById('typeFilters').addEventListener('click', e => {
    const btn = e.target.closest('.sf-btn');
    if (!btn) return;
    document.querySelectorAll('#typeFilters .sf-btn').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderGrid();
  });
  document.getElementById('subjectFilters').addEventListener('click', e => {
    const btn = e.target.closest('.sf-btn');
    if (!btn) return;
    document.querySelectorAll('#subjectFilters .sf-btn').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeSubject = btn.dataset.subject;
    renderGrid();
  });
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    renderGrid();
  });

  // ── Add Modal ────────────────────────────────────────────────
  function openModal() {
    document.getElementById('resTitle').value = '';
    document.getElementById('resUrl').value = '';
    document.getElementById('resDesc').value = '';
    document.querySelector('input[name="resType"][value="video"]').checked = true;
    document.getElementById('resSubject').value = 'General';
    document.getElementById('modalErr').textContent = '';
    document.getElementById('modalOverlay').classList.add('open');
  }

  document.getElementById('addFab').addEventListener('click', openModal);
  document.getElementById('modalCancel').addEventListener('click', () =>
    document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('modalClose').addEventListener('click', () =>
    document.getElementById('modalOverlay').classList.remove('open'));
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  });

  document.getElementById('modalAdd').addEventListener('click', async () => {
    if (!currentUser) return;
    const title = document.getElementById('resTitle').value.trim();
    const url   = document.getElementById('resUrl').value.trim();
    const desc  = document.getElementById('resDesc').value.trim();
    const type  = document.querySelector('input[name="resType"]:checked')?.value || 'other';
    const subject = document.getElementById('resSubject').value;
    const errEl = document.getElementById('modalErr');
    const btn   = document.getElementById('modalAdd');

    errEl.textContent = '';
    if (!title)  { errEl.textContent = 'Please enter a title.'; return; }
    if (!url)    { errEl.textContent = 'Please enter a URL.'; return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
      errEl.textContent = 'URL must start with http:// or https://'; return;
    }

    btn.disabled = true; btn.textContent = 'Adding…';
    try {
      await addDoc(collection(db, 'library'), {
        title, url, description: desc, type, subject,
        authorName: currentUser.displayName || currentUser.email.split('@')[0],
        authorId: currentUser.uid,
        createdAt: serverTimestamp(),
      });
      document.getElementById('modalOverlay').classList.remove('open');
    } catch (err) {
      errEl.textContent = 'Failed to add. Try again.';
      console.error(err);
    }
    btn.disabled = false; btn.textContent = 'Add Resource';
  });

  // ── Confirm ──────────────────────────────────────────────────
  let confirmCb = null;
  function showConfirm(title, msg, cb) {
    document.querySelector('#confirmOverlay .confirm-box h4').textContent = title;
    document.querySelector('#confirmOverlay .confirm-box p').textContent = msg;
    confirmCb = cb;
    document.getElementById('confirmOverlay').classList.add('open');
  }
  document.getElementById('confirmCancel').addEventListener('click', () => {
    document.getElementById('confirmOverlay').classList.remove('open');
    confirmCb = null;
  });
  document.getElementById('confirmDelete').addEventListener('click', async () => {
    document.getElementById('confirmOverlay').classList.remove('open');
    if (confirmCb) await confirmCb();
    confirmCb = null;
  });
</script>
</body>
