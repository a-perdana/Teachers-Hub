<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Induction Handbook — Teachers Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <link rel="stylesheet" href="base.css">
  <script src="firebase-config.js"></script>
  <script>if (!window.ENV) window.ENV = { FIREBASE_API_KEY: "__FIREBASE_API_KEY__", FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__", FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__", FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__", FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__", FIREBASE_APP_ID: "__FIREBASE_APP_ID__" };</script>
  <style>
    :root {
      --accent: #6c5ce7; --accent-dk: #4e3db8; --accent-2: #ddd6fe;
      --ink: #1f2937; --ink-2: #4b5563; --ink-3: #6b7280;
      --border: #e5e7eb; --paper: #fafafa; --white: #ffffff;
      --radius: 12px;
    }

    .toolbar {
      position: sticky; top: 0; z-index: 50;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 14px 40px; display: flex; align-items: center; gap: 18px;
    }
    .toolbar select {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 14px; background: #fff; color: var(--ink);
      min-width: 280px;
    }
    .toolbar select:focus { outline: none; border-color: var(--accent); }
    .toolbar .btn-print {
      margin-left: auto; padding: 8px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .toolbar .btn-print:hover { background: var(--accent-dk); }
    .toolbar .btn-print svg { width: 14px; height: 14px; }

    .handbook-page { max-width: 880px; margin: 0 auto; padding: 32px 40px 80px; }

    .hb-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid var(--accent); }
    .hb-eyebrow { font-size: 11px; font-weight: 500; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
    .hb-title { font-family: 'Lora', serif; font-size: 2.2rem; font-weight: 600; color: var(--ink); line-height: 1.2; margin-bottom: 8px; }
    .hb-subtitle { font-size: 14px; color: var(--ink-2); line-height: 1.5; }
    .hb-meta {
      display: flex; gap: 24px; flex-wrap: wrap; margin-top: 14px;
      font-size: 12px; color: var(--ink-3);
    }
    .hb-meta span strong { color: var(--ink-2); }

    .hb-charter-box {
      background: linear-gradient(180deg, #ddd6fe 0%, #fff 100%);
      border: 1px solid var(--accent); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 28px; font-size: 13px; color: #4c1d95;
    }
    .hb-charter-box strong { display: block; font-weight: 700; margin-bottom: 4px; color: #3b0764; }

    .hb-section { margin-bottom: 32px; }
    .hb-section-h { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); margin-bottom: 12px; padding-top: 8px; }
    .hb-section-text { font-size: 14px; line-height: 1.6; color: var(--ink-2); margin-bottom: 14px; }

    .hb-roles { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .hb-role-card { background: #fafafa; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .hb-role-card .role-label { font-size: 11px; font-weight: 700; color: var(--accent-dk); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .hb-role-card .role-resp { font-size: 12px; line-height: 1.5; color: var(--ink-2); margin-top: 4px; }
    .hb-role-card ul { padding-left: 16px; margin-top: 6px; }
    .hb-role-card li { font-size: 12px; line-height: 1.55; color: var(--ink-2); margin-bottom: 3px; }

    .hb-stage {
      border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
      margin-bottom: 18px; background: #fff;
    }
    .hb-stage-head {
      background: linear-gradient(180deg, #faf5ff 0%, #fff 100%);
      padding: 16px 22px; border-bottom: 1px solid var(--accent-2);
    }
    .hb-stage-name { font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .hb-stage-days { font-size: 12px; color: var(--accent-dk); font-weight: 600; }
    .hb-stage-narrative { font-size: 13px; color: var(--ink-2); margin-top: 8px; line-height: 1.5; }

    .hb-task { padding: 14px 22px; border-top: 1px solid var(--border); }
    .hb-task:first-of-type { border-top: none; }
    .hb-task-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .hb-task-desc { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin-bottom: 8px; }
    .hb-task-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
    .hb-tag { padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .hb-tag.role { background: #f3f4f6; color: #4b5563; }
    .hb-tag.mentor { background: #fef3c7; color: #92400e; }
    .hb-tag.minutes { background: #e0e7ff; color: #3730a3; }
    .hb-tag.cts { background: var(--accent-2); color: var(--accent-dk); font-family: 'DM Mono', monospace; }
    .hb-tag.skl { background: #d1fae5; color: #065f46; }
    .hb-tag.pigp { background: #fee2e2; color: #991b1b; font-family: 'DM Mono', monospace; }
    .hb-tag.signoff { background: #ddd6fe; color: #5b21b6; font-weight: 700; }

    .hb-substage-h { font-size: 13px; font-weight: 700; color: var(--accent-dk); padding: 12px 22px; background: #fafafa; border-top: 1px solid var(--border); }

    .hb-obs-cycle {
      background: #fafafa; border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin: 14px 0;
    }
    .hb-obs-cycle h4 { font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
    .hb-obs-cycle ol { padding-left: 22px; }
    .hb-obs-cycle li { font-size: 12px; line-height: 1.6; color: var(--ink-2); margin-bottom: 6px; }
    .hb-obs-cycle li b { color: var(--ink); font-weight: 600; }

    .hb-loading { padding: 60px 40px; text-align: center; color: var(--ink-3); }

    /* PRINT — keep readable, hide chrome. */
    @media print {
      .toolbar, nav, .navbar, #navbar-container { display: none !important; }
      body { background: #fff !important; }
      .handbook-page { max-width: 100%; padding: 20px 24px; }
      .hb-stage { break-inside: avoid; box-shadow: none; }
      .hb-task { break-inside: avoid; }
      .hb-charter-box { background: #fef3c7 !important; border-color: #fde68a !important; }
      a { color: var(--ink) !important; text-decoration: none !important; }
    }
    @page { margin: 18mm; }
  </style>
</head>
<body style="display:none">
<div id="navbar-container"></div>

<div class="toolbar" id="toolbar">
  <label for="hbSelect" style="font-size: 12px; font-weight: 600; color: var(--ink-2);">Handbook:</label>
  <select id="hbSelect">
    <option value="">Loading…</option>
  </select>
  <button class="btn-print" id="btnPrint" title="Use your browser's Save-as-PDF option in the print dialog.">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print / Save as PDF
  </button>
</div>

<div class="handbook-page" id="hbContent">
  <div class="hb-loading">Loading handbook…</div>
</div>

<script src="partials/navbar.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
  import { collection, doc, getDoc, getDocs, query, limit }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  fetch('partials/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-container').innerHTML = html;
    if (typeof initNavbar === 'function') initNavbar();
  });

  const db = window.db;
  let allHandbooks = [];

  document.addEventListener('authReady', async () => {
    document.body.style.display = '';
    try {
      const snap = await getDocs(query(collection(db, 'induction_programs'), limit(50)));
      allHandbooks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const select = document.getElementById('hbSelect');
      select.innerHTML = '';
      allHandbooks.forEach(hb => {
        const opt = document.createElement('option');
        opt.value = hb.id;
        opt.textContent = hb.title || hb.id;
        select.appendChild(opt);
      });
      const params = new URLSearchParams(window.location.search);
      const requested = params.get('id') || allHandbooks[0]?.id;
      if (requested && allHandbooks.find(h => h.id === requested)) {
        select.value = requested;
      }
      select.addEventListener('change', () => {
        const newId = select.value;
        const url = new URL(window.location.href);
        url.searchParams.set('id', newId);
        window.history.replaceState({}, '', url);
        renderHandbook(newId);
      });
      renderHandbook(select.value);
    } catch (err) {
      console.error('boot', err);
      document.getElementById('hbContent').innerHTML = `<div class="hb-loading" style="color:#991b1b;">Could not load: ${escapeHtml(err.message || err.code || 'unknown')}</div>`;
    }
    document.getElementById('btnPrint').addEventListener('click', () => window.print());
  });

  function renderHandbook(id) {
    const hb = allHandbooks.find(h => h.id === id);
    if (!hb) {
      document.getElementById('hbContent').innerHTML = '<div class="hb-loading">Pick a handbook from the dropdown.</div>';
      return;
    }
    const stages = Array.isArray(hb.stages) ? hb.stages : [];
    const stageBlocks = stages.map(renderStage).join('');

    const audienceLine = [
      hb.audience?.platform,
      hb.audience?.subRole || (Array.isArray(hb.audience?.subRoleValues) ? hb.audience.subRoleValues.join(',') : null),
    ].filter(Boolean).join(' · ');

    document.getElementById('hbContent').innerHTML = `
      <div class="hb-header">
        <div class="hb-eyebrow">Eduversal Induction Handbook · v${escapeHtml(hb.version || '?')}</div>
        <h1 class="hb-title">${escapeHtml(hb.title || hb.id)}</h1>
        <div class="hb-subtitle">${escapeHtml(hb.subtitle || '')}</div>
        <div class="hb-meta">
          ${audienceLine ? `<span><strong>Audience:</strong> ${escapeHtml(audienceLine)}</span>` : ''}
          ${hb.duration?.totalDays ? `<span><strong>Duration:</strong> ${hb.duration.totalDays} days</span>` : ''}
          ${hb.publishedOn ? `<span><strong>Published:</strong> ${escapeHtml(hb.publishedOn)}</span>` : ''}
          ${hb.publishedBy ? `<span><strong>By:</strong> ${escapeHtml(hb.publishedBy)}</span>` : ''}
        </div>
      </div>

      <div class="hb-charter-box">
        <strong>This handbook sits under the Eduversal Induction Charter.</strong>
        Year-1 induction data does not feed network appraisal scoring. Mentor + mentee + school leader all read the same source. Edits go through <code>docs/induction/handbook-*.json</code> + <code>scripts/induction/seed-induction-programs.js</code> — not Firestore directly.
      </div>

      ${hb.designPhilosophy ? renderDesignPhilosophy(hb.designPhilosophy) : ''}
      ${hb.rolesAndResponsibilities ? renderRoles(hb.rolesAndResponsibilities) : ''}

      <div class="hb-section">
        <h2 class="hb-section-h">Stages</h2>
        ${stageBlocks || '<div class="hb-task-desc">No stages defined.</div>'}
      </div>

      ${hb.openItems?.length ? `
        <div class="hb-section">
          <h2 class="hb-section-h">Open items</h2>
          <ul style="padding-left:20px;">
            ${hb.openItems.map(o => `<li class="hb-section-text" style="margin-bottom:6px;">${escapeHtml(o)}</li>`).join('')}
          </ul>
        </div>
      ` : ''}
    `;
  }

  function renderDesignPhilosophy(dp) {
    const phasesOrWindows = dp.fourPhases || dp.fourWindows;
    return `
      <div class="hb-section">
        <h2 class="hb-section-h">Design philosophy</h2>
        ${dp.summary ? `<p class="hb-section-text">${escapeHtml(dp.summary)}</p>` : ''}
        ${Array.isArray(phasesOrWindows) ? `
          <div class="hb-roles">
            ${phasesOrWindows.map(p => `
              <div class="hb-role-card">
                <div class="role-label">${escapeHtml(p.label)}</div>
                <div class="role-resp" style="font-weight:600;color:var(--ink);">
                  ${escapeHtml(p.weeks || p.days || '')}
                </div>
                ${p.cognitivePriority ? `<div class="role-resp">${escapeHtml(p.cognitivePriority)}</div>` : ''}
                ${p.leadershipPriority ? `<div class="role-resp">${escapeHtml(p.leadershipPriority)}</div>` : ''}
                ${p.successSignal ? `<div class="role-resp" style="margin-top:6px;font-style:italic;"><strong>Success:</strong> ${escapeHtml(p.successSignal)}</div>` : ''}
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  function renderRoles(rar) {
    const order = ['mentee', 'mentor', 'schoolLeader', 'foundationRepresentative', 'eduversalHQ'];
    const cards = order
      .filter(k => rar[k])
      .map(k => {
        const r = rar[k];
        const items = Array.isArray(r.responsibilities) ? r.responsibilities : [];
        return `
          <div class="hb-role-card">
            <div class="role-label">${escapeHtml(r.label || k)}</div>
            ${r.ownership ? `<div class="role-resp"><strong>Ownership:</strong> ${escapeHtml(r.ownership)}</div>` : ''}
            ${items.length ? `<ul>${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>` : ''}
          </div>
        `;
      }).join('');
    return `
      <div class="hb-section">
        <h2 class="hb-section-h">Roles and responsibilities</h2>
        <div class="hb-roles">${cards}</div>
      </div>
    `;
  }

  function renderStage(stage) {
    const tasks = Array.isArray(stage.tasks) ? stage.tasks : [];
    const subStages = Array.isArray(stage.subStages) ? stage.subStages : [];
    const cycle = stage.observationCycle || stage.walkthroughCycle;

    return `
      <div class="hb-stage">
        <div class="hb-stage-head">
          <div class="hb-stage-name">${escapeHtml(stage.label || stage.stageId)}</div>
          <div class="hb-stage-days">Day ${stage.dayStart} → ${stage.dayEnd}</div>
          ${stage.narrative ? `<div class="hb-stage-narrative">${escapeHtml(stage.narrative)}</div>` : ''}
        </div>
        ${tasks.map(renderTask).join('')}
        ${cycle ? renderObservationCycle(cycle) : ''}
        ${subStages.map(ss => `
          <div class="hb-substage-h">${escapeHtml(ss.label || ss.subStageId)}</div>
          ${(ss.tasks || []).map(renderTask).join('')}
        `).join('')}
      </div>
    `;
  }

  function renderTask(t) {
    const cts  = Array.isArray(t.cambridgeStandardRefs) ? t.cambridgeStandardRefs : [];
    const skl  = Array.isArray(t.skl_dimensions) ? t.skl_dimensions : [];
    const pigp = Array.isArray(t.pigp_articleRefs) ? t.pigp_articleRefs : [];
    return `
      <div class="hb-task">
        <div class="hb-task-title">${escapeHtml(t.title || t.taskId)}</div>
        ${t.description ? `<div class="hb-task-desc">${escapeHtml(t.description)}</div>` : ''}
        <div class="hb-task-meta">
          ${t.ownerRole ? `<span class="hb-tag role">${escapeHtml(t.ownerRole)}</span>` : ''}
          ${t.mentorRequired ? `<span class="hb-tag mentor">Mentor required</span>` : ''}
          ${t.mentorSignOffRequired ? `<span class="hb-tag signoff">Mentor sign-off</span>` : ''}
          ${t.schoolLeaderSignOffRequired ? `<span class="hb-tag signoff">School-leader sign-off</span>` : ''}
          ${t.estimatedMinutes ? `<span class="hb-tag minutes">${t.estimatedMinutes >= 60 ? Math.round(t.estimatedMinutes/60) + ' hr' : t.estimatedMinutes + ' min'}</span>` : ''}
          ${cts.map(c => `<span class="hb-tag cts">CTS ${escapeHtml(c)}</span>`).join('')}
          ${skl.map(s => `<span class="hb-tag skl">SKL: ${escapeHtml(s)}</span>`).join('')}
          ${pigp.map(p => `<span class="hb-tag pigp">PIGP ${escapeHtml(p)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  function renderObservationCycle(c) {
    const rotation = Array.isArray(c.rotation) ? c.rotation : [];
    return `
      <div class="hb-task">
        <div class="hb-obs-cycle">
          <h4>${c.totalObservations ? c.totalObservations : c.totalWalkthroughs || ''} ${c.totalObservations ? 'observations' : 'walkthroughs'} — rotation</h4>
          <ol>
            ${rotation.map(r => `
              <li>
                ${r.month ? `<b>Month ${r.month}</b> · ` : ''}
                ${r.walkthroughs ? `<b>Walkthroughs ${r.walkthroughs}</b> · ` : ''}
                ${escapeHtml(r.label || r.type || '')}${r.scored === false ? ' (unscored)' : (r.scored === true ? ' (scored)' : '')}
                ${r.description ? `<br><span style="color:var(--ink-3);">${escapeHtml(r.description)}</span>` : ''}
              </li>
            `).join('')}
          </ol>
        </div>
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
