<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Induction Handbook — Teachers Hub</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <link rel="stylesheet" href="base.css">
  <script src="firebase-config.js"></script>
  <script>if (!window.ENV) window.ENV = { FIREBASE_API_KEY: "__FIREBASE_API_KEY__", FIREBASE_AUTH_DOMAIN: "__FIREBASE_AUTH_DOMAIN__", FIREBASE_PROJECT_ID: "__FIREBASE_PROJECT_ID__", FIREBASE_STORAGE_BUCKET: "__FIREBASE_STORAGE_BUCKET__", FIREBASE_MESSAGING_SENDER_ID: "__FIREBASE_MESSAGING_SENDER_ID__", FIREBASE_APP_ID: "__FIREBASE_APP_ID__" };</script>
  <style>
    :root {
      --accent: #6c5ce7; --accent-dk: #4e3db8; --accent-2: #ede9fe;
      --cyan: #0891b2; --cyan-dk: #0e7490; --cyan-2: #cffafe;
      --ink: #1f2937; --ink-2: #4b5563; --ink-3: #6b7280;
      --border: #e5e7eb; --paper: #fafafa; --white: #ffffff;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 1px 3px rgba(15,23,42,0.06);
      --shadow-md: 0 4px 14px rgba(15,23,42,0.06), 0 2px 4px rgba(15,23,42,0.04);
    }
    body { background: var(--paper); }

    /* ── Toolbar (sticky under navbar) ──────────────────────────── */
    .toolbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255,255,255,0.92); backdrop-filter: saturate(160%) blur(8px);
      -webkit-backdrop-filter: saturate(160%) blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 40px; display: flex; align-items: center; gap: 14px;
    }
    .toolbar label { font-size: 11px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }
    .toolbar select {
      padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 14px; background: #fff; color: var(--ink);
      min-width: 280px; transition: border-color .15s, box-shadow .15s;
    }
    .toolbar select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-2); }
    .toolbar .btn-print {
      margin-left: auto; padding: 9px 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
      color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
      box-shadow: 0 1px 2px rgba(76,29,149,0.18), 0 4px 12px rgba(108,92,231,0.18);
      transition: transform .12s, box-shadow .12s;
    }
    .toolbar .btn-print:hover { transform: translateY(-1px); box-shadow: 0 2px 4px rgba(76,29,149,0.22), 0 6px 18px rgba(108,92,231,0.28); }
    .toolbar .btn-print svg { width: 14px; height: 14px; }

    /* Search input — sits in the toolbar. Filters tasks in-page
       (client-side, no Firestore query) so the user can jump to a task
       by name, CTS ref, role, etc. */
    .hb-search {
      position: relative; flex: 1; max-width: 360px;
      display: flex; align-items: center;
    }
    .hb-search svg.search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--ink-3); pointer-events: none;
    }
    .hb-search input {
      width: 100%; padding: 8px 32px 8px 34px;
      font-family: inherit; font-size: 13px;
      border: 1px solid var(--border); border-radius: 8px;
      background: #fff; color: var(--ink);
      outline: none; transition: border-color .12s, box-shadow .12s;
    }
    .hb-search input::placeholder { color: var(--ink-3); }
    .hb-search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-2); }
    .hb-search-clear {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border-radius: 6px;
      background: none; border: none; cursor: pointer;
      color: var(--ink-3); font-size: 16px; line-height: 1;
      display: none; align-items: center; justify-content: center;
    }
    .hb-search-clear:hover { background: #f3f4f6; color: var(--ink); }
    .hb-search.has-value .hb-search-clear { display: inline-flex; }
    .hb-search-count {
      font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .hb-search-count.is-active { color: var(--accent-dk); font-weight: 600; }

    /* Filter state on tasks + stages */
    .hb-task.is-filtered,
    .hb-stage.is-filtered,
    .hb-section.is-filtered { display: none; }

    /* Stage task count pill */
    .hb-stage-tasks-pill {
      font-size: 11px; font-weight: 600; color: var(--ink-3);
      background: rgba(108,92,231,0.08); padding: 3px 10px; border-radius: 999px;
      margin-left: 10px; vertical-align: middle;
      font-variant-numeric: tabular-nums;
    }
    .hb-stage-tasks-pill.is-narrowed { color: var(--accent-dk); background: var(--accent-2); font-weight: 700; }

    /* ── Page wrap + 2-col layout (TOC + content) ───────────────── */
    .handbook-page {
      max-width: 1200px; margin: 0 auto; padding: 0 32px 100px;
    }
    /* Loading state stays single-column; .hb-layout wraps the rendered
       handbook so the 2-col grid only kicks in once content is injected. */
    .hb-layout {
      display: grid; grid-template-columns: 240px 1fr;
      gap: 36px; align-items: start;
      padding-top: 28px;
    }
    @media (max-width: 960px) {
      .hb-layout { grid-template-columns: 1fr; gap: 18px; padding-top: 20px; }
    }
    .hb-content { min-width: 0; }   /* prevent grid blowout from long tag rows */

    /* TOC sidebar — TH topbar is 60px sticky + toolbar ~52px sticky, so
       sidebar pins ~130px from viewport top. Mobile becomes horizontal
       scroll-strip. Scrollbars hidden (per AH pattern). */
    .hb-toc {
      position: sticky; top: 130px;
      max-height: calc(100vh - 150px);
      overflow-y: auto; overflow-x: hidden;
      padding: 4px 4px 12px;
      scrollbar-width: none;
      scrollbar-gutter: stable;
    }
    .hb-toc::-webkit-scrollbar { width: 0; height: 0; display: none; }
    @media (max-width: 960px) {
      .hb-toc {
        position: sticky; top: 110px;
        max-height: none; padding: 8px 0;
        background: var(--paper); z-index: 40;
        border-bottom: 1px solid var(--border);
      }
      .hb-toc ul {
        display: flex; gap: 4px; overflow-x: auto; padding: 4px 16px;
        scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .hb-toc ul::-webkit-scrollbar { height: 0; display: none; }
      .hb-toc li { flex: 0 0 auto; scroll-snap-align: start; }
      .hb-toc li.toc-sub { display: none; }
      .hb-toc-title { display: none; }
      .hb-toc-divider { display: none; }
    }
    .hb-toc-title {
      font-size: 10.5px; font-weight: 700; color: var(--ink-3);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px;
      padding: 0 10px;
    }
    .hb-toc ul { list-style: none; padding: 0; margin: 0; }
    .hb-toc li { margin: 1px 0; }
    .hb-toc a {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 6px;
      font-size: 13px; color: var(--ink-2); text-decoration: none;
      border-left: 2px solid transparent;
      transition: background .12s, color .12s, border-color .12s;
      white-space: nowrap;
    }
    .hb-toc a:hover { background: #fafbfc; color: var(--ink); }
    .hb-toc a.active {
      background: var(--accent-2); color: var(--accent-dk);
      border-left-color: var(--accent); font-weight: 600;
    }
    .hb-toc a.toc-sub { padding-left: 22px; font-size: 12px; color: var(--ink-3); }
    .hb-toc a.toc-sub.active { color: var(--accent-dk); }
    .hb-toc-divider { height: 1px; background: var(--border); margin: 8px 4px; }
    .hb-toc-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 4px;
      background: var(--accent-2); color: var(--accent-dk);
      font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
    .hb-toc a.active .hb-toc-num { background: var(--accent); color: #fff; }

    /* scroll-margin so anchor jumps don't slip under topbar + toolbar */
    .hb-section, .hb-stage, .hb-charter-box { scroll-margin-top: 130px; }

    .hb-hero {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #1a1530 0%, #2d2354 55%, #0a0815 100%);
      color: #fff; border-radius: 18px;
      padding: 40px 36px 36px; margin-bottom: 28px;
      box-shadow: 0 18px 40px -22px rgba(15,23,42,0.5);
    }
    .hb-hero::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(circle at 88% 18%, rgba(108,92,231,0.32) 0%, transparent 55%),
        radial-gradient(circle at 12% 92%, rgba(8,145,178,0.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .hb-hero::after {
      content: ''; position: absolute; right: -60px; bottom: -60px;
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .hb-hero > * { position: relative; z-index: 1; }
    .hb-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.62);
      letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;
    }
    .hb-eyebrow::before {
      content: ''; width: 22px; height: 2px; background: var(--accent); border-radius: 2px;
    }
    .hb-title { font-family: 'Lora', serif; font-size: 2.4rem; font-weight: 600; line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.01em; }
    .hb-subtitle { font-size: 15px; color: rgba(255,255,255,0.78); line-height: 1.55; max-width: 680px; }
    .hb-meta {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px;
    }
    .hb-meta span {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: rgba(255,255,255,0.86);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 5px 11px; border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    .hb-meta span strong { color: rgba(255,255,255,0.55); font-weight: 500; }

    /* ── Charter callout ────────────────────────────────────────── */
    .hb-charter-box {
      position: relative;
      background: linear-gradient(180deg, #f5f3ff 0%, #fafafa 100%);
      border: 1px solid var(--accent-2);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 16px 20px 16px 52px; margin-bottom: 32px;
      font-size: 13px; color: #3b0764; line-height: 1.6;
      box-shadow: var(--shadow-sm);
    }
    .hb-charter-box::before {
      content: '⚖️'; position: absolute; left: 18px; top: 14px; font-size: 20px;
    }
    .hb-charter-box strong { display: block; font-weight: 700; margin-bottom: 4px; color: #3b0764; font-size: 13.5px; }
    .hb-charter-box code { background: rgba(76,29,149,0.08); color: #4c1d95; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

    /* ── Section headings ───────────────────────────────────────── */
    .hb-section { margin-bottom: 36px; }
    .hb-section-h {
      font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 600;
      color: var(--ink); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .hb-section-h::before {
      content: ''; width: 4px; height: 22px; border-radius: 2px;
      background: linear-gradient(180deg, var(--accent) 0%, var(--cyan) 100%);
    }
    .hb-section-text { font-size: 14px; line-height: 1.65; color: var(--ink-2); margin-bottom: 14px; }

    /* ── Design philosophy (windows / phases) ───────────────────── */
    .hb-roles { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 18px; }
    .hb-window-card {
      position: relative; background: #fff;
      border: 1px solid var(--border); border-radius: 14px;
      padding: 18px 16px 16px; box-shadow: var(--shadow-sm);
      transition: transform .15s, box-shadow .15s, border-color .15s;
      overflow: hidden;
    }
    .hb-window-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--win-from, var(--accent)) 0%, var(--win-to, var(--accent-dk)) 100%);
    }
    .hb-window-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--win-from, var(--accent)); }
    .hb-window-num {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif; font-size: 14px; font-weight: 600;
      background: var(--win-bg, var(--accent-2)); color: var(--win-fg, var(--accent-dk));
    }
    .hb-window-card .role-label {
      font-size: 12px; font-weight: 700; color: var(--win-fg, var(--accent-dk));
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
      padding-right: 36px;
    }
    .hb-window-card .role-resp { font-size: 12px; line-height: 1.55; color: var(--ink-2); margin-top: 5px; }
    .hb-window-card .role-resp:first-of-type { font-size: 13px; font-weight: 600; color: var(--ink); }

    /* ── Roles cards ────────────────────────────────────────────── */
    .hb-role-card {
      position: relative; background: #fff;
      border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 16px 14px 18px; box-shadow: var(--shadow-sm);
      transition: transform .15s, box-shadow .15s;
    }
    .hb-role-card::before {
      content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px;
      background: var(--role-color, var(--accent)); border-radius: 0 3px 3px 0;
    }
    .hb-role-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .hb-role-card .role-label {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      color: var(--role-color, var(--accent-dk));
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .hb-role-card .role-icon { font-size: 14px; }
    .hb-role-card .role-resp { font-size: 12.5px; line-height: 1.55; color: var(--ink-2); margin-top: 4px; }
    .hb-role-card .role-resp strong { color: var(--ink); }
    .hb-role-card ul { padding-left: 16px; margin-top: 8px; }
    .hb-role-card li { font-size: 12px; line-height: 1.6; color: var(--ink-2); margin-bottom: 4px; }

    /* ── Stage cards ────────────────────────────────────────────── */
    .hb-stage {
      position: relative;
      border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
      margin-bottom: 22px; background: #fff;
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }
    .hb-stage:hover { box-shadow: var(--shadow-md); }
    .hb-stage-head {
      position: relative; padding: 20px 24px 18px 84px;
      background:
        linear-gradient(135deg, rgba(108,92,231,0.07) 0%, rgba(8,145,178,0.04) 100%),
        #fff;
      border-bottom: 1px solid var(--accent-2);
    }
    .hb-stage-num {
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dk) 100%);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: 'Lora', serif; font-size: 18px; font-weight: 600;
      box-shadow: 0 4px 12px rgba(108,92,231,0.32);
    }
    .hb-stage-name { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; color: var(--ink); margin-bottom: 6px; line-height: 1.3; }
    .hb-stage-days {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--accent-dk); font-weight: 600;
      background: var(--accent-2); padding: 3px 10px; border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .hb-stage-narrative { font-size: 13px; color: var(--ink-2); margin-top: 10px; line-height: 1.6; }

    /* ── Task rows ──────────────────────────────────────────────── */
    .hb-task {
      position: relative; padding: 16px 24px 16px 24px;
      border-top: 1px solid var(--border);
      transition: background .12s;
    }
    .hb-task::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: transparent; transition: background .12s;
    }
    .hb-task:hover { background: rgba(108,92,231,0.025); }
    .hb-task:hover::before { background: var(--accent); }
    .hb-task:first-of-type { border-top: none; }
    .hb-task-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 5px; }
    .hb-task-desc { font-size: 13px; color: var(--ink-2); line-height: 1.55; margin-bottom: 10px; }
    .hb-task-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 11px; }
    .hb-tag { padding: 3px 9px; border-radius: 999px; font-weight: 600; font-size: 11px; line-height: 1.4; }
    .hb-tag.role { background: #f3f4f6; color: #4b5563; }
    .hb-tag.mentor { background: #fef3c7; color: #92400e; }
    .hb-tag.minutes { background: var(--cyan-2); color: var(--cyan-dk); }
    .hb-tag.cts { background: var(--accent-2); color: var(--accent-dk); font-family: 'DM Mono', monospace; cursor: help; }
    .hb-tag.skl { background: #d1fae5; color: #065f46; cursor: help; }
    .hb-tag.pigp { background: #fee2e2; color: #991b1b; font-family: 'DM Mono', monospace; cursor: help; }
    .hb-tag.signoff { background: linear-gradient(135deg, var(--accent-2) 0%, var(--cyan-2) 100%); color: #5b21b6; font-weight: 700; }

    .hb-substage-h {
      font-size: 12px; font-weight: 700; color: var(--accent-dk);
      padding: 12px 24px; background: #faf7ff;
      border-top: 1px solid var(--accent-2);
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ── Observation cycle ──────────────────────────────────────── */
    .hb-obs-cycle {
      background: linear-gradient(135deg, var(--accent-2) 0%, #fff 70%);
      border: 1px solid var(--accent-2); border-radius: 12px;
      padding: 16px 18px; margin: 16px 0 4px;
    }
    .hb-obs-cycle h4 {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: var(--accent-dk);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px;
    }
    .hb-obs-cycle h4::before { content: '🔄'; font-size: 14px; }
    .hb-obs-cycle ol { padding-left: 0; list-style: none; counter-reset: rot; display: grid; gap: 8px; }
    .hb-obs-cycle li {
      counter-increment: rot;
      position: relative; padding: 8px 12px 8px 38px;
      background: #fff; border: 1px solid var(--accent-2); border-radius: 8px;
      font-size: 12.5px; line-height: 1.55; color: var(--ink-2);
    }
    .hb-obs-cycle li::before {
      content: counter(rot); position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace;
    }
    .hb-obs-cycle li b { color: var(--ink); font-weight: 700; }

    .hb-loading { padding: 60px 40px; text-align: center; color: var(--ink-3); font-size: 14px; }

    @media (max-width: 720px) {
      .toolbar { padding: 10px 18px; gap: 10px; flex-wrap: wrap; }
      .toolbar select { min-width: 0; flex: 1; }
      .toolbar .btn-print { padding: 8px 12px; font-size: 12px; }
      .hb-search { flex: 1 1 100%; max-width: none; order: 3; }
      .hb-search-count { order: 4; flex: 1 1 100%; text-align: right; }
      .handbook-page { padding: 20px 18px 60px; }
      .hb-hero { padding: 30px 22px 26px; }
      .hb-title { font-size: 1.75rem; }
      .hb-stage-head { padding: 18px 20px 16px 76px; }
      .hb-stage-num { left: 18px; width: 42px; height: 42px; font-size: 16px; }
    }

    /* ── PRINT — flatten chrome, keep readable ─────────────────── */
    @media print {
      .toolbar, nav, .navbar, #navbar-container { display: none !important; }
      body { background: #fff !important; }
      .handbook-page { max-width: 100%; padding: 20px 24px; }
      .hb-hero {
        background: #fff !important; color: var(--ink) !important;
        border: none !important; border-bottom: 2px solid var(--accent) !important;
        border-radius: 0 !important; padding: 0 0 18px !important;
        box-shadow: none !important; margin-bottom: 22px !important;
      }
      .hb-hero::before, .hb-hero::after { display: none !important; }
      .hb-eyebrow { color: var(--ink-3) !important; }
      .hb-eyebrow::before { background: var(--accent) !important; }
      .hb-subtitle { color: var(--ink-2) !important; }
      .hb-meta span { background: #f3f4f6 !important; color: var(--ink-2) !important; border-color: var(--border) !important; }
      .hb-meta span strong { color: var(--ink-3) !important; }
      .hb-stage, .hb-window-card, .hb-role-card, .hb-charter-box { break-inside: avoid; box-shadow: none !important; }
      .hb-stage-num { box-shadow: none !important; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .hb-task { break-inside: avoid; }
      a { color: var(--ink) !important; text-decoration: none !important; }
      .hb-tag, .hb-stage-num, .hb-stage-days, .hb-window-card::before, .hb-obs-cycle li::before {
        print-color-adjust: exact; -webkit-print-color-adjust: exact;
      }
    }
    @page { margin: 18mm; }
  </style>
</head>
<body style="display:none">
<div id="navbar-container"></div>

<div class="toolbar" id="toolbar">
  <label for="hbSelect">Handbook</label>
  <select id="hbSelect">
    <option value="">Loading…</option>
  </select>
  <div class="hb-search" id="hbSearchWrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="hbSearch" placeholder="Search tasks, CTS refs, roles…" autocomplete="off">
    <button type="button" class="hb-search-clear" id="hbSearchClear" title="Clear search" aria-label="Clear search">×</button>
  </div>
  <span class="hb-search-count" id="hbSearchCount" aria-live="polite"></span>
  <button class="btn-print" id="btnPrint" title="Use your browser's Save-as-PDF option in the print dialog.">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
    Print / Save as PDF
  </button>
</div>

<div class="handbook-page" id="hbContent">
  <div class="hb-loading">Loading handbook…</div>
</div>

<script src="partials/navbar.js"></script>
<script type="module" src="auth-guard.js"></script>
<script type="module">
  import { collection, doc, getDoc, getDocs, query, limit }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

  fetch('partials/navbar.html').then(r => r.text()).then(html => {
    document.getElementById('navbar-container').innerHTML = html;
    if (typeof initNavbar === 'function') initNavbar();
  });

  const db = window.db;
  let allHandbooks = [];

  document.addEventListener('authReady', async () => {
    document.body.style.display = '';
    try {
      const snap = await getDocs(query(collection(db, 'induction_programs'), limit(50)));
      const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // TH viewer surfaces only the teachers-platform handbook(s).
      // Principal and HQ Specialist handbooks live in their own hubs;
      // CH /references is the cross-hub superset.
      allHandbooks = all.filter(hb => hb.audience?.platform === 'teachershub');

      const select = document.getElementById('hbSelect');
      const toolbar = document.getElementById('toolbar');
      if (allHandbooks.length <= 1) {
        // Single handbook → hide the picker, jump straight to render.
        if (select) select.style.display = 'none';
        const lbl = toolbar?.querySelector('label[for="hbSelect"]');
        if (lbl) lbl.style.display = 'none';
      } else {
        select.innerHTML = '';
        allHandbooks.forEach(hb => {
          const opt = document.createElement('option');
          opt.value = hb.id;
          opt.textContent = hb.title || hb.id;
          select.appendChild(opt);
        });
        select.addEventListener('change', () => {
          const newId = select.value;
          const url = new URL(window.location.href);
          url.searchParams.set('id', newId);
          window.history.replaceState({}, '', url);
          renderHandbook(newId);
        });
      }

      const params = new URLSearchParams(window.location.search);
      const requested = params.get('id');
      const initialId = (requested && allHandbooks.find(h => h.id === requested)?.id) || allHandbooks[0]?.id;
      if (select && initialId && select.style.display !== 'none') select.value = initialId;
      renderHandbook(initialId);
    } catch (err) {
      console.error('boot', err);
      document.getElementById('hbContent').innerHTML = `<div class="hb-loading" style="color:#991b1b;">Could not load: ${escapeHtml(err.message || err.code || 'unknown')}</div>`;
    }
    document.getElementById('btnPrint').addEventListener('click', () => window.print());
    wireSearchInput();
  });

  function renderHandbook(id) {
    const hb = allHandbooks.find(h => h.id === id);
    if (!hb) {
      document.getElementById('hbContent').innerHTML = '<div class="hb-loading">Pick a handbook from the dropdown.</div>';
      return;
    }
    const stages = Array.isArray(hb.stages) ? hb.stages : [];
    const stageBlocks = stages.map((s, i) => renderStage(s, i)).join('');

    const audienceLine = [
      hb.audience?.platform,
      hb.audience?.subRole || (Array.isArray(hb.audience?.subRoleValues) ? hb.audience.subRoleValues.join(',') : null),
    ].filter(Boolean).join(' · ');

    const hasDesign = !!hb.designPhilosophy;
    const hasRoles = !!hb.rolesAndResponsibilities;
    const hasOpen = !!(hb.openItems?.length);

    document.getElementById('hbContent').innerHTML = `
      <div class="hb-layout">
        <aside class="hb-toc" id="hbToc">
          <div class="hb-toc-title">On this page</div>
          <ul>
            <li><a href="#hb-sec-charter" data-toc="hb-sec-charter">Charter</a></li>
            ${hasDesign ? '<li><a href="#hb-sec-design" data-toc="hb-sec-design">Design philosophy</a></li>' : ''}
            ${hasRoles ? '<li><a href="#hb-sec-roles" data-toc="hb-sec-roles">Roles &amp; responsibilities</a></li>' : ''}
            <li><a href="#hb-sec-stages" data-toc="hb-sec-stages">Stages</a></li>
            ${stages.map((s, i) => `
              <li class="toc-sub">
                <a href="#hb-sec-stage-${i}" data-toc="hb-sec-stage-${i}" class="toc-sub">
                  <span class="hb-toc-num">${i + 1}</span>
                  <span>${escapeHtml(s.label || s.stageId || `Stage ${i + 1}`)}</span>
                </a>
              </li>
            `).join('')}
            ${hasOpen ? '<li><div class="hb-toc-divider"></div></li><li><a href="#hb-sec-open" data-toc="hb-sec-open">Open items</a></li>' : ''}
          </ul>
        </aside>

        <div class="hb-content">
          <div class="hb-hero">
            <div class="hb-eyebrow">Eduversal Induction Handbook · v${escapeHtml(hb.version || '?')}</div>
            <h1 class="hb-title">${escapeHtml(hb.title || hb.id)}</h1>
            <div class="hb-subtitle">${escapeHtml(hb.subtitle || '')}</div>
            <div class="hb-meta">
              ${audienceLine ? `<span><strong>Audience</strong> ${escapeHtml(audienceLine)}</span>` : ''}
              ${hb.duration?.totalDays ? `<span><strong>Duration</strong> ${hb.duration.totalDays} days</span>` : ''}
              ${hb.publishedOn ? `<span><strong>Published</strong> ${escapeHtml(hb.publishedOn)}</span>` : ''}
              ${hb.publishedBy ? `<span><strong>By</strong> ${escapeHtml(hb.publishedBy)}</span>` : ''}
            </div>
          </div>

          <div class="hb-charter-box" id="hb-sec-charter">
            <strong>This handbook sits under the Eduversal Induction Charter.</strong>
            Year-1 induction data does not feed network appraisal scoring. Mentor + mentee + school leader all read the same source. Edits go through <code>docs/induction/handbook-*.json</code> + <code>scripts/induction/seed-induction-programs.js</code> — not Firestore directly.
          </div>

          ${hasDesign ? renderDesignPhilosophy(hb.designPhilosophy) : ''}
          ${hasRoles ? renderRoles(hb.rolesAndResponsibilities) : ''}

          <div class="hb-section" id="hb-sec-stages">
            <h2 class="hb-section-h">Stages ${stages.length ? `<span class="count">${stages.length}</span>` : ''}</h2>
            ${stageBlocks || '<div class="hb-task-desc">No stages defined.</div>'}
          </div>

          ${hasOpen ? `
            <div class="hb-section" id="hb-sec-open">
              <h2 class="hb-section-h">Open items <span class="count">${hb.openItems.length}</span></h2>
              <ul style="padding-left:20px;">
                ${hb.openItems.map(o => `<li class="hb-section-text" style="margin-bottom:6px;">${escapeHtml(o)}</li>`).join('')}
              </ul>
            </div>
          ` : ''}
        </div>
      </div>
    `;

    wireTocScrollSpy();
    applyFilter();   // re-apply any active search term to the freshly rendered DOM
  }

  // Search + filter: substring match against task title + description +
  // meta-row text (CTS / SKL / PIGP / role / minutes chips all searchable).
  // Debounced via requestAnimationFrame. Stage hides if every task inside
  // is filtered out; stage header pill shows "X of Y" when narrowed.
  let _searchTerm = '';
  function applyFilter() {
    const term = _searchTerm.trim().toLowerCase();
    const searchWrap = document.getElementById('hbSearchWrap');
    const countEl = document.getElementById('hbSearchCount');
    if (searchWrap) searchWrap.classList.toggle('has-value', !!term);

    const tasks = Array.from(document.querySelectorAll('.hb-task'));
    let matchCount = 0;
    tasks.forEach(t => {
      if (!term) {
        t.classList.remove('is-filtered');
        matchCount++;
      } else {
        const text = (t.textContent || '').toLowerCase();
        const hit = text.includes(term);
        t.classList.toggle('is-filtered', !hit);
        if (hit) matchCount++;
      }
    });

    document.querySelectorAll('.hb-stage').forEach(stage => {
      const stageTasks = stage.querySelectorAll('.hb-task');
      const visible = Array.from(stageTasks).filter(t => !t.classList.contains('is-filtered'));
      const total = parseInt(stage.dataset.taskCount || '0', 10);
      stage.classList.toggle('is-filtered', !!term && stageTasks.length > 0 && visible.length === 0);
      const pill = stage.querySelector('[data-stage-pill]');
      if (pill) {
        if (term && stageTasks.length > 0) {
          pill.textContent = `${visible.length} of ${total}`;
          pill.classList.toggle('is-narrowed', visible.length < total);
        } else {
          pill.textContent = `${total} task${total === 1 ? '' : 's'}`;
          pill.classList.remove('is-narrowed');
        }
      }
    });

    const stagesSection = document.getElementById('hb-sec-stages');
    if (stagesSection) {
      const anyVisible = !!stagesSection.querySelector('.hb-stage:not(.is-filtered)');
      stagesSection.classList.toggle('is-filtered', !!term && !anyVisible);
    }

    if (countEl) {
      if (term) {
        countEl.textContent = `${matchCount} task${matchCount === 1 ? '' : 's'} match`;
        countEl.classList.add('is-active');
      } else {
        countEl.textContent = '';
        countEl.classList.remove('is-active');
      }
    }
  }

  function wireSearchInput() {
    const input = document.getElementById('hbSearch');
    const clear = document.getElementById('hbSearchClear');
    if (!input || input.__wired) return;
    input.__wired = true;

    let raf = null;
    const onInput = () => {
      _searchTerm = input.value;
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(applyFilter);
    };
    input.addEventListener('input', onInput);
    input.addEventListener('search', onInput);
    clear?.addEventListener('click', () => {
      input.value = ''; _searchTerm = '';
      applyFilter();
      input.focus();
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape' && input.value) {
        input.value = ''; _searchTerm = '';
        applyFilter();
      }
    });
  }

  // Scroll-spy: as user scrolls, the matching TOC link gets .active.
  // IntersectionObserver because passive scroll listener is jank-prone
  // on long handbooks with hundreds of tasks. rootMargin pushes the
  // trigger line ~30% down the viewport so the "active" link feels right.
  let _spyObserver = null;
  function wireTocScrollSpy() {
    if (_spyObserver) { _spyObserver.disconnect(); _spyObserver = null; }
    const targets = Array.from(document.querySelectorAll('[id^="hb-sec-"]'));
    if (!targets.length) return;
    const links = new Map();
    document.querySelectorAll('.hb-toc a[data-toc]').forEach(a => links.set(a.dataset.toc, a));

    const setActive = id => {
      links.forEach(a => a.classList.remove('active'));
      const link = links.get(id);
      if (link) {
        link.classList.add('active');
        if (window.matchMedia('(max-width: 960px)').matches) {
          link.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }
      }
    };

    _spyObserver = new IntersectionObserver(entries => {
      const visible = entries.filter(e => e.isIntersecting);
      if (!visible.length) return;
      visible.sort((a, b) => a.target.getBoundingClientRect().top - b.target.getBoundingClientRect().top);
      setActive(visible[0].target.id);
    }, {
      rootMargin: '-130px 0px -65% 0px',
      threshold: 0,
    });
    targets.forEach(t => _spyObserver.observe(t));
  }

  // Section-heading count pill — mirrors AH treatment. Reuses existing
  // .hb-section-h::before gradient bar by adding a sibling count span.
  // CSS added via tiny style block so we don't refactor the whole CSS
  // section in this diff.
  (function injectCountPillCss() {
    const css = `
      .hb-section-h .count {
        font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 999px;
        background: var(--accent-2); color: var(--accent-dk);
        font-variant-numeric: tabular-nums; font-family: 'DM Sans', sans-serif;
        margin-left: 4px;
      }
    `;
    const s = document.createElement('style');
    s.textContent = css;
    document.head.appendChild(s);
  })();

  // Window/phase palette — each card gets its own gradient stripe + numbered badge.
  const WINDOW_PALETTE = [
    { from: '#6c5ce7', to: '#4e3db8', bg: '#ede9fe', fg: '#4c1d95' }, // mor — Listen / Survival
    { from: '#0891b2', to: '#0e7490', bg: '#cffafe', fg: '#155e75' }, // cyan — Diagnose / Foundation
    { from: '#d97706', to: '#92400e', bg: '#fef3c7', fg: '#78350f' }, // amber — Act / Mastery
    { from: '#059669', to: '#065f46', bg: '#d1fae5', fg: '#064e3b' }, // green — Anchor / Integration
    { from: '#db2777', to: '#9d174d', bg: '#fce7f3', fg: '#831843' }, // rose
    { from: '#2563eb', to: '#1d4ed8', bg: '#dbeafe', fg: '#1e40af' }, // blue
  ];

  // Role colours + icons.
  const ROLE_META = {
    mentee:                  { color: '#6c5ce7', icon: '🌱' },
    mentor:                  { color: '#0891b2', icon: '🧭' },
    schoolLeader:            { color: '#d97706', icon: '🏫' },
    foundationRepresentative:{ color: '#059669', icon: '🏛️' },
    eduversalHQ:             { color: '#5b21b6', icon: '🎓' },
  };

  function renderDesignPhilosophy(dp) {
    const phasesOrWindows = dp.fourPhases || dp.fourWindows;
    const count = Array.isArray(phasesOrWindows) ? phasesOrWindows.length : 0;
    return `
      <div class="hb-section" id="hb-sec-design">
        <h2 class="hb-section-h">Design philosophy${count ? ` <span class="count">${count}</span>` : ''}</h2>
        ${dp.summary ? `<p class="hb-section-text">${escapeHtml(dp.summary)}</p>` : ''}
        ${Array.isArray(phasesOrWindows) ? `
          <div class="hb-roles">
            ${phasesOrWindows.map((p, i) => {
              const pal = WINDOW_PALETTE[i % WINDOW_PALETTE.length];
              const styleVars = `--win-from:${pal.from};--win-to:${pal.to};--win-bg:${pal.bg};--win-fg:${pal.fg};`;
              return `
                <div class="hb-window-card" style="${styleVars}">
                  <div class="hb-window-num">${i + 1}</div>
                  <div class="role-label">${escapeHtml(p.label)}</div>
                  <div class="role-resp">${escapeHtml(p.weeks || p.days || '')}</div>
                  ${p.cognitivePriority ? `<div class="role-resp">${escapeHtml(p.cognitivePriority)}</div>` : ''}
                  ${p.leadershipPriority ? `<div class="role-resp">${escapeHtml(p.leadershipPriority)}</div>` : ''}
                  ${p.successSignal ? `<div class="role-resp" style="margin-top:8px;font-style:italic;"><strong>Success:</strong> ${escapeHtml(p.successSignal)}</div>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  function renderRoles(rar) {
    const order = ['mentee', 'mentor', 'schoolLeader', 'foundationRepresentative', 'eduversalHQ'];
    const present = order.filter(k => rar[k]);
    const cards = present
      .map(k => {
        const r = rar[k];
        const meta = ROLE_META[k] || { color: 'var(--accent)', icon: '👤' };
        const items = Array.isArray(r.responsibilities) ? r.responsibilities : [];
        return `
          <div class="hb-role-card" style="--role-color:${meta.color};">
            <div class="role-label"><span class="role-icon">${meta.icon}</span> ${escapeHtml(r.label || k)}</div>
            ${r.ownership ? `<div class="role-resp"><strong>Ownership:</strong> ${escapeHtml(r.ownership)}</div>` : ''}
            ${items.length ? `<ul>${items.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>` : ''}
          </div>
        `;
      }).join('');
    return `
      <div class="hb-section" id="hb-sec-roles">
        <h2 class="hb-section-h">Roles and responsibilities ${present.length ? `<span class="count">${present.length}</span>` : ''}</h2>
        <div class="hb-roles">${cards}</div>
      </div>
    `;
  }

  function renderStage(stage, idx) {
    const tasks = Array.isArray(stage.tasks) ? stage.tasks : [];
    const subStages = Array.isArray(stage.subStages) ? stage.subStages : [];
    const cycle = stage.observationCycle || stage.walkthroughCycle;
    const num = (typeof idx === 'number' ? idx + 1 : '');
    const stageId = (typeof idx === 'number') ? `hb-sec-stage-${idx}` : '';

    const subTaskCount = subStages.reduce((n, ss) => n + (Array.isArray(ss.tasks) ? ss.tasks.length : 0), 0);
    const totalTaskCount = tasks.length + subTaskCount;

    return `
      <div class="hb-stage"${stageId ? ` id="${stageId}"` : ''} data-task-count="${totalTaskCount}">
        <div class="hb-stage-head">
          ${num ? `<div class="hb-stage-num">${num}</div>` : ''}
          <div class="hb-stage-name">
            ${escapeHtml(stage.label || stage.stageId)}
            ${totalTaskCount ? `<span class="hb-stage-tasks-pill" data-stage-pill>${totalTaskCount} task${totalTaskCount === 1 ? '' : 's'}</span>` : ''}
          </div>
          <div class="hb-stage-days">Day ${stage.dayStart} → ${stage.dayEnd}</div>
          ${stage.narrative ? `<div class="hb-stage-narrative">${escapeHtml(stage.narrative)}</div>` : ''}
        </div>
        ${tasks.map(renderTask).join('')}
        ${cycle ? renderObservationCycle(cycle) : ''}
        ${subStages.map(ss => `
          <div class="hb-substage-h">${escapeHtml(ss.label || ss.subStageId)}</div>
          ${(ss.tasks || []).map(renderTask).join('')}
        `).join('')}
      </div>
    `;
  }

  function renderTask(t) {
    const cts  = Array.isArray(t.cambridgeStandardRefs) ? t.cambridgeStandardRefs : [];
    const skl  = Array.isArray(t.skl_dimensions) ? t.skl_dimensions : [];
    const pigp = Array.isArray(t.pigp_articleRefs) ? t.pigp_articleRefs : [];
    return `
      <div class="hb-task">
        <div class="hb-task-title">${escapeHtml(t.title || t.taskId)}</div>
        ${t.description ? `<div class="hb-task-desc">${escapeHtml(t.description)}</div>` : ''}
        <div class="hb-task-meta">
          ${t.ownerRole ? `<span class="hb-tag role">${escapeHtml(t.ownerRole)}</span>` : ''}
          ${t.mentorRequired ? `<span class="hb-tag mentor">Mentor required</span>` : ''}
          ${t.mentorSignOffRequired ? `<span class="hb-tag signoff">Mentor sign-off</span>` : ''}
          ${t.schoolLeaderSignOffRequired ? `<span class="hb-tag signoff">School-leader sign-off</span>` : ''}
          ${t.estimatedMinutes ? `<span class="hb-tag minutes">${t.estimatedMinutes >= 60 ? Math.round(t.estimatedMinutes/60) + ' hr' : t.estimatedMinutes + ' min'}</span>` : ''}
          ${cts.map(c => `<span class="hb-tag cts">CTS ${escapeHtml(c)}</span>`).join('')}
          ${skl.map(s => `<span class="hb-tag skl">SKL: ${escapeHtml(s)}</span>`).join('')}
          ${pigp.map(p => `<span class="hb-tag pigp">PIGP ${escapeHtml(p)}</span>`).join('')}
        </div>
      </div>
    `;
  }

  function renderObservationCycle(c) {
    const rotation = Array.isArray(c.rotation) ? c.rotation : [];
    return `
      <div class="hb-task">
        <div class="hb-obs-cycle">
          <h4>${c.totalObservations ? c.totalObservations : c.totalWalkthroughs || ''} ${c.totalObservations ? 'observations' : 'walkthroughs'} — rotation</h4>
          <ol>
            ${rotation.map(r => `
              <li>
                ${r.month ? `<b>Month ${r.month}</b> · ` : ''}
                ${r.walkthroughs ? `<b>Walkthroughs ${r.walkthroughs}</b> · ` : ''}
                ${escapeHtml(r.label || r.type || '')}${r.scored === false ? ' (unscored)' : (r.scored === true ? ' (scored)' : '')}
                ${r.description ? `<br><span style="color:var(--ink-3);">${escapeHtml(r.description)}</span>` : ''}
              </li>
            `).join('')}
          </ol>
        </div>
      </div>
    `;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
