<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Eduversal Teachers Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", sans-serif;
      background: #050510;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ── Cosmic Aurora Background ── */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .login-bg::before {
      content: "";
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.25) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 50%, rgba(0,217,255,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 0%, rgba(255,107,157,0.12) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 100%, rgba(255,217,61,0.1) 0%, transparent 40%);
      animation: loginAurora 12s ease-in-out infinite alternate;
    }
    @keyframes loginAurora {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); }
      33%  { transform: translate(-3%,2%) rotate(1deg) scale(1.02); }
      66%  { transform: translate(2%,-1%) rotate(-1deg) scale(0.98); }
      100% { transform: translate(-1%,-2%) rotate(0.5deg) scale(1.01); }
    }

    /* ── Floating Orbs ── */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.4;
      z-index: 0;
    }
    .login-orb-1 { width:400px; height:400px; background:radial-gradient(circle,rgba(108,92,231,0.6) 0%,transparent 70%); top:-10%; left:-5%; animation:loginOrb1 15s ease-in-out infinite; }
    .login-orb-2 { width:350px; height:350px; background:radial-gradient(circle,rgba(0,217,255,0.45) 0%,transparent 70%); bottom:-10%; right:-5%; animation:loginOrb2 18s ease-in-out infinite; }
    .login-orb-3 { width:250px; height:250px; background:radial-gradient(circle,rgba(255,107,157,0.35) 0%,transparent 70%); top:50%; left:50%; transform:translate(-50%,-50%); animation:loginOrb3 20s ease-in-out infinite; }
    @keyframes loginOrb1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
    @keyframes loginOrb2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }
    @keyframes loginOrb3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.3)} }

    /* ── Particles ── */
    .login-particles { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
    .login-particle { position:absolute; width:2px; height:2px; background:white; border-radius:50%; opacity:0; animation:loginParticleFade 4s ease-in-out infinite; }
    .login-particle:nth-child(1)  { left:10%; top:20%; animation-delay:0s;   animation-duration:3s; }
    .login-particle:nth-child(2)  { left:25%; top:70%; animation-delay:0.5s; animation-duration:4s; }
    .login-particle:nth-child(3)  { left:40%; top:15%; animation-delay:1s;   animation-duration:3.5s; }
    .login-particle:nth-child(4)  { left:55%; top:85%; animation-delay:1.5s; animation-duration:4.5s; }
    .login-particle:nth-child(5)  { left:70%; top:30%; animation-delay:2s;   animation-duration:3.2s; }
    .login-particle:nth-child(6)  { left:85%; top:60%; animation-delay:0.3s; animation-duration:5s; }
    .login-particle:nth-child(7)  { left:15%; top:45%; animation-delay:2.5s; animation-duration:3.8s; }
    .login-particle:nth-child(8)  { left:60%; top:50%; animation-delay:1.2s; animation-duration:4.2s; }
    .login-particle:nth-child(9)  { left:90%; top:10%; animation-delay:0.8s; animation-duration:3.6s; }
    .login-particle:nth-child(10) { left:35%; top:90%; animation-delay:3s;   animation-duration:4.8s; }
    .login-particle:nth-child(11) { left:5%;  top:80%; animation-delay:1.8s; animation-duration:3.3s; }
    .login-particle:nth-child(12) { left:75%; top:75%; animation-delay:0.6s; animation-duration:4.6s; }
    .login-particle:nth-child(13) { left:48%; top:35%; animation-delay:2.2s; animation-duration:3.9s; }
    .login-particle:nth-child(14) { left:20%; top:55%; animation-delay:1.4s; animation-duration:5.2s; }
    .login-particle:nth-child(15) { left:65%; top:5%;  animation-delay:0.9s; animation-duration:3.1s; }
    .login-particle:nth-child(16) { left:80%; top:40%; animation-delay:3.2s; animation-duration:4.4s; }
    .login-particle:nth-child(17) { left:50%; top:65%; animation-delay:2.8s; animation-duration:3.7s; }
    .login-particle:nth-child(18) { left:30%; top:25%; animation-delay:1.6s; animation-duration:5.5s; }
    .login-particle:nth-child(19) { left:95%; top:88%; animation-delay:0.2s; animation-duration:4.1s; }
    .login-particle:nth-child(20) { left:42%; top:48%; animation-delay:2.4s; animation-duration:3.4s; }
    @keyframes loginParticleFade {
      0%,100% { opacity:0; transform:translateY(0) scale(1); }
      50%      { opacity:0.8; transform:translateY(-20px) scale(1.5); }
    }

    /* ── Grid Lines ── */
    .login-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(108,92,231,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,92,231,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      pointer-events: none;
    }

    /* ── Login Card ── */
    #loginBox {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(40px) saturate(1.5);
      -webkit-backdrop-filter: blur(40px) saturate(1.5);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 48px 40px 40px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 1px 0 rgba(255,255,255,0.1) inset;
      animation: loginCardEntrance 0.8s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.2s;
    }
    @keyframes loginCardEntrance {
      from { opacity:0; transform:translateY(40px) scale(0.95); filter:blur(10px); }
      to   { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
    }
    #loginBox::before {
      content: "";
      position: absolute; inset: -1px; border-radius: 29px;
      background: linear-gradient(135deg, rgba(108,92,231,0.4) 0%, rgba(0,217,255,0.15) 25%, transparent 50%, rgba(255,107,157,0.1) 75%, rgba(108,92,231,0.4) 100%);
      z-index: -1;
      mask: linear-gradient(black,black) content-box, linear-gradient(black,black);
      -webkit-mask: linear-gradient(black,black) content-box, linear-gradient(black,black);
      mask-composite: exclude; -webkit-mask-composite: xor;
      padding: 1px;
      animation: loginBorderGlow 6s linear infinite;
      background-size: 300% 300%;
    }
    @keyframes loginBorderGlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ── Logo ── */
    .login-logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 32px;
      animation: loginLogoEntrance 1s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.4s;
    }
    .login-logo-icon {
      width: 72px; height: 72px; border-radius: 22px;
      background: linear-gradient(135deg, rgba(108,92,231,0.25) 0%, rgba(0,217,255,0.15) 100%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px; position: relative;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .login-logo-icon::after {
      content: ""; position: absolute; inset: -3px; border-radius: 25px;
      background: linear-gradient(135deg, rgba(108,92,231,0.5), rgba(0,217,255,0.3));
      z-index: -1; filter: blur(15px); opacity: 0.6;
      animation: loginLogoPulse 3s ease-in-out infinite;
    }
    @keyframes loginLogoPulse {
      0%,100% { opacity:0.4; transform:scale(1); }
      50%      { opacity:0.7; transform:scale(1.1); }
    }
    .login-logo-icon svg { width:36px; height:36px; fill:white; }
    .login-logo h1 { font-family:"DM Sans",sans-serif; font-size:24px; font-weight:700; color:white; letter-spacing:-0.5px; margin-bottom:6px; text-align:center; }
    .login-logo p  { font-size:13px; color:rgba(255,255,255,0.45); font-weight:500; letter-spacing:3px; text-transform:uppercase; text-align:center; }
    @keyframes loginLogoEntrance {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Inputs ── */
    .login-input-group {
      position: relative; margin-bottom: 16px;
      animation: loginFieldEntrance 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-input-group:nth-child(1) { animation-delay:0.5s; }
    .login-input-group:nth-child(2) { animation-delay:0.6s; }
    @keyframes loginFieldEntrance {
      from { opacity:0; transform:translateX(-20px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .login-input-group .login-input-icon {
      position:absolute; left:16px; top:50%; transform:translateY(-50%);
      width:18px; height:18px; fill:rgba(255,255,255,0.3);
      transition:fill 0.3s ease; pointer-events:none;
    }
    #loginBox input[type="email"],
    #loginBox input[type="password"] {
      width:100%; padding:16px 16px 16px 46px;
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; font-size:15px; font-family:"DM Sans",sans-serif;
      color:white; outline:none; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); margin:0;
    }
    #loginBox input[type="email"]::placeholder,
    #loginBox input[type="password"]::placeholder { color:rgba(255,255,255,0.3); }
    #loginBox input[type="email"]:focus,
    #loginBox input[type="password"]:focus {
      border-color:rgba(108,92,231,0.5); background:rgba(255,255,255,0.06);
      box-shadow:0 0 0 4px rgba(108,92,231,0.1), 0 0 30px rgba(108,92,231,0.08);
    }
    .login-input-group:focus-within .login-input-icon { fill:rgba(108,92,231,0.9); }

    /* ── Sign In Button ── */
    #loginBtn {
      width:100%; padding:16px;
      background:linear-gradient(135deg, #6c5ce7 0%, #00d9ff 100%);
      color:white; border:none; border-radius:14px;
      font-size:15px; font-weight:600; font-family:"DM Sans",sans-serif;
      cursor:pointer; margin-top:8px; position:relative; overflow:hidden;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
      animation:loginBtnEntrance 0.6s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay:0.7s; letter-spacing:0.5px;
    }
    #loginBtn::before {
      content:""; position:absolute; inset:0;
      background:linear-gradient(135deg, #7c6cf0 0%, #00eeff 100%);
      opacity:0; transition:opacity 0.3s ease;
    }
    #loginBtn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 12px 35px rgba(108,92,231,0.4),0 0 0 1px rgba(108,92,231,0.2); }
    #loginBtn:hover:not(:disabled)::before { opacity:1; }
    #loginBtn:active:not(:disabled) { transform:translateY(0); }
    #loginBtn span { position:relative; z-index:1; }
    #loginBtn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
    @keyframes loginBtnEntrance {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    #loginBtn::after {
      content:""; position:absolute; top:-50%; left:-60%; width:40%; height:200%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
      transform:skewX(-20deg); animation:loginBtnShimmer 4s ease-in-out infinite; z-index:1;
    }
    @keyframes loginBtnShimmer { 0%,100%{left:-60%} 50%{left:120%} }

    /* ── Divider ── */
    .login-divider {
      display:flex; align-items:center; margin:24px 0;
      animation:loginDividerEntrance 0.6s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay:0.75s;
    }
    .login-divider::before,
    .login-divider::after { content:""; flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); }
    .login-divider span { padding:0 16px; font-size:12px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:2px; font-weight:600; }
    @keyframes loginDividerEntrance { from{opacity:0} to{opacity:1} }

    /* ── Google Button ── */
    #googleLoginBtn {
      display:flex; align-items:center; justify-content:center; gap:12px;
      width:100%; padding:15px;
      background:rgba(255,255,255,0.04);
      color:rgba(255,255,255,0.85);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:14px; font-size:14px; font-weight:500; font-family:"DM Sans",sans-serif;
      cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
      animation:loginGoogleEntrance 0.6s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay:0.85s;
    }
    #googleLoginBtn:hover:not(:disabled) { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); transform:translateY(-1px); box-shadow:0 8px 25px rgba(0,0,0,0.2); }
    #googleLoginBtn:active:not(:disabled) { transform:translateY(0); }
    #googleLoginBtn:disabled { opacity:0.5; cursor:not-allowed; }
    #googleLoginBtn svg { width:20px; height:20px; flex-shrink:0; }
    @keyframes loginGoogleEntrance { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    /* ── Error Message ── */
    .error-message {
      background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.2);
      color:#fca5a5; padding:14px 16px; border-radius:12px;
      margin-bottom:16px; display:none; font-size:14px;
      backdrop-filter:blur(10px); animation:loginErrorShake 0.4s ease;
    }
    @keyframes loginErrorShake {
      0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 50%{transform:translateX(6px)} 75%{transform:translateX(-4px)}
    }

    /* ── Footer ── */
    .login-footer {
      text-align:center; margin-top:28px;
      animation:loginFooterEntrance 0.6s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay:0.95s;
    }
    .login-footer p { font-size:12px; color:rgba(255,255,255,0.2); line-height:1.6; }
    .login-footer .login-secure-badge { display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:0.5px; }
    .login-footer .login-secure-badge svg { width:12px; height:12px; fill:rgba(108,92,231,0.5); }
    @keyframes loginFooterEntrance { from{opacity:0} to{opacity:1} }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-orb login-orb-1"></div>
  <div class="login-orb login-orb-2"></div>
  <div class="login-orb login-orb-3"></div>
  <div class="login-grid"></div>
  <div class="login-particles">
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
    <div class="login-particle"></div><div class="login-particle"></div>
  </div>

  <div id="loginBox">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
      </div>
      <h1>Eduversal Indonesia</h1>
      <p>Teachers Hub</p>
    </div>

    <div id="errorMsg" class="error-message"></div>

    <form id="loginForm">
      <div class="login-input-group">
        <svg class="login-input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        <input type="email" id="emailInput" placeholder="Email address" required autocomplete="email" />
      </div>
      <div class="login-input-group">
        <svg class="login-input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
        <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="loginBtn"><span>Sign In</span></button>
    </form>

    <div class="login-divider"><span>or</span></div>

    <button id="googleLoginBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>

    <div class="login-footer">
      <p>Authorized access for Eduversal partner schools</p>
      <div class="login-secure-badge">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        Secured by Firebase Authentication
      </div>
    </div>
  </div>

<!-- FIREBASE_ENV -->
  <script type="module">
    import { initializeApp, getApps }
      from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import {
      getAuth, onAuthStateChanged, signOut,
      signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider,
    } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const app  = getApps().length ? getApps()[0] : initializeApp({
      apiKey:            window.ENV.FIREBASE_API_KEY,
      authDomain:        window.ENV.FIREBASE_AUTH_DOMAIN,
      projectId:         window.ENV.FIREBASE_PROJECT_ID,
      storageBucket:     window.ENV.FIREBASE_STORAGE_BUCKET,
      messagingSenderId: window.ENV.FIREBASE_MESSAGING_SENDER_ID,
      appId:             window.ENV.FIREBASE_APP_ID,
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    const ALLOWED_DOMAINS = [
      'scr.sch.id', 'eibos.sch.id', 'fatih.sch.id', 'gcb.sch.id',
      'kesatuanbangsa.sch.id', 'kbs.sch.id', 'mega.sch.id', 'pakarbelia.sch.id',
      'prestigeschool.sch.id', 'pribadibandung.sch.id', 'pribadidepok.sch.id',
      'pribadipremiere.sch.id', 'semesta.sch.id', 'tnafatih.sch.id', 'eduversal.org',
    ];

    const errorMsg = document.getElementById('errorMsg');
    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => (errorMsg.style.display = 'none'), 4000);
    }

    // If already signed in → go straight to dashboard
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      const domain = user.email.split('@')[1];
      const isPasswordUser = user.providerData.some(p => p.providerId === 'password');
      if (!ALLOWED_DOMAINS.includes(domain) && !isPasswordUser) {
        await signOut(auth);
        showError('Access denied. Only authorized school emails are allowed.');
        return;
      }
      try {
        const userRef = doc(db, 'users', user.uid);
        const snap    = await getDoc(userRef);
        if (!snap.exists()) {
          await setDoc(userRef, {
            uid:              user.uid,
            email:            user.email,
            displayName:      user.displayName || '',
            photoURL:         user.photoURL    || '',
            role_teachershub: 'teachers_user',
            createdAt:        serverTimestamp(),
          });
        } else if (snap.data().role_teachershub == null) {
          const legacy = snap.data().role;
          const assignRole = ['teachers_admin', 'teachers_user'].includes(legacy) ? legacy : 'teachers_user';
          await setDoc(userRef, { role_teachershub: assignRole }, { merge: true });
        }
        window.location.replace('index.html');
      } catch (e) {
        console.error('login: profile check failed', e);
        await signOut(auth);
        showError('Could not verify your account. Please try again.');
      }
    });

    // Email/password login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const btn      = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span>Signing in...</span>';
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        let msg = 'Invalid email or password';
        if (err.code === 'auth/too-many-requests')           msg = 'Too many attempts. Please try again later.';
        else if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your connection.';
        showError(msg);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>Sign In</span>';
      }
    });

    // Google sign-in
    const googleProvider = new GoogleAuthProvider();
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleLoginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const result = await signInWithPopup(auth, googleProvider);
        if (!ALLOWED_DOMAINS.includes(result.user.email.split('@')[1])) {
          await signOut(auth);
          showError('Access denied. Only authorized school emails are allowed.');
        }
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showError(err.message || 'Google sign-in failed');
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign in with Google`;
      }
    });
  </script>
</body>
</html>
