<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS/A Level Mathematics — Subject Leader Tracker</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="partials/pacing-tracker-core.css">
<style>:root { --accent: #c0392b; --accent-2: #fce8e6; }</style>

<script src="partials/navbar.js"></script>
<!-- FIREBASE_ENV -->
<script type="module" src="auth-guard.js"></script>
</head>
<body>

<div id="navbar-container"></div>

<!-- TRACKER CONFIG -->
<script>
window.TRACKER_CONFIG = {
  collection:     'asalevel_math_pacing',
  docId:          'year11-12',
  subjectKey:     'math',
  label:          'Mathematics',
  code:           '9709',
  qualifier:      'AS & A Level',
  years:          'Year 11���12',
  curriculum:     'asalevel',
};
</script>

<!-- TOPBAR -->
<header class="tracker-topbar">
  <div class="tracker-brand">
    <div class="tracker-brand-mark">SL</div>
    <div class="tracker-brand-text">
      <h1>AS/A Level Mathematics — Tracker</h1>
      <nav class="tracker-breadcrumb">
        <a href="index.html">Teachers Hub</a>
        <span>›</span>
        <span>Subject Leader</span>
        <span>›</span>
        <span>AS/A Level Mathematics</span>
      </nav>
    </div>
  </div>
  <div class="tracker-topbar-right">
    <div class="tracker-school-badge" id="schoolBadge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span id="schoolName">—</span>
    </div>
  </div>
</header>

<!-- TAB BAR -->
<div class="tracker-tabs">
  <div class="tracker-tab-group">
    <button class="tracker-tab-btn on" onclick="switchTrackerTab('overview', this)">Teacher Overview</button>
    <button class="tracker-tab-btn" onclick="switchTrackerTab('heatmap', this)">Topic Heatmap</button>
    <button class="tracker-tab-btn" onclick="switchTrackerTab('hours', this)">Hours Report</button>
  </div>
  <div class="tracker-tab-actions">
    <button class="btn" id="refreshBtn" onclick="refreshTracker()">↻ Refresh</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div style="text-align:center">
    <div class="spinner"></div>
    <p>Loading tracker…</p>
  </div>
</div>

<!-- CONTENT (hidden until loaded) -->
<div id="appContent" style="display:none">

  <!-- TAB 1: Overview -->
  <div class="tracker-panel on" id="panel-overview">
    <div class="agg-banner" id="overviewAgg"></div>
    <div id="weakAlertPanel" class="weak-panel" style="display:none">
      <div class="weak-panel-head" onclick="toggleWeakPanel()">
        <span class="weak-panel-icon">⚠</span>
        <span class="weak-panel-title" id="weakAlertCount"></span>
        <button class="weak-panel-toggle" id="weakAlertToggle">▸ Show</button>
      </div>
      <div id="weakAlertBody" style="display:none"></div>
    </div>
    <div id="overviewList"></div>
    <div class="pager" id="overviewPager"></div>
  </div>

  <!-- TAB 2: Heatmap -->
  <div class="tracker-panel" id="panel-heatmap">
    <div id="heatmapGrid"></div>
  </div>

  <!-- TAB 3: Hours -->
  <div class="tracker-panel" id="panel-hours">
    <div class="agg-banner" id="hoursAgg"></div>
    <div id="hoursContent"></div>
    <div class="pager" id="hoursPager"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Set school name from profile -->
<script>
document.addEventListener('authReady', ({ detail: { profile } }) => {
  const el = document.getElementById('schoolName');
  if (el && profile.school) el.textContent = profile.school;
});
</script>

<script type="module" src="partials/pacing-tracker-core.js"></script>
</body>
</html>
