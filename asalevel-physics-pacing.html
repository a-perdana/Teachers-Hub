<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cambridge International AS & A Level Physics - Pacing Guide</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;charset=utf-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%230a0a1a'/><polygon points='10,45 50,65 50,70 10,50' fill='%234e3db8'/><polygon points='90,45 50,65 50,70 90,50' fill='%235a4bd1'/><polygon points='50,25 90,45 50,65 10,45' fill='%236c5ce7'/><line x1='85' y1='46' x2='85' y2='68' stroke='%23ffd93d' stroke-width='4' stroke-linecap='round'/><circle cx='85' cy='72' r='3.5' fill='%23ffd93d'/></svg>">
<link rel="stylesheet" href="base.css">
<style>
:root {
  --accent: #2980b9;
  --accent-2: #e8f4fd;
  /* keep semantic colors if used: --green, --green-2, --blue, --blue-2, --amber, --amber-2, --purple, --purple-2 */
}

@keyframes spin { to { transform: rotate(360deg); } }

.layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 120px); transition: grid-template-columns .25s ease; position: relative; }
.layout.sidebar-collapsed { grid-template-columns: 0px 1fr; }

/* --- SIDEBAR ----------------------------*/
/* Sidebar toggle button */
.layout { position: relative; }
.sidebar-toggle {
  position: absolute;
  top: 10px;
  left: 280px;
  z-index: 100;
  width: 22px; height: 38px;
  background: var(--white);
  border: 1px solid var(--border);
  border-left: none;
  border-radius: 0 6px 6px 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3);
  box-shadow: 2px 0 6px rgba(28,28,46,.08);
  transition: left .25s ease, background .15s, color .15s;
}
.sidebar-toggle:hover { background: var(--paper); color: var(--ink); }
.sidebar-toggle svg { transition: transform .25s; }
.layout.sidebar-collapsed .sidebar-toggle { left: 0px; border-left: 1px solid var(--border); }
.layout.sidebar-collapsed .sidebar-toggle svg { transform: rotate(180deg); }
.sidebar {
  background: var(--white);
  border-right: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.sidebar-inner {
  min-width: 280px;
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow-y: auto;
}
.layout.sidebar-collapsed .sidebar { border-right: none; }
.layout.sidebar-collapsed .sidebar-inner { visibility: hidden; }

.sidebar-section {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-label {
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}

.chips { display: flex; flex-wrap: wrap; gap: 5px; }

.chip {
  font-size: .68rem; font-weight: 500;
  padding: 3px 9px; border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--paper);
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
  line-height: 1.6;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.on { background: var(--accent); border-color: var(--accent); color: white; }

.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: .4; }
.search-input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: .78rem;
  padding: 7px 10px 7px 30px;
  border: 1px solid var(--border);
  border-radius: 7px;
  background: var(--paper);
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); background: white; }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ink-3); font-size: .85rem; line-height: 1; padding: 2px 3px;
  display: none; border-radius: 3px;
}
.search-clear:hover { color: var(--ink); }
.search-clear.visible { display: block; }

/* Chapter nav */
.ch-nav { flex: 1; overflow-y: auto; padding: 6px 0 20px; }
.ch-nav-group { margin-bottom: 2px; }
.ch-nav-group-label {
  font-size: .6rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: var(--ink-3); padding: 10px 16px 4px;
}

.ch-nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .12s;
}
.ch-nav-item:hover { background: var(--paper); }
.ch-nav-item.active { background: var(--accent-2); border-left-color: var(--accent); }
.ch-nav-num {
  font-family: 'DM Mono', monospace; font-size: .62rem;
  background: var(--paper-2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 5px; min-width: 24px; text-align: center;
  color: var(--ink-2); flex-shrink: 0;
}
.ch-nav-item.active .ch-nav-num { background: var(--accent); border-color: var(--accent); color: white; }
.ch-nav-title { font-size: .75rem; font-weight: 500; flex: 1; line-height: 1.3; color: var(--ink); }
.ch-nav-count { font-size: .6rem; color: var(--ink-3); font-family: 'DM Mono', monospace; flex-shrink: 0; white-space: nowrap; }
.ch-nav-item.active .ch-nav-count { color: var(--accent); font-weight: 600; }
.ch-nav-mini { width: 28px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.ch-nav-mini-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .4s; }

/* --- MAIN -------------------------------*/
.main { overflow-y: auto; display: flex; flex-direction: column; }

/* View bar */
.view-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; background: white;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
  gap: 12px;
}

.tab-group { display: flex; gap: 2px; background: var(--paper); border-radius: 8px; padding: 3px; }
.tab-btn {
  font-family: 'DM Sans', sans-serif; font-size: .73rem; font-weight: 500;
  padding: 5px 13px; border-radius: 6px; border: none; background: none;
  color: var(--ink-2); cursor: pointer; transition: all .15s;
}
.tab-btn.on { background: white; color: var(--ink); box-shadow: var(--shadow-sm); }

.view-actions { display: flex; gap: 7px; align-items: center; }

.btn {
  font-family: 'DM Sans', sans-serif; font-size: .72rem; font-weight: 500;
  padding: 6px 12px; border-radius: 7px;
  border: 1px solid var(--border); background: white; color: var(--ink-2);
  cursor: pointer; transition: all .15s;
}
.btn:hover { border-color: var(--ink-2); color: var(--ink); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #1a6fa0; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* --- PANELS -----------------------------*/
.panel { display: none; flex: 1; padding: 20px 24px; }
.panel.on { display: block; }

/* --- PACING VIEW ------------------------*/
.ch-block {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 14px;
  overflow: hidden; box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.ch-block:hover { box-shadow: var(--shadow); }

.ch-header {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; cursor: pointer;
  background: var(--paper); border-bottom: 1px solid var(--border);
  user-select: none;
}

.ch-badge {
  font-family: 'DM Mono', monospace; font-size: .65rem; font-weight: 500;
  padding: 2px 7px; border-radius: 5px;
  background: var(--ink); color: white; flex-shrink: 0; min-width: 44px; text-align: center;
}

.ch-header-title {
  font-family: 'Lora', serif; font-size: 1rem; flex: 1;
}

.ch-year-tag {
  font-size: .62rem; font-weight: 600; padding: 2px 7px;
  border-radius: 100px; flex-shrink: 0;
}
.yr9 { background: var(--blue-2); color: var(--blue); border: 1px solid #c2d8f5; }
.yr10 { background: var(--purple-2); color: var(--purple); border: 1px solid #d5c3f0; }

.ch-stats { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.ch-prog-bar { width: 70px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.ch-prog-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s; }
.ch-pct { font-size: .68rem; color: var(--ink-3); font-weight: 500; min-width: 28px; }
.ch-topic-count { font-size: .65rem; color: var(--ink-3); background: var(--paper-2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
.ch-header-title { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.ch-caret { color: var(--ink-3); font-size: .75rem; transition: transform .2s; flex-shrink: 0; }
.ch-block.collapsed .ch-caret { transform: rotate(-90deg); }
.ch-block.collapsed .topics-wrap { display: none; }

/* Topics table */
.topics-wrap { overflow-x: clip; }
table.topics-tbl { width: 100%; border-collapse: collapse; table-layout: auto; }

table.topics-tbl th {
  font-size: .62rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--ink-3); padding: 9px 16px; text-align: left;
  border-bottom: 1px solid var(--border); background: #fafaf8;
  white-space: nowrap;
  position: sticky; top: 49px; z-index: 2;
}
table.topics-tbl th:nth-child(1),
table.topics-tbl td:nth-child(1) { padding-left: 18px; padding-right: 0; }
table.topics-tbl th:nth-child(2),
table.topics-tbl td:nth-child(2) { padding-left: 12px; }

table.topics-tbl td {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  vertical-align: top; font-size: .8rem;
}
table.topics-tbl tr:last-child td { border-bottom: none; }
table.topics-tbl tr.done-row { background: var(--green-2); }
table.topics-tbl tr.inprogress-row { background: var(--blue-2); }
table.topics-tbl tbody tr:not(.add-topic-row):not(.res-row):hover { background: var(--paper-2); transition: background .12s; }
table.topics-tbl tbody tr.done-row:hover { background: #d4eddf; }
table.topics-tbl tbody tr.inprogress-row:hover { background: #d6e6f8; }

/* Checkbox */
.tcheck {
  width: 17px; height: 17px;
  border: 2px solid var(--border); border-radius: 4px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.tcheck:hover { border-color: var(--blue); }
.tcheck.mid { background: var(--blue-2); border-color: var(--blue); }
.tcheck.mid::after { content: '-'; color: var(--blue); font-size: .85rem; font-weight: 800; line-height: 1; }
.tcheck.on { background: var(--green); border-color: var(--green); }
.tcheck.on::after { content: 'v'; color: white; font-size: .65rem; font-weight: 800; }

/* Topic cell */
.topic-cell { min-width: 200px; }
.topic-name { font-weight: 500; line-height: 1.4; }
.topic-name.struck { text-decoration: line-through; color: var(--ink-3); }

/* Obj codes */
.obj-codes { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
.obj-code {
  font-size: .6rem; font-family: 'DM Mono', monospace;
  padding: 1px 5px; border-radius: 3px;
  background: var(--blue-2); color: var(--blue);
  border: 1px solid #c0d4f0; cursor: pointer;
  transition: all .12s; white-space: nowrap;
}
.obj-code:hover { background: var(--blue); color: white; }

/* Duration badge */
.dur-badge {
  font-size: .68rem; font-family: 'DM Mono', monospace;
  background: var(--amber-2); color: var(--amber);
  border: 1px solid #f0dea0; padding: 2px 7px;
  border-radius: 4px; white-space: nowrap; display: inline-block;
}

/* Status pill */
table.topics-tbl td:last-child { white-space: nowrap; }
.status-pill {
  display: inline-flex; gap: 2px;
  background: var(--paper-2); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px;
}
.sp-btn {
  font-family: 'DM Sans', sans-serif; font-size: .63rem; font-weight: 500;
  padding: 3px 7px; border-radius: 6px; border: none; background: none;
  cursor: pointer; color: var(--ink-3); transition: all .12s; white-space: nowrap;
}
.sp-btn:hover { color: var(--ink); background: rgba(28,28,46,.06); }
.sp-btn.sp-on.sp-pending   { background: var(--paper); color: var(--ink-2); box-shadow: var(--shadow-sm); }
.sp-btn.sp-on.sp-inprogress{ background: var(--blue-2); color: var(--blue); box-shadow: var(--shadow-sm); }
.sp-btn.sp-on.sp-done      { background: var(--green-2); color: var(--green); box-shadow: var(--shadow-sm); }

/* Editable cell */
.editable {
  border-radius: 4px;
  padding: 2px 4px;
  margin: -2px -4px;
  transition: background .15s;
  cursor: default;
  outline: none;
  line-height: 1.5;
}
.coord-mode .editable {
  cursor: text;
  border: 1px dashed transparent;
}
.coord-mode .editable:hover { background: var(--paper-2); border-color: var(--border); }
.coord-mode .editable:focus { background: white; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(41,128,185,.12); }

/* Edit indicator */
.edit-hint {
  display: none;
  font-size: .6rem; color: var(--accent); font-weight: 500;
  padding: 4px 16px; background: var(--accent-2);
  border-bottom: 1px solid #b8d4ec;
}
.coord-mode .edit-hint { display: block; }

/* --- WEEKLY VIEW ------------------------*/
.week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

.week-card {
  background: white; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: box-shadow .2s;
}
.week-card:hover { box-shadow: var(--shadow); }

.week-card-head {
  padding: 10px 14px; background: var(--ink); color: white;
  display: flex; align-items: center; justify-content: space-between;
}
.week-card-title { font-family: 'Lora', serif; font-size: .9rem; }
.week-hours-tag {
  font-size: .65rem; font-family: 'DM Mono', monospace;
  background: rgba(255,255,255,.15); padding: 2px 6px; border-radius: 4px;
}
.week-topics-list { padding: 4px 0; }
.week-topic-row {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: .75rem;
}
.week-topic-row:last-child { border-bottom: none; }
.wt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.wt-name { flex: 1; line-height: 1.4; font-weight: 500; }
.wt-ch { font-size: .62rem; color: var(--ink-3); font-family: 'DM Mono', monospace; white-space: nowrap; }

/* Year dot colors */
.dot-y9  { background: var(--blue); }
.dot-y10 { background: var(--purple); }

/* --- MODAL ------------------------------*/
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(28,28,46,.55);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; }

.modal {
  background: white; border-radius: 14px;
  width: 500px; max-width: 92vw; max-height: 82vh;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: popIn .18s ease;
}
@keyframes popIn { from { transform: scale(.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.modal-head {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
  flex-shrink: 0;
}
.modal-head-text h3 { font-family: 'Lora', serif; font-size: 1.05rem; }
.modal-head-text p  { font-size: .72rem; color: var(--ink-3); margin-top: 3px; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--ink-3); padding: 0 2px; line-height: 1; }
.modal-close:hover { color: var(--ink); }
.modal-nav-btn {
  background: none; border: 1px solid var(--border); cursor: pointer;
  font-size: .8rem; color: var(--ink-3); padding: 3px 9px;
  border-radius: 5px; line-height: 1; transition: all .12s;
}
.modal-nav-btn:hover { border-color: var(--ink-2); color: var(--ink); }
.modal-nav-btn:disabled { opacity: .3; cursor: not-allowed; }

.modal-body { padding: 16px 22px 22px; overflow-y: auto; flex: 1; }

.obj-entry { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.obj-entry:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.obj-entry-code { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--blue); font-weight: 500; margin-bottom: 4px; }
.obj-entry-text { font-size: .82rem; line-height: 1.65; color: var(--ink); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Empty state */
.empty { text-align: center; padding: 48px 20px; color: var(--ink-3); }
.empty-icon { font-size: 2rem; margin-bottom: 8px; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--ink); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: .78rem; font-weight: 500;
  box-shadow: var(--shadow-lg);
  transform: translateY(60px); opacity: 0;
  transition: all .25s ease;
  z-index: 2000;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* --- COORD ADD / DELETE CONTROLS --------*/
.del-topic-btn {
  display: none; background: none; border: none; cursor: pointer;
  color: var(--ink-3); font-size: .85rem; padding: 2px 4px;
  border-radius: 4px; line-height: 1; margin-top: 2px;
  transition: color .15s, background .15s;
}
.del-topic-btn:hover { color: var(--accent); background: var(--accent-2); }
.coord-mode .del-topic-btn { display: inline-flex; }

.del-ch-btn {
  display: none; background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,.5); font-size: .9rem; padding: 2px 6px;
  border-radius: 4px; line-height: 1; margin-left: auto;
  transition: color .15s;
}
.del-ch-btn:hover { color: white; }
.coord-mode .del-ch-btn { display: inline-flex; }

.add-topic-row td { padding: 6px 16px !important; border-bottom: none !important; }
.add-topic-btn {
  display: none; background: none; border: 1.5px dashed var(--border);
  color: var(--ink-3); font-size: .75rem; padding: 5px 14px;
  border-radius: 6px; cursor: pointer; width: 100%; text-align: left;
  transition: border-color .15s, color .15s;
}
.add-topic-btn:hover { border-color: var(--accent); color: var(--accent); }
.coord-mode .add-topic-btn { display: block; }

.add-chapter-wrap {
  display: none; text-align: center; padding: 16px 0 8px;
}
.add-chapter-btn {
  background: none; border: 2px dashed var(--border);
  color: var(--ink-3); font-size: .8rem; padding: 10px 28px;
  border-radius: 10px; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.add-chapter-btn:hover { border-color: var(--accent); color: var(--accent); }
.coord-mode .add-chapter-wrap { display: block; }

/* --- RESOURCES --------------------------*/
.res-row td { padding: 3px 16px 10px 42px !important; }
.res-chips { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; min-height: 22px; }
.res-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: .64rem; font-family: 'DM Mono', monospace;
  padding: 2px 7px; border-radius: 4px;
  background: var(--paper-2); color: var(--ink-2);
  border: 1px solid var(--border); text-decoration: none;
  transition: all .12s;
}
.res-link:hover { background: var(--blue-2); color: var(--blue); border-color: #c0d4f0; }
.del-res-btn {
  display: none; background: none; border: none; cursor: pointer;
  color: var(--ink-3); font-size: .65rem; padding: 0 1px;
  line-height: 1; margin-left: 2px; transition: color .12s;
}
.del-res-btn:hover { color: var(--accent); }
.coord-mode .del-res-btn { display: inline; }
.add-res-btn {
  display: none; background: none; border: 1px dashed var(--border);
  color: var(--ink-3); font-size: .63rem; padding: 2px 7px;
  border-radius: 4px; cursor: pointer; align-items: center; gap: 3px;
  transition: border-color .12s, color .12s;
}
.add-res-btn:hover { border-color: var(--accent); color: var(--accent); }
.coord-mode .add-res-btn { display: inline-flex; }
.res-form { display: none; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.res-form.open { display: flex; }
.res-form input {
  font-family: 'DM Sans', sans-serif; font-size: .72rem;
  padding: 4px 8px; border: 1px solid var(--border);
  border-radius: 5px; outline: none; color: var(--ink);
  transition: border-color .12s;
}
.res-form input:focus { border-color: var(--accent); }
.res-name-inp { width: 170px; }
.res-url-inp  { width: 230px; }
.res-add-ok {
  font-family: 'DM Sans', sans-serif; font-size: .7rem; padding: 4px 11px;
  background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer;
}
.res-add-ok:hover { filter: brightness(0.9); }
.res-add-cancel {
  font-family: 'DM Sans', sans-serif; font-size: .7rem; padding: 4px 8px;
  background: none; border: 1px solid var(--border); color: var(--ink-3);
  border-radius: 5px; cursor: pointer;
}
.res-add-cancel:hover { border-color: var(--ink-2); color: var(--ink); }
.res-row.empty-res { display: none; }

/* --- CONFIRM MODAL ─────────────────────────────── */
.cm-bg {

}

.cm-input {

/* --- MOBILE ---------------------------------------- */
@media (max-width: 768px) {

/* ── Pacing topbar (fallback if base.css not loaded) ── */
.pacing-topbar {

  width: 100%; font-family: 'DM Sans', sans-serif; font-size: .82rem;
  padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px;
  outline: none; color: var(--ink); background: white; cursor: pointer;
}
.cm-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.cm-cancel { font-family: 'DM Sans', sans-serif; font-size: .78rem; padding: 7px 16px; border-radius: 7px; border: 1px solid var(--border); background: white; color: var(--ink-2); cursor: pointer; }
.cm-cancel:hover { border-color: var(--ink-2); color: var(--ink); }
.cm-ok { font-family: 'DM Sans', sans-serif; font-size: .78rem; padding: 7px 16px; border-radius: 7px; border: none; background: var(--accent); color: white; cursor: pointer; }
.cm-ok:hover { filter: brightness(.9); }
.cm-ok.danger { background: #c0392b; }

/* --- MOBILE ---------------------------------------- */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr !important; }
  .sidebar {
    position: fixed; top: 60px; left: 0; bottom: 0;
    width: 280px; z-index: 180;
    transform: translateX(-100%);
    transition: transform .25s ease;
    box-shadow: var(--shadow-lg);
  }
  .layout:not(.sidebar-collapsed) .sidebar { transform: translateX(0); }
  .sidebar-toggle { left: 0 !important; border-left: 1px solid var(--border) !important; }
  .layout:not(.sidebar-collapsed) .sidebar-toggle { left: 280px !important; }
  .sidebar-inner { visibility: visible !important; }
  table.topics-tbl th:nth-child(3),
  table.topics-tbl td:nth-child(3) { display: none; }
  .ch-year-tag, .ch-topic-count { display: none; }
  .ch-prog-bar { width: 48px; }
  .status-pill { flex-direction: column; }
  .sp-btn { padding: 2px 5px; font-size: .6rem; }
  .pacing-topbar { padding: 0 12px; }
  .prog-pill { display: none; }
  .pacing-brand-text p { display: none; }
  .panel { padding: 12px 14px; }
  .home-float { bottom: 14px; left: 14px; }
}

</style>
<a href="index.html" class="home-float" title="Back to Hub">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </svg>
</a>

<script>
// -----------------------------------------------------------
// SEED DATA - empty until seeded from Excel via seedFirestore
// -----------------------------------------------------------
var RAW_DATA = [];

// -----------------------------------------------------------
// STATE  (var so the Firebase module can write window.DATA)
// -----------------------------------------------------------
var DATA = [];
var role = 'teacher'; // 'teacher' | 'coord'

let filterYear   = 'all';
let filterStatus = 'all';
let searchQ      = '';

const PAGE_SIZE = 5;
const chPageMap = {}; // ci -> current 0-based page index (topic pagination)

// Chapter-level pagination -- page size is dynamic in gallery mode (2 rows x cols)
let chapterPage = 0;

// Gallery / List view
let chapterViewMode = window.innerWidth >= 960 ? 'gallery' : 'list';

function getGalleryCols() {
  const wrap = document.getElementById('chBlocksWrap');
  const w = wrap ? wrap.clientWidth : window.innerWidth - 280;
  if (w >= 1400) return 5;
  if (w >= 1100) return 4;
  if (w >= 800)  return 3;
  if (w >= 520)  return 2;
  return 1;
}

function getChapterPageSize() {
  if (chapterViewMode === 'gallery') return getGalleryCols() * 2;
  return 5;
}

// -----------------------------------------------------------
// PERSIST
// -----------------------------------------------------------
function saveState() {
  if (window.__fbSaveState) window.__fbSaveState(DATA);
}


// -----------------------------------------------------------
// CUSTOM DIALOG HELPERS
// -----------------------------------------------------------
var _cmResolve = null;
function _showCm(opts) {
  var title=opts.title||'', msg=opts.msg||'', okLabel=opts.okLabel||'Confirm', danger=opts.danger||false, fields=opts.fields||[];
  document.getElementById('cmTitle').textContent = title;
  document.getElementById('cmMsg').textContent   = msg;
  var ok = document.getElementById('cmOk');
  ok.textContent = okLabel;
  ok.classList.toggle('danger', danger);
  var fieldsEl = document.getElementById('cmFields');
  fieldsEl.innerHTML = fields.map(function(f) {
    if (f.type === 'select') {
      var opts2 = f.options.map(function(o){ return '<option value="'+o.v+'"'+(o.def?' selected':'')+'>'+o.l+'</option>'; }).join('');
      return '<div class="cm-field"><label>'+f.label+'</label><select class="cm-select" id="cm-'+f.id+'">'+opts2+'</select></div>';
    }
    return '<div class="cm-field"><label>'+f.label+'</label><input class="cm-input" id="cm-'+f.id+'" type="'+(f.type||'text')+'" placeholder="'+(f.ph||'')+'" value="'+(f.val||'')+'"></div>';
  }).join('');
  document.getElementById('cmModal').classList.add('open');
  setTimeout(function(){ var el=fieldsEl.querySelector('input,select'); if(el)el.focus(); },80);
  return new Promise(function(res) { _cmResolve = res; });
}
function _cmDone(ok) {
  document.getElementById('cmModal').classList.remove('open');
  if (!_cmResolve) return;
  var fieldsEl = document.getElementById('cmFields');
  var inputs = fieldsEl.querySelectorAll('input,select');
  if (!ok || !inputs.length) { _cmResolve(ok||null); _cmResolve=null; return; }
  var vals = {};
  inputs.forEach(function(el){ vals[el.id.replace('cm-','')] = el.value.trim(); });
  _cmResolve(vals); _cmResolve = null;
}

// -----------------------------------------------------------
// HELPERS
// -----------------------------------------------------------
function _chapterYearOptions() {
  var existing = DATA.map(function(ch){return ch.year;}).filter(function(y,i,a){return y&&a.indexOf(y)===i;});
  if (existing.length) return existing.map(function(y,i){return {v:y,l:y,def:i===existing.length-1};});
  return [{v:'Year 9',l:'Year 9'},{v:'Year 10',l:'Year 10',def:true}];
}

function parseObjCodes(objStr) {
  if (!objStr) return [];
  const matches = objStr.match(/[CE]\d+\.\d+/g);
  return matches ? [...new Set(matches)] : [];
}

function allTopics() {
  return DATA.flatMap((ch, ci) => ch.topics.map((t, ti) => ({ch: ci, ti, ...t})));
}

function _renderObjCell(obj) {
  if (!obj) return '-';
  var isHtml = obj.indexOf('<') !== -1 && obj.indexOf('>') !== -1;
  return isHtml ? obj : escHtml(obj.substring(0,120)) + (obj.length>120?'...':'');
}
function _objNeedsSeeMore(obj) {
  var isHtml = obj && obj.indexOf('<') !== -1 && obj.indexOf('>') !== -1;
  return obj && obj.length > 120 && !isHtml;
}
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function safeUrl(url) {
  return /^https?:\/\//i.test(url) ? url : '#';
}

// -----------------------------------------------------------
// RENDER - SIDEBAR NAV
// -----------------------------------------------------------
function renderNav() {
  const y9  = DATA.filter(ch => ch.year === 'Year 11');
  const y10 = DATA.filter(ch => ch.year === 'Year 12');

  function buildItems(arr) {
    return arr.map(ch => {
      const ci   = DATA.indexOf(ch);
      const done = ch.topics.filter(t => t.status === 'done').length;
      const pct  = ch.topics.length ? Math.round(done / ch.topics.length * 100) : 0;
      return `<div class="ch-nav-item" onclick="scrollToChapter(${ci})" id="nav-${ci}">
        <span class="ch-nav-num">${ci+1}</span>
        <span class="ch-nav-title">${ch.chapter.replace(/^\d+\.\s*/, '')}</span>
        <span class="ch-nav-count">${done}/${ch.topics.length}</span>
      </div>`;
    }).join('');
  }

  const nav = document.getElementById('chNav');
  if (!DATA.length) {
    nav.innerHTML = '<div style="padding:16px;font-size:.72rem;color:var(--ink-3);text-align:center;">No chapters yet</div>';
    return;
  }
  nav.innerHTML = `
    <div class="ch-nav-group"><div class="ch-nav-group-label">Year 11</div>${buildItems(y9)}</div>
    <div class="ch-nav-group"><div class="ch-nav-group-label">Year 12</div>${buildItems(y10)}</div>`;
}

// -----------------------------------------------------------
// RENDER - TOP PROGRESS
// -----------------------------------------------------------
function renderProgress() {
  const all  = allTopics();
  const done = all.filter(t => t.status === 'done').length;
  const pct  = all.length ? Math.round(done / all.length * 100) : 0;
  const bar  = document.getElementById('topProgBar');
  const doneEl = document.getElementById('topProgDone');
  const totalEl = document.getElementById('topProgTotal');
  if (bar)    bar.style.width      = pct + '%';
  if (doneEl) doneEl.textContent  = done;
  if (totalEl) totalEl.textContent = all.length;
}

// -----------------------------------------------------------
// RENDER - PACING GUIDE
// -----------------------------------------------------------
function renderPacing() {
  const container = document.getElementById('chBlocks');
  const collapsed = new Set([...document.querySelectorAll('.ch-block.collapsed')].map(el=>el.id));
  let html = '';

  // Apply chapter-level pagination
  const CPS = getChapterPageSize(); // dynamic: 2xcols in gallery, 5 in list
  // First collect filtered chapter indices
  const filteredChIndices = DATA.map((ch, ci) => ci).filter(ci => {
    const ch = DATA[ci];
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    // skip chapters with no matching topics
    const hasTopics = ch.topics.some(t => {
      if (filterStatus !== 'all' && t.status !== filterStatus) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return t.topic.toLowerCase().includes(q) || (t.objective||'').toLowerCase().includes(q);
      }
      return true;
    });
    return hasTopics;
  });
  const totalChapterPages = Math.ceil(filteredChIndices.length / CPS);
  if (chapterPage >= totalChapterPages) chapterPage = Math.max(0, totalChapterPages - 1);
  const pageChIndices = filteredChIndices.slice(chapterPage * CPS, (chapterPage + 1) * CPS);

  pageChIndices.forEach(ci => {
    const ch = DATA[ci];
    if (filterYear !== 'all' && ch.year !== filterYear) return;

    const filteredTopics = ch.topics.map((t, ti) => ({t, ti})).filter(({t}) => {
      if (filterStatus !== 'all' && t.status !== filterStatus) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return t.topic.toLowerCase().includes(q) || (t.objective||'').toLowerCase().includes(q);
      }
      return true;
    });

    if (!filteredTopics.length) return;

    const done      = ch.topics.filter(t => t.status === 'done').length;
    const pct       = ch.topics.length ? Math.round(done / ch.topics.length * 100) : 0;
    const yearClass = ch.year === 'Year 9' ? 'yr9' : ch.year === 'Year 10' ? 'yr10' : ch.year === 'Year 11' ? 'yr9' : ch.year === 'Year 12' ? 'yr10' : ch.year === 'Year 7' ? 'yr9' : 'yr10';

    html += `
    <div class="ch-block" id="ch-${ci}">
      <div class="ch-header" onclick="toggleChapter(${ci})">
        <span class="ch-badge">Ch ${ci+1}</span>
        <span class="ch-header-title">${ch.chapter}</span>
        <span class="ch-year-tag ${yearClass}">${ch.year}</span>
        <div class="ch-stats">
          <div class="ch-prog-bar"><div class="ch-prog-fill" style="width:${pct}%"></div></div>
          <span class="ch-pct">${pct}%</span>
          <span class="ch-topic-count">${ch.topics.length} topics</span>
        </div>
        <button class="del-ch-btn" onclick="event.stopPropagation();deleteChapter(${ci})" title="Delete chapter">x</button>
        <span class="ch-caret">&#9662;</span>
      </div>
      <div class="topics-wrap">
        <table class="topics-tbl">
          <thead><tr>
            <th style="width:42px"></th>
            <th>Topic</th>
            <th>Cambridge Objectives</th>
            <th style="width:60px">Hours</th>
            <th style="width:60px">Week</th>
            <th style="width:210px">Status</th>
          </tr></thead>
          <tbody>
            ${(()=>{
              const page = chPageMap[ci] || 0;
              const start = page * PAGE_SIZE;
              const pageTopics = filteredTopics.slice(start, start + PAGE_SIZE);
              return pageTopics.map(({t, ti}) => {
                const codes   = parseObjCodes(t.objective);
                const rowClass = t.status === 'done' ? 'done-row' : t.status === 'inprogress' ? 'inprogress-row' : '';
                const isCoord  = role === 'coord';
                const hasRes   = (t.resources || []).length > 0;
                return `
                <tr class="${rowClass}" id="row-${ci}-${ti}">
                  <td>
                    <div class="tcheck ${t.status==='done'?'on':t.status==='inprogress'?'mid':''}" onclick="toggleDone(${ci},${ti})" title="${t.status==='pending'?'Mark in progress':t.status==='inprogress'?'Mark done':'Mark pending'}"></div>
                    <button class="del-topic-btn" onclick="deleteTopic(${ci},${ti})" title="Delete topic">&#215;</button>
                  </td>
                  <td class="topic-cell">
                    <div class="topic-name ${t.status==='done'?'struck':''} editable"
                      contenteditable="${isCoord}"
                      data-field="topic" data-ci="${ci}" data-ti="${ti}"
                      onblur="saveEdit(this,${ci},${ti},'topic')"
                      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
                    >${escHtml(t.topic)}</div>
                    ${codes.length ? `<div class="obj-codes">${codes.map(c => `<span class="obj-code" onclick="showObj(${ci},${ti})">${c}</span>`).join('')}</div>` : ''}
                    <div class="editable" style="font-size:.75rem;color:var(--ink-2);line-height:1.5;"
                      contenteditable="${isCoord}"
                      data-field="objective" data-ci="${ci}" data-ti="${ti}"
                      onblur="saveEdit(this,${ci},${ti},'objective')"
                    >${_renderObjCell(t.objective)}${_objNeedsSeeMore(t.objective) ? ` <span class="obj-code" style="cursor:pointer" onclick="event.stopPropagation();showObj(${ci},${ti})">see full</span>` : ''}</div>
                    <div style="display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap;">
                      <span class="dur-badge editable"
                        contenteditable="${isCoord}"
                        data-field="hour" data-ci="${ci}" data-ti="${ti}"
                        onblur="saveEdit(this,${ci},${ti},'hour')"
                        onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
                        title="Hours"
                      >${t.hour}h</span>
                      ${t.week ? `<span style="font-size:.64rem;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--blue-2);color:var(--blue);border:1px solid #c2d8f5;white-space:nowrap;">Wk ${t.week}</span>` : ''}
                      <div class="status-pill">
                        <button class="sp-btn sp-pending   ${t.status==='pending'   ?'sp-on':''}" onclick="setStatus(${ci},${ti},'pending')">Pending</button>
                        <button class="sp-btn sp-inprogress ${t.status==='inprogress'?'sp-on':''}" onclick="setStatus(${ci},${ti},'inprogress')">In Progress</button>
                        <button class="sp-btn sp-done      ${t.status==='done'      ?'sp-on':''}" onclick="setStatus(${ci},${ti},'done')">Done</button>
                      </div>
                    </div>
                  </td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                </tr>
                <tr class="res-row${!hasRes && !t.activity ? ' empty-res' : ''}" id="res-row-${ci}-${ti}">
                  <td colspan="6">${renderResourcesHtml(ci, ti, t)}</td>
                </tr>`;
              }).join('');
            })()}
            <tr class="add-topic-row">
              <td colspan="6">
                <button class="add-topic-btn" onclick="addTopic(${ci})">+ Add Topic</button>
              </td>
            </tr>
          </tbody>
        </table>
        ${(()=>{
          const totalPages = Math.ceil(filteredTopics.length / PAGE_SIZE);
          if (totalPages <= 1) return '';
          const page = chPageMap[ci] || 0;
          const start = page * PAGE_SIZE + 1;
          const end   = Math.min((page + 1) * PAGE_SIZE, filteredTopics.length);
          let pgHtml = `<div class="ch-pagination">
            <span class="pg-info">${start}–${end} of ${filteredTopics.length} topics</span>
            <div class="pg-btns">
              <button class="pg-btn" onclick="chSetPage(${ci},${page-1})" ${page===0?'disabled':''}>&#8249; Prev</button>`;
          for (let p = 0; p < totalPages; p++) {
            pgHtml += `<button class="pg-btn ${p===page?'pg-active':''}" onclick="chSetPage(${ci},${p})">${p+1}</button>`;
          }
          pgHtml += `<button class="pg-btn" onclick="chSetPage(${ci},${page+1})" ${page===totalPages-1?'disabled':''}>Next &#8250;</button>
            </div>
          </div>`;
          return pgHtml;
        })()}
      </div>
      ${renderChapterAssessmentCard(ch)}
      ${renderGalleryCardBody(ch, ci)}
    </div>`;
  });

  // Chapter paginator -- rendered into the mount point outside the grid
  let chPaginatorHtml = '';
  if (totalChapterPages > 1) {
    const start = chapterPage * CPS + 1;
    const end   = Math.min((chapterPage + 1) * CPS, filteredChIndices.length);
    chPaginatorHtml = `<div class="chapter-paginator">
      <span class="ch-pg-info">Chapters ${start}–${end} of ${filteredChIndices.length}</span>
      <div class="ch-pg-btns">
        <button class="ch-pg-btn" onclick="chapterSetPage(${chapterPage - 1})" ${chapterPage === 0 ? 'disabled' : ''}>&#8249; Prev</button>`;
    for (let p = 0; p < totalChapterPages; p++) {
      chPaginatorHtml += `<button class="ch-pg-btn ${p === chapterPage ? 'ch-pg-active' : ''}" onclick="chapterSetPage(${p})">${p + 1}</button>`;
    }
    chPaginatorHtml += `<button class="ch-pg-btn" onclick="chapterSetPage(${chapterPage + 1})" ${chapterPage === totalChapterPages - 1 ? 'disabled' : ''}>Next &#8250;</button>
      </div>
    </div>`;
  }

  if (!html) {
    if (DATA.length === 0) {
      html = `<div class="empty">
        <div class="empty-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
        </div>
        <p style="font-weight:500;color:var(--ink-2);margin-bottom:6px;">No topics yet</p>
        <p style="font-size:.75rem;line-height:1.6;">The coordinator hasn't added any content yet.<br>Please check back later.</p>
      </div>`;
    } else {
      html = `<div class="empty"><div class="empty-icon"></div><p>No topics match your filters.</p></div>`;
    }
  }
  html += `<div class="add-chapter-wrap"><button class="add-chapter-btn" onclick="addChapter()">+ Add Chapter</button></div>`;
  container.innerHTML = html;

  // Paginator goes into the mount point (outside the grid, always at bottom)
  const mountEl = document.getElementById('chapterPaginatorMount');
  if (mountEl) mountEl.innerHTML = chPaginatorHtml;

  // Apply view mode class + dynamic grid columns
  const cols = getGalleryCols();
  container.classList.toggle('gallery-view', chapterViewMode === 'gallery');
  if (chapterViewMode === 'gallery') {
    container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  } else {
    container.style.gridTemplateColumns = '';
  }

  // Sync toggle buttons
  const vmtList    = document.getElementById('vmtList');
  const vmtGallery = document.getElementById('vmtGallery');
  const expandBtn  = document.getElementById('expandAllBtn');
  const collapseBtn = document.getElementById('collapseAllBtn');
  if (vmtList)    vmtList.classList.toggle('on', chapterViewMode === 'list');
  if (vmtGallery) vmtGallery.classList.toggle('on', chapterViewMode === 'gallery');
  // Expand/Collapse All only make sense in list mode
  if (expandBtn)   expandBtn.style.display   = chapterViewMode === 'list' ? '' : 'none';
  if (collapseBtn) collapseBtn.style.display = chapterViewMode === 'list' ? '' : 'none';

  collapsed.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.add('collapsed');});

  if (role === 'coord') {
    document.body.classList.add('coord-mode');
    document.getElementById('editHint').style.display = 'block';
  } else {
    document.body.classList.remove('coord-mode');
    document.getElementById('editHint').style.display = 'none';
  }
}

// -----------------------------------------------------------
// GALLERY CARD BODY
// -----------------------------------------------------------
function renderGalleryCardBody(ch, ci) {
  const preview = ch.topics.slice(0, 4);
  const more    = ch.topics.length - preview.length;
  const rows = preview.map(t => {
    const dotClass = t.status === 'done' ? 'done' : t.status === 'inprogress' ? 'inprogress' : 'pending';
    return `<div class="gcb-topic-row">
      <div class="gcb-topic-dot ${dotClass}"></div>
      <div class="gcb-topic-name">${escHtml(t.topic)}</div>
    </div>`;
  }).join('');
  const moreHtml = more > 0 ? `<div class="gcb-more">+${more} more topics</div>` : '';
  return `<div class="gallery-card-body">
    <div class="gcb-topics-preview">${rows}${moreHtml}</div>
    <button class="gcb-open-btn" onclick="openChapterInList(${ci})">Open chapter →</button>
  </div>`;
}

// -----------------------------------------------------------
// CHAPTER VIEW MODE
// -----------------------------------------------------------
function setChapterView(mode) {
  chapterViewMode = mode;
  renderPacing();
}

function openChapterInList(ci) {
  chapterViewMode = 'list';
  const filteredChIndices = DATA.map((ch, idx) => idx).filter(idx => {
    const ch = DATA[idx];
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    return ch.topics.length > 0;
  });
  const pos = filteredChIndices.indexOf(ci);
  if (pos >= 0) chapterPage = Math.floor(pos / getChapterPageSize());
  renderPacing();
  setTimeout(() => {
    const el = document.getElementById('ch-' + ci);
    if (el) { el.classList.remove('collapsed'); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
  }, 60);
}

// -----------------------------------------------------------
// CHAPTER PAGINATION
// -----------------------------------------------------------
function chapterSetPage(page) {
  const filteredCount = DATA.filter(ch => {
    if (filterYear !== 'all' && ch.year !== filterYear) return false;
    return ch.topics.length > 0;
  }).length;
  const totalPages = Math.ceil(filteredCount / getChapterPageSize());
  if (page < 0 || page >= totalPages) return;
  chapterPage = page;
  renderPacing();
  const wrap = document.getElementById('chBlocksWrap');
  if (wrap) wrap.scrollTop = 0;
}

// -----------------------------------------------------------
// RENDER - WEEKLY VIEW
// -----------------------------------------------------------
function renderWeekly() {
  const weekMap = {};
  DATA.forEach(ch => {
    ch.topics.forEach(t => {
      const w = t.week ? String(t.week) : null;
      if (!w) return;
      if (!weekMap[w]) weekMap[w] = { topics: [], totalHours: 0 };
      weekMap[w].topics.push({ name: t.topic, chapter: ch.chapter, year: ch.year, hour: t.hour });
      weekMap[w].totalHours += t.hour;
    });
  });

  const weeks = Object.keys(weekMap).sort((a, b) => {
    return parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,''));
  });

  const grid = document.getElementById('weekGrid');
  if (!weeks.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" style="opacity:.35"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><p style="font-weight:500;color:var(--ink-2);margin-bottom:6px;">No weekly schedule yet</p><p style="font-size:.75rem;line-height:1.6;">Topics don\'t have week assignments yet.<br>Coordinators can add week numbers to topics.</p></div>';
    return;
  }

  grid.innerHTML = weeks.map(w => {
    const data = weekMap[w];
    return `
    <div class="week-card">
      <div class="week-card-head">
        <div class="week-card-title">Week ${w.replace('Week ','')}</div>
        <div class="week-hours-tag">${data.totalHours}h total</div>
      </div>
      <div class="week-topics-list">
        ${data.topics.map(t => `
          <div class="week-topic-row">
            <div class="wt-dot ${t.year==='Year 11'?'dot-y9':'dot-y10'}"></div>
            <div class="wt-name">${t.name}</div>
            <div class="wt-ch">${t.chapter.match(/^\d+/)?.[0]||''}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// INTERACTIONS
// -----------------------------------------------------------
function toggleDone(ci, ti) {
  const cur = DATA[ci].topics[ti].status;
  DATA[ci].topics[ti].status = cur==='pending'?'inprogress':cur==='inprogress'?'done':'pending';
  saveState(); render();
}

function setStatus(ci, ti, val) {
  DATA[ci].topics[ti].status = val;
  saveState(); render();
}

function saveEdit(el, ci, ti, field) {
  if (role !== 'coord') return;
  let val = el.innerText.trim();
  if (field === 'hour') val = parseInt(val) || DATA[ci].topics[ti].hour;
  DATA[ci].topics[ti][field] = val;
  saveState();
  showToast('Saved');
  setTimeout(render, 200);
}

function addTopic(ci) {
  if (role !== 'coord') return;
  DATA[ci].topics.push({ topic: 'New Topic', objective: '', week: null, hour: 1, status: 'pending', resources: [] });
  saveState(); render();
  showToast('Topic added');
}

async function deleteTopic(ci, ti) {
  if (role !== 'coord') return;
  var ok = await _showCm({title:'Delete Topic',msg:'Delete "'+DATA[ci].topics[ti].topic+'"? This cannot be undone.',okLabel:'Delete',danger:true});
  if (!ok) return;

  showToast('Topic deleted');
}

function addChapter() {
  if (role !== 'coord') return;
  const name = prompt('Chapter name:');
  if (!name || !name.trim()) return;
  const year = prompt('Year (Year 11 or Year 12):', 'Year 12');
  DATA.push({ chapter: name.trim(), year: (year || 'Year 12').trim(), topics: [] });

  showToast('Chapter added');
}

async function deleteChapter(ci) {
  if (role !== 'coord') return;
  var ok = await _showCm({title:'Delete Chapter',msg:'Delete "'+DATA[ci].chapter+'" and all its topics? This cannot be undone.',okLabel:'Delete',danger:true});
  if (!ok) return;
  DATA.splice(ci, 1);
  saveState(); render();
  showToast('Chapter deleted');
}

// -----------------------------------------------------------
// RESOURCES
// -----------------------------------------------------------
function renderResourcesHtml(ci, ti, t) {
  const res = t.resources || [];
  const linkIcon = `<svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4v4"/><path d="M14 2l-6 6"/><path d="M8 4H4a2 2 0 00-2 2v6a2 2 0 002 2h6a2 2 0 002-2v-4"/></svg>`;
  const addIcon  = `<svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>`;
  const chips = res.map((r, ri) => `
    <a class="res-link" href="${escHtml(r.url)}" target="_blank" rel="noopener">
      ${linkIcon}${escHtml(r.name || r.url)}
      <button class="del-res-btn" onclick="event.preventDefault();deleteResource(${ci},${ti},${ri})" title="Remove">x</button>
    </a>`).join('');
  const activityChip = t.activity
    ? `<a href="${safeUrl(t.activity.url)}" target="_blank" rel="noopener noreferrer" class="activity-chip ${escHtml(t.activity.type)}" style="margin-left:4px;">${escHtml(t.activity.title || 'Activity')}</a>`
    : '';
  return `<div class="res-chips">
      ${chips}
      ${activityChip}
      <button class="add-res-btn" onclick="addResource(${ci},${ti})">${addIcon} Resource</button>
    </div>
    <div class="res-form" id="res-form-${ci}-${ti}">
      <input class="res-name-inp" type="text" placeholder="Name (e.g. Cambridge Textbook p.12)" id="res-name-${ci}-${ti}">
      <input class="res-url-inp" type="url" placeholder="https://..." id="res-url-${ci}-${ti}">
      <button class="res-add-ok" onclick="confirmAddResource(${ci},${ti})">Add</button>
      <button class="res-add-cancel" onclick="cancelResource(${ci},${ti})">Cancel</button>
    </div>`;
}

function addResource(ci, ti) {
  if (role !== 'coord') return;
  const f = document.getElementById(`res-form-${ci}-${ti}`);
  if (f) { f.classList.add('open'); f.querySelector('.res-name-inp').focus(); }
}

function cancelResource(ci, ti) {
  const f = document.getElementById(`res-form-${ci}-${ti}`);
  if (f) {
    f.classList.remove('open');
    f.querySelector('.res-name-inp').value = '';
    f.querySelector('.res-url-inp').value  = '';
  }
}

function confirmAddResource(ci, ti) {
  if (role !== 'coord') return;
  const name = document.getElementById(`res-name-${ci}-${ti}`).value.trim();
  const url  = document.getElementById(`res-url-${ci}-${ti}`).value.trim();
  if (!name || !url) { showToast('Enter both name and URL'); return; }
  if (!DATA[ci].topics[ti].resources) DATA[ci].topics[ti].resources = [];
  DATA[ci].topics[ti].resources.push({ name, url });
  saveState();
  showToast('Resource added');
  cancelResource(ci, ti);
  render();
}

async function deleteResource(ci, ti, ri) {
  if (role !== 'coord') return;
  var res = DATA[ci].topics[ti].resources;
  if (!res) return;
  var ok = await _showCm({title:'Remove Resource',msg:'Remove "'+res[ri].name+'"?',okLabel:'Remove',danger:true});
  if (!ok) return;
  res.splice(ri, 1);
  saveState();
  showToast('Resource removed');
  render();
}

function toggleChapter(ci) {
  const el = document.getElementById(`ch-${ci}`);
  if (el) el.classList.toggle('collapsed');
}

function expandAll()   { document.querySelectorAll('.ch-block').forEach(el => el.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.ch-block').forEach(el => el.classList.add('collapsed')); }
function toggleSidebar() {
  document.getElementById('appLayout').classList.toggle('sidebar-collapsed');
}

function scrollToChapter(ci) {
  switchViewById('pacing');
  setTimeout(() => {
    const el = document.getElementById(`ch-${ci}`);

function resetProgress() {
  if (!confirm('Reset all topic statuses to Pending This will update Firestore for all users.')) return;
  DATA.forEach(ch => ch.topics.forEach(t => t.status = 'pending'));
  saveState(); render(); showToast('Progress reset');
}

function clearSearch(){

  if(inp)inp.value='';
  var clr=document.getElementById('searchClear');
  if(clr)clr.classList.remove('visible');

}

document.getElementById('yearChips').addEventListener('click', e => {

// -----------------------------------------------------------
// VIEWS
// -----------------------------------------------------------
function switchView(view, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  switchViewById(view);
}
function switchViewById(view) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('panel-' + view).classList.add('on');
}

// -----------------------------------------------------------
// OBJECTIVES MODAL
// -----------------------------------------------------------
var _objCi=null,_objTi=null;
function showObj(ci, ti) {
  _objCi=ci; _objTi=ti;
  const ch    = DATA[ci];
  const t     = ch.topics[ti];
  const parts = (t.objective||'').split(/\n\n+/).filter(Boolean);

  document.getElementById('objModalTitle').textContent = t.topic;
  document.getElementById('objModalSub').textContent   = ch.chapter;
  document.getElementById('objModalBody').innerHTML    = parts.map(p => {
    const colonIdx = p.indexOf(':');
    const code = colonIdx > -1 ? p.substring(0, colonIdx) : '';
    const desc = colonIdx > -1 ? p.substring(colonIdx+1).trim() : p;
    return `<div class="obj-entry">
      ${code ? `<div class="obj-entry-code">${escHtml(code)}</div>` : ''}
      <div class="obj-entry-text">${escHtml(desc)}</div>
    </div>`;
  }).join('') || '<p style="color:var(--ink-3);font-size:.8rem">No objectives listed for this topic.</p>';

  var flat=allTopics(),idx=flat.findIndex(function(x){return x.ch===ci&&x.ti===ti;});
  var posEl=document.getElementById('objModalPos'),prevB=document.getElementById('objModalPrev'),nextB=document.getElementById('objModalNext');
  if(posEl)posEl.textContent=(idx+1)+'/'+flat.length;
  if(prevB)prevB.disabled=idx<=0;
  if(nextB)nextB.disabled=idx>=flat.length-1;
  document.getElementById('objModal').classList.add('open');
}

function objModalNav(dir) {
  var flat=allTopics(),idx=flat.findIndex(function(x){return x.ch===_objCi&&x.ti===_objTi;}),nxt=idx+dir;
  if(nxt<0||nxt>=flat.length)return;
  showObj(flat[nxt].ch,flat[nxt].ti);
}

function closeObjModal(e) {
  if (e.target === document.getElementById('objModal')) document.getElementById('objModal').classList.remove('open');
}

// -----------------------------------------------------------
// ROLE
// -----------------------------------------------------------
function applyRole(r) {
  role = r;
  const dot      = document.getElementById('roleDot');
  const label    = document.getElementById('roleLabel');
  const resetBtn = document.getElementById('resetBtn');
  if (r === 'coord') {
    if (dot)   dot.className     = 'role-dot coord';
    if (label) label.textContent = 'Coordinator';
    if (resetBtn) resetBtn.style.display = '';
  } else {
    if (dot)   dot.className     = 'role-dot teacher';
    if (label) label.textContent = 'Teacher';
    if (resetBtn) resetBtn.style.display = 'none';
  }
  render();
}

// -----------------------------------------------------------
// TOAST
// -----------------------------------------------------------
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// -----------------------------------------------------------
// MAIN RENDER
// -----------------------------------------------------------
function render() {
  renderProgress();
  renderNav();
  renderPacing();
  renderWeekly();
}

// Re-render on resize so gallery cols and page size stay correct
let _resizeDebounce;
window.addEventListener('resize', () => {
  clearTimeout(_resizeDebounce);
  _resizeDebounce = setTimeout(() => {
    if (DATA.length) renderPacing();
  }, 200);
});

// NOTE: render() is NOT called here - Firebase module calls it
// after data is loaded from Firestore.
</script>

<!-- -- FIREBASE MODULE --------------------------- -->
<script type="module">
import {
  getFirestore,
  collection,
  doc,
  setDoc,
  onSnapshot,
  serverTimestamp,
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db = getFirestore(window.firebaseApp);

let unsubStructure  = null;
let unsubUserProg   = null;
let currentUID      = null;
let currentRole     = 'teacher';
let sharedStructure = null;
let userStatuses    = {};


function _mergeAndRender(isFirstLoad, appRole) {
  if (!sharedStructure) return;
  window.DATA = sharedStructure.map((ch, ci) => ({
    ...ch,
    topics: (ch.topics || []).map((t, ti) => ({
      ...t,
      status: userStatuses[`${ci}-${ti}`] || 'pending',
    })),
  }));
  if (isFirstLoad) {
    document.getElementById('loadingScreen').style.display = 'none';
    applyRole(appRole);
  } else {
    render();
  }
}

function _startSnapshot(uid, appRole) {
  if (unsubStructure) unsubStructure();
  if (unsubUserProg)  unsubUserProg();
  currentUID  = uid;
  currentRole = appRole;

  const structureRef = doc(db, 'asalevel_physics_pacing', 'year11-12');
  const userProgRef  = doc(db, 'userProgress', currentUID);
  let firstLoad      = true;
  let structureReady = false;
  let progressReady  = false;

  function tryRender() {
    if (!structureReady || !progressReady) return;
    const fl = firstLoad;
    firstLoad = false;
    _mergeAndRender(fl, appRole);
  }

  unsubStructure = onSnapshot(structureRef, (snap) => {
    sharedStructure = snap.exists() && Array.isArray(snap.data().chapters)
       ? snap.data().chapters : [];
    structureReady = true;
    tryRender();
  }, (err) => {
    console.error('Structure snapshot error:', err);
    sharedStructure = [];
    structureReady  = true;
    document.getElementById('loadingScreen').style.display = 'none';
    applyRole(appRole);
    showToast('Firestore connection error');
  });

  unsubUserProg = onSnapshot(userProgRef, (snap) => {
    userStatuses  = snap.exists() && snap.data().asphys_statuses
       ? snap.data().asphys_statuses : {};
    progressReady = true;
    tryRender();
  }, (err) => {
    console.error('User progress snapshot error:', err);
    userStatuses  = {};
    progressReady = true;
    tryRender();
  });
}

window.__fbSaveState = async function(data) {
  if (!currentUID) return;

  // 1. Save this user's progress
  const newStatuses = {};
  data.forEach((ch, ci) => {
    (ch.topics || []).forEach((t, ti) => {
      if (t.status && t.status !== 'pending') {
        newStatuses[`${ci}-${ti}`] = t.status;
      }
    });
  });
  try {
    await setDoc(
      doc(db, 'userProgress', currentUID),
      { asphys_statuses: newStatuses, updatedAt: serverTimestamp() },
      { merge: true }
    );
  } catch(e) {
    console.error('User progress save error:', e);
    showToast('Save failed - check connection');
    return;
  }

  // 2. Coordinators also update shared structure (without statuses)
  if (currentRole === 'coord') {
    const structureOnly = data.map(ch => ({
      ...ch,
      topics: (ch.topics || []).map(({ status, ...rest }) => rest),
    }));
    try {
      await setDoc(
        doc(db, 'asalevel_physics_pacing', 'year11-12'),
        { chapters: structureOnly, updatedAt: serverTimestamp() },
        { merge: true }
      );
    } catch(e) {
      console.error('Structure save error:', e);
      showToast('Structure save failed');
    }
  }
};

// -- auth-guard dispatches authReady when auth + role confirmed --
document.addEventListener('authReady', ({ detail: { user, profile } }) => {
  const appRole = profile.role_teachershub === 'teachers_admin' ? 'coord' : 'teacher';

  const roleDot   = document.getElementById('roleDot');
  const roleLabel = document.getElementById('roleLabel');
  if (roleDot)   { roleDot.className = 'role-dot ' + (appRole === 'coord' ? 'role-dot-coord' : 'role-dot-teacher'); }
  if (roleLabel) { roleLabel.textContent = appRole === 'coord' ? 'Coordinator' : 'Teacher'; }

  import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js').then(({ signOut }) => {
    window.authSignOut = () => signOut(window.auth).then(() => { window.location.href = 'login.html'; });
  });

  const nameShort = (user.displayName || user.email.split('@')[0]).split(' ')[0];
  let nc = document.getElementById('navbar-container');
  if (!nc) { nc = document.createElement('div'); nc.id = 'navbar-container'; document.body.insertBefore(nc, document.body.firstChild); }
  fetch('partials/navbar.html')
    .then(r => { if (!r.ok) throw new Error('navbar fetch failed: ' + r.status); return r.text(); })
    .then(html => {
      nc.innerHTML = html;
      initNavbar();
      setupNavBadges(db, { onSnapshot, collection });
      const nEl = document.getElementById('profileNameShort');
      const aEl = document.getElementById('profileAvatar');
      const wEl = document.getElementById('profileWrap');
      if (nEl) nEl.textContent = nameShort;
      if (aEl && typeof buildAvatarEl === 'function') buildAvatarEl(aEl, user);
      if (wEl) wEl.style.display = 'flex';
    })
    .catch(err => console.error('[asalevel-physics] navbar load error:', err));

  _startSnapshot(user.uid, appRole);
});
</script>
